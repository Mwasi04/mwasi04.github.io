<script type="module">
  import { auth, db } from './js/firebase-config.js';
  import { doc, getDoc, addDoc, collection, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { observeAuthState } from './js/auth.js';

  const PRIMENET_API_KEY = '7XyHpDXvuxNCLPtZHf71F7xb3b4u1fhfmHLF7fuE9twQ5LUalCTwYC5Yq0J2ONRo';
  const PRIMENET_ACCOUNT_NUMBER = 'TEST511';
  const PRIMENET_API_URL = 'https://api.primenetpay.com:9001/api/v2/transaction/collect';

  let cart = [], orderSubtotal = 0, orderShipping = 50, orderTax = 0, orderTotal = 0;
  let currentOrderId = null;

  /* ── DEBUG LOGGING ── */
  function logDebug(message, type = 'info') {
    const timestamp = new Date().toLocaleTimeString();
    const consoleMsg = `[${timestamp}] ${message}`;
    if (type === 'error') console.error(consoleMsg);
    else if (type === 'success') console.log('%c' + consoleMsg, 'color: #4ade80');
    else console.log(consoleMsg);

    const debugContent = document.getElementById('debugContent');
    if (debugContent) {
      const entry = document.createElement('div');
      entry.className = `debug-entry ${type}`;
      entry.innerHTML = `<span class="time">${timestamp}</span> ${message}`;
      debugContent.appendChild(entry);
      debugContent.scrollTop = debugContent.scrollHeight;
      if (debugContent.children.length > 50) debugContent.removeChild(debugContent.children[0]);
    }
  }

  window.clearDebugLog = () => {
    document.getElementById('debugContent').innerHTML = '';
    logDebug('Debug log cleared');
  };

  /* ── UTILS ── */
  function esc(s) {
    return s?.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])) || '';
  }

  function showToast(msg, isError = false) {
    logDebug(`Toast: ${msg}`, isError ? 'error' : 'info');
    const t = document.getElementById('toast');
    t.innerHTML = `<i class="${isError ? 'fa-regular fa-circle-exclamation' : 'fa-regular fa-circle-check'}" style="color:${isError ? '#ef4444' : '#00bcd4'};"></i> ${msg}`;
    t.classList.add('show');
    clearTimeout(t._tid);
    t._tid = setTimeout(() => t.classList.remove('show'), 4500);
  }

  function updatePayBtn() {
    const btn = document.getElementById('payBtn');
    btn.disabled = false;
    btn.innerHTML = `<i class="fa-solid fa-mobile-screen-button"></i> Pay K${orderTotal.toLocaleString()}`;
    logDebug('Pay button updated, total: K' + orderTotal);
  }

  function setBtnLoading(label) {
    const btn = document.getElementById('payBtn');
    btn.disabled = true;
    btn.innerHTML = `<span class="spin"></span> ${label}`;
    logDebug(`Button loading: ${label}`);
  }

  /* ── PHONE VALIDATION ── */
  window.validateMomoPhone = () => {
    const raw = document.getElementById('momoPhone').value;
    const fmt = parsePhone(raw);
    document.getElementById('momoPhoneWrap').classList.toggle('error', !fmt);
    document.getElementById('momoPhoneErr').classList.toggle('show', !fmt);
    return fmt;
  };

  function parsePhone(raw) {
    let c = raw.replace(/\D/g, '');
    if (c.startsWith('0') && c.length === 10) c = '260' + c.slice(1);
    if (c.startsWith('260') && c.length === 12) return c;
    if (c.length === 9) return '260' + c;
    return null;
  }

  function generateExternalReference() {
    if (!cart || cart.length === 0) return `BMB_${Date.now()}`;
    const firstItemName = cart[0].name || '';
    let prefix = firstItemName.trim().substring(0, 3).toUpperCase();
    if (prefix.length < 3) prefix = prefix.padEnd(3, 'X');
    const cleaned = prefix.replace(/[^A-Z0-9]/g, 'X');
    const ref = `${cleaned}_${Date.now()}`;
    logDebug(`External ref: ${ref}`);
    return ref;
  }

  /* ── LOAD CART ── */
  async function load(user) {
    logDebug(`Loading cart for: ${user?.uid || 'none'}`);
    if (!user) {
      document.getElementById('loadingMsg').innerHTML = '<p>Please <a href="login.html">log in</a> to checkout.</p>';
      return;
    }
    const snap = await getDoc(doc(db, 'users', user.uid));
    cart = snap.data()?.cart || [];
    if (!cart.length) {
      document.getElementById('loadingMsg').innerHTML = '<p>Your cart is empty. <a href="store.html">Continue shopping</a></p>';
      return;
    }
    orderSubtotal = 0;
    cart.forEach(i => { i._qty = i.qty ?? 1; orderSubtotal += i.price * i._qty; });
    orderTax = Math.round(orderSubtotal * 0.16);
    orderTotal = orderSubtotal + orderShipping + orderTax;

    document.getElementById('orderItemsList').innerHTML = cart.map(i => {
      const img = i.img ? `<img class="oi-img" src="${i.img}">` : `<div class="oi-img-ph">📦</div>`;
      return `<div class="order-item">${img}<div class="oi-info"><div class="oi-name">${esc(i.name)}</div><div class="oi-meta">Qty: ${i._qty}</div></div><div class="oi-price">K${(i.price * i._qty).toLocaleString()}</div></div>`;
    }).join('');

    document.getElementById('summaryRows').innerHTML = `
      <div class="sum-row"><span>Subtotal</span><span>K${orderSubtotal.toLocaleString()}</span></div>
      <div class="sum-row"><span>Shipping</span><span>K${orderShipping}</span></div>
      <div class="sum-row"><span>Tax (16%)</span><span>K${orderTax.toLocaleString()}</span></div>
      <div class="sum-row total"><span>Total</span><span>K${orderTotal.toLocaleString()}</span></div>`;

    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('checkoutGrid').style.display = 'grid';
    updatePayBtn();
    logDebug('Checkout UI rendered', 'success');
  }

  /* ── GENERATE CURL COMMAND FOR DEBUGGING ── */
  function generateCurlCommand(url, headers, body) {
    let cmd = `curl -X POST '${url}'`;
    for (const [key, value] of Object.entries(headers)) {
      cmd += ` -H '${key}: ${value}'`;
    }
    cmd += ` -d '${body.replace(/'/g, "'\\''")}'`;
    return cmd;
  }

  /* ── MAIN PAYMENT HANDLER ── */
  window.handlePay = async () => {
    logDebug('=== PAYMENT INITIATED ===');
    const payerNumber = validateMomoPhone();
    if (!payerNumber) {
      showToast('Please enter a valid Zambian mobile number', true);
      return;
    }

    const externalRef = generateExternalReference();
    const narration = `BMB Order: ${cart.map(i => `${i.name} x${i._qty}`).join(', ').substring(0, 80)}`;

    setBtnLoading('Sending payment request…');

    // Create Firestore order
    try {
      const orderRef = await addDoc(collection(db, 'orders'), {
        userId: auth.currentUser.uid,
        items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i._qty })),
        subtotal: orderSubtotal, shipping: orderShipping, tax: orderTax, totalAmount: orderTotal,
        payerNumber, paymentMethod: 'mobile_money', externalReference: externalRef, narration,
        status: 'pending', createdAt: serverTimestamp()
      });
      currentOrderId = orderRef.id;
      logDebug(`Order created: ${currentOrderId}`, 'success');
    } catch (e) {
      logDebug(`Order creation failed: ${e.message}`, 'error');
      showToast('Could not save order.', true);
      updatePayBtn();
      return;
    }

    // Build payload
    const payload = {
      payer_number: payerNumber,
      external_reference: externalRef,
      payment_narration: narration,
      currency: "ZMW",
      amount: orderTotal.toString(),
      account_number: PRIMENET_ACCOUNT_NUMBER
    };

    // Try JSON first (as per your working sample)
    const jsonBody = JSON.stringify(payload);
    logDebug(`JSON payload: ${jsonBody}`);

    const headers = {
      'X-Authorization': PRIMENET_API_KEY,
      'Content-Type': 'application/json'
    };

    // Log cURL command for manual testing
    const curlCmd = generateCurlCommand(PRIMENET_API_URL, headers, jsonBody);
    logDebug(`cURL command (copy to terminal): ${curlCmd}`);

    try {
      const response = await fetch(PRIMENET_API_URL, {
        method: 'POST',
        mode: 'cors',
        headers: headers,
        body: jsonBody
      });

      logDebug(`Response status: ${response.status}`);
      const result = await response.json();
      logDebug(`PrimeNet response: ${JSON.stringify(result)}`);

      if (result.status === 'success') {
        logDebug(`Success! Transaction ID: ${result.transaction_id}`, 'success');
        await updateDoc(doc(db, 'orders', currentOrderId), {
          primenetTransactionId: result.transaction_id,
          status: 'awaiting_payment'
        });
        await updateDoc(doc(db, 'users', auth.currentUser.uid), { cart: [] });
        document.getElementById('waitNumber').textContent = `+${payerNumber}`;
        document.getElementById('waitOverlay').classList.add('show');
        updatePayBtn();
      } else {
        // If JSON fails with "blank fields", try form-urlencoded as fallback
        if (result.message && result.message.includes('non blank')) {
          logDebug('Attempting fallback with application/x-www-form-urlencoded');
          const formBody = new URLSearchParams(payload).toString();
          const fallbackResponse = await fetch(PRIMENET_API_URL, {
            method: 'POST',
            mode: 'cors',
            headers: {
              'X-Authorization': PRIMENET_API_KEY,
              'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formBody
          });
          const fallbackResult = await fallbackResponse.json();
          logDebug(`Fallback response: ${JSON.stringify(fallbackResult)}`);
          if (fallbackResult.status === 'success') {
            // handle success same as above
            await updateDoc(doc(db, 'orders', currentOrderId), {
              primenetTransactionId: fallbackResult.transaction_id,
              status: 'awaiting_payment'
            });
            await updateDoc(doc(db, 'users', auth.currentUser.uid), { cart: [] });
            document.getElementById('waitNumber').textContent = `+${payerNumber}`;
            document.getElementById('waitOverlay').classList.add('show');
            updatePayBtn();
            return;
          } else {
            throw new Error(fallbackResult.message || 'Fallback failed');
          }
        }
        throw new Error(result.message || 'Payment rejected');
      }
    } catch (error) {
      logDebug(`Payment error: ${error.message}`, 'error');
      await updateDoc(doc(db, 'orders', currentOrderId), { status: 'failed', error: error.message });
      showToast(`Payment failed: ${error.message}`, true);
      updatePayBtn();
    }
    logDebug('=== PAYMENT HANDLER COMPLETED ===');
  };

  window.goToConfirmation = () => {
    document.getElementById('waitOverlay').classList.remove('show');
    window.location.href = 'confirmation.html';
  };

  // Account nav
  document.getElementById('accountLink').onclick = e => {
    e.preventDefault();
    auth.currentUser ? window.location.href = 'profile.html' : (confirm('Please log in') && (window.location.href = 'login.html'));
  };
  document.getElementById('accountIcon').onclick = e => {
    e.preventDefault();
    auth.currentUser ? window.location.href = 'profile.html' : (confirm('Please log in') && (window.location.href = 'login.html'));
  };

  observeAuthState(user => {
    document.querySelector('#accountIcon i').className = user ? 'fa-solid fa-circle-user' : 'fa-regular fa-circle-user';
    load(user);
  });

  logDebug('Checkout page initialized');
</script>
