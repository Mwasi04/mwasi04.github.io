<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Checkout | BMB Electronics</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #00bcd4; --primary-dark: #0097a7; --dark: #0f172a; --gray-100: #f1f5f9; --gray-200: #e2e8f0; --white: #ffffff; --radius-lg: 1.5rem; }
    body { font-family: 'Inter', sans-serif; background: var(--gray-100); }
    .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
    nav { background: white; padding: 0.8rem 0; position: sticky; top: 0; }
    .checkout-grid { display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; margin: 2rem 0; }
    .order-items-card, .payment-card { background: white; border-radius: var(--radius-lg); padding: 1.5rem; }
    .phone-input-wrapper { display: flex; border: 1px solid var(--gray-200); border-radius: 100px; overflow: hidden; margin: 1rem 0; }
    .country-code { background: var(--gray-100); padding: 0.8rem 1rem; font-weight: 600; }
    .phone-input { flex: 1; border: none; padding: 0.8rem 1rem; outline: none; }
    .pay-btn { width: 100%; background: var(--primary); color: white; border: none; border-radius: 100px; padding: 1rem; font-weight: 700; cursor: pointer; }
    .error-text { color: #ef4444; font-size: 0.75rem; display: none; }
    .error-text.show { display: block; }
    .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: white; border-radius: 100px; padding: 1rem; text-align: center; transition: 0.3s; transform: translateY(150%); z-index: 9999; }
    .toast.show { transform: translateY(0); }
  </style>
</head>
<body>
<nav>...</nav>
<div class="container">
  <div class="checkout-header"><h1>Secure Checkout</h1></div>
  <div id="checkoutContainer">Loading your order...</div>
</div>
<div class="toast" id="toast"><i class="fa-regular fa-circle-check"></i> <span id="toastMsg"></span></div>
<script type="module">
  import { auth, db } from './js/firebase-config.js';
  import { doc, getDoc, addDoc, collection, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";
  import { observeAuthState } from './js/auth.js';

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.querySelector('i').className = isError ? 'fa-regular fa-circle-exclamation' : 'fa-regular fa-circle-check';
    toast.querySelector('i').style.color = isError ? '#ef4444' : 'var(--primary)';
    document.getElementById('toastMsg').innerText = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }

  function formatPhoneNumber(raw) {
    let cleaned = raw.replace(/\D/g, '');
    if (cleaned.startsWith('0') && cleaned.length === 10) cleaned = '260' + cleaned.slice(1);
    if (cleaned.startsWith('260') && cleaned.length === 12) return cleaned;
    if (cleaned.length === 9) return '260' + cleaned;
    return null;
  }

  async function loadAndRenderCheckout() {
    const user = auth.currentUser;
    if (!user) {
      document.getElementById('checkoutContainer').innerHTML = '<div>Please login to checkout</div>';
      return;
    }
    const userDoc = await getDoc(doc(db, "users", user.uid));
    let cart = userDoc.data()?.cart || [];
    if (!cart.length) {
      document.getElementById('checkoutContainer').innerHTML = '<div>Your cart is empty</div>';
      return;
    }
    let subtotal = 0;
    cart.forEach(item => { const qty = item.qty ?? 1; item.qtyForCalc = qty; subtotal += item.price * qty; });
    const shipping = 50, tax = Math.round(subtotal * 0.16), total = subtotal + shipping + tax;
    const productNames = cart.map(i => `${i.name} x${i.qtyForCalc}`).join(', ');
    const narration = `BMB Order: ${productNames.substring(0, 80)}`;

    const itemsHtml = cart.map(item => `<div>${item.name} x${item.qtyForCalc} - K${(item.price * item.qtyForCalc).toLocaleString()}</div>`).join('');
    document.getElementById('checkoutContainer').innerHTML = `
      <div class="checkout-grid">
        <div class="order-items-card"><h2>Order Summary</h2>${itemsHtml}</div>
        <div class="payment-card">
          <h2>Payment Details</h2>
          <div>Total: K${total.toLocaleString()}</div>
          <div class="phone-input-group">
            <label>Mobile Money Number</label>
            <div class="phone-input-wrapper"><span class="country-code">+260</span><input type="tel" id="phoneNumber" class="phone-input" placeholder="97 654 3210"></div>
            <div class="error-text" id="phoneError">Enter a valid Zambia number (e.g., 0976543210)</div>
          </div>
          <button class="pay-btn" id="payNowBtn"><i class="fa-solid fa-mobile-screen-button"></i> Pay K${total.toLocaleString()}</button>
        </div>
      </div>`;

    const payBtn = document.getElementById('payNowBtn');
    const phoneInput = document.getElementById('phoneNumber');
    const phoneError = document.getElementById('phoneError');

    function validatePhone() {
      const formatted = formatPhoneNumber(phoneInput.value.trim());
      if (!formatted) { phoneError.classList.add('show'); return false; }
      phoneError.classList.remove('show');
      return formatted;
    }
    phoneInput.addEventListener('input', validatePhone);

    payBtn.onclick = async () => {
      const payerNumber = validatePhone();
      if (!payerNumber) { showToast("Please enter a valid mobile number", true); return; }
      payBtn.disabled = true;
      payBtn.innerHTML = '<span class="loading-spinner-sm"></span> Processing...';

      try {
        // Create order in Firestore
        const orderData = {
          userId: user.uid,
          items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qtyForCalc, storage: i.storage, color: i.color })),
          subtotal, shipping, tax, totalAmount: total,
          payerNumber, narration,
          status: 'pending_payment',
          createdAt: serverTimestamp(),
          externalReference: `BMB_${Date.now()}_${Math.random().toString(36).substring(2, 10)}`
        };
        const orderRef = await addDoc(collection(db, "orders"), orderData);
        const orderId = orderRef.id;

        // Call Firebase Function
        const functions = getFunctions();
        const initiatePaymentFn = httpsCallable(functions, 'initiatePayment');
        const result = await initiatePaymentFn({
          payer_number: payerNumber,
          amount: total,
          external_reference: orderData.externalReference,
          payment_narration: narration,
          orderId: orderId
        });

        if (result.data.success) {
          await updateDoc(doc(db, "orders", orderId), { status: 'awaiting_callback', primenetTransactionId: result.data.transactionId });
          await updateDoc(doc(db, "users", user.uid), { cart: [] });
          showToast(`Payment request sent to ${payerNumber}. Complete on your phone.`, false);
          setTimeout(() => { window.location.href = `order-confirmation.html?order=${orderId}`; }, 2000);
        } else {
          await updateDoc(doc(db, "orders", orderId), { status: 'failed', error: result.data.error });
          showToast(`Payment failed: ${result.data.error}`, true);
          payBtn.disabled = false;
          payBtn.innerHTML = `<i class="fa-solid fa-mobile-screen-button"></i> Pay K${total.toLocaleString()}`;
        }
      } catch (err) {
        showToast("Network error. Please try again.", true);
        payBtn.disabled = false;
        payBtn.innerHTML = `<i class="fa-solid fa-mobile-screen-button"></i> Pay K${total.toLocaleString()}`;
      }
    };
  }
  observeAuthState(() => loadAndRenderCheckout());
</script>
</body>
</html>
