<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | BMB Electronics</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Same global styles as store.html, plus cart-specific layout */
    .cart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; margin: 2rem 0; }
    .cart-items-card, .cart-summary { background: white; border-radius: 1.5rem; padding: 1.5rem; }
    .cart-item { display: grid; grid-template-columns: 80px 1fr auto; gap: 1rem; align-items: center; padding: 1rem 0; border-bottom: 1px solid #eef2f6; }
    .cart-item-img { width: 80px; height: 80px; object-fit: contain; background: var(--gray-100); border-radius: 0.75rem; }
    .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--gray-200); background: white; cursor: pointer; }
    .checkout-btn { background: var(--primary); color: white; border: none; border-radius: 100px; padding: 1rem; width: 100%; font-weight: 700; cursor: pointer; }
    .toast { position: fixed; bottom: 20px; left: 20px; background: white; border-radius: 100px; padding: 1rem; transition: 0.3s; transform: translateY(150%); }
    .toast.show { transform: translateY(0); }
  </style>
</head>
<body>
<nav>...</nav>
<div class="container">
  <h1>Shopping Cart</h1>
  <div id="cartContainer">Loading...</div>
</div>
<div class="toast" id="toast"><i class="fa-regular fa-circle-check"></i> <span></span></div>
<script type="module">
  import { auth, db } from './js/firebase-config.js';
  import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { observeAuthState } from './js/auth.js';
  let cart = [];
  async function loadCart() {
    const user = auth.currentUser;
    if (!user) { document.getElementById('cartContainer').innerHTML = '<div>Please login to view cart</div>'; return; }
    const snap = await getDoc(doc(db, "users", user.uid));
    cart = snap.data()?.cart || [];
    renderCart();
  }
  function renderCart() {
    if (!cart.length) { document.getElementById('cartContainer').innerHTML = '<div>Your cart is empty</div>'; return; }
    let subtotal = 0;
    const itemsHtml = cart.map((item, idx) => {
      const qty = item.qty ?? 1;
      subtotal += item.price * qty;
      return `<div class="cart-item"><img class="cart-item-img" src="${item.img || ''}" onerror="this.src='https://via.placeholder.com/80'"><div><div>${item.name}</div><div>${item.storage || ''} ${item.color || ''}</div><div>K${item.price} each</div></div><div><div class="item-subtotal">K${(item.price*qty).toLocaleString()}</div><div><button class="qty-btn" onclick="updateQty(${idx}, -1)">-</button><span>${qty}</span><button class="qty-btn" onclick="updateQty(${idx}, 1)">+</button><button onclick="removeItem(${idx})"><i class="fa-regular fa-trash-can"></i></button></div></div></div>`;
    }).join('');
    const total = subtotal + 50 + Math.round(subtotal*0.16);
    document.getElementById('cartContainer').innerHTML = `<div class="cart-grid"><div class="cart-items-card">${itemsHtml}</div><div class="cart-summary"><h3>Order Summary</h3><div>Subtotal: K${subtotal}</div><div>Shipping: K50</div><div>Tax (16%): K${Math.round(subtotal*0.16)}</div><div class="total">Total: K${total}</div><button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button></div></div>`;
  }
  window.updateQty = async (idx, delta) => { /* update cart array and Firestore */ };
  window.removeItem = async (idx) => { cart.splice(idx,1); await updateDoc(doc(db,"users",auth.currentUser.uid),{cart}); renderCart(); };
  observeAuthState(() => loadCart());
</script>
</body>
</html>
