<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMB Electronics | Sign Up</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #00bcd4;
      --primary-dark: #0097a7;
      --dark: #0f172a;
      --slate-800: #1e293b;
      --gray-100: #f1f5f9;
      --gray-400: #94a3b8;
      --white: #ffffff;
      --radius-lg: 1.5rem;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    /* ===== BACKGROUND IMAGE ===== */
    body { 
      font-family: 'Inter', sans-serif; 
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Full-screen background image layer — blurred */
    body::before {
      content: '';
      position: fixed;
      inset: -20px; /* extend beyond edges so blur doesn't show white borders */
      background-image: url('photos/e.jpeg');
      /* ↑ Change this to your preferred image path, e.g. url('photos/c.jpeg') */
      background-size: cover;
      background-position: center;
      filter: blur(10px) brightness(0.6);
      z-index: -2;
    }

    /* Deep blue overlay on top of the blurred image */
    body::after {
      content: '';
      position: fixed;
      inset: 0;

      z-index: -1;
    }
    /* ============================= */

    .signup-container {
      max-width: 500px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .signup-card {
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(12px);
      border-radius: var(--radius-lg);
      padding: 3rem;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 2rem;
    }

    .logo-img {
      height: 100px;
      width: auto;
    }

    .signup-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .signup-header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .signup-header p {
      color: var(--gray-400);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--dark);
    }

    .form-group input {
      width: 100%;
      padding: 1rem;
      border: 2px solid #eef2f6;
      border-radius: 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: 0.3s;
      background: #fafcff;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0, 188, 212, 0.1);
      background: white;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 1rem;
      border-radius: 100px;
      font-weight: 700;
      text-decoration: none;
      transition: 0.3s;
      border: none;
      cursor: pointer;
      text-align: center;
      font-size: 1.1rem;
    }

    .btn-primary { 
      background: var(--primary); 
      color: white; 
    }
    
    .btn-primary:hover { 
      background: var(--primary-dark); 
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 188, 212, 0.35); 
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      text-align: center;
      margin: 1.5rem 0;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: #eef2f6;
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .divider span {
      background: rgba(255,255,255,0.97);
      padding: 0 1rem;
      color: var(--gray-400);
      font-size: 0.9rem;
    }

    .social-login {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.8rem;
      border: 2px solid #eef2f6;
      border-radius: 100px;
      background: white;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 500;
    }

    .social-btn:hover {
      background: var(--gray-100);
      border-color: var(--primary);
    }

    .social-btn.google { color: #DB4437; }
    .social-btn.facebook { color: #4267B2; }

    .login-link {
      text-align: center;
      color: var(--gray-400);
    }

    .login-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .login-link a:hover { text-decoration: underline; }

    .back-home {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--gray-400);
      text-decoration: none;
      transition: 0.3s;
    }

    .back-home:hover { color: var(--primary); }

    .error-message {
      background: #fee2e2;
      color: #ef4444;
      padding: 0.8rem 1rem;
      border-radius: 0.8rem;
      margin-bottom: 1rem;
      display: none;
      font-size: 0.9rem;
    }

    .error-message.show { display: block; }

    .success-message {
      background: #d1fae5;
      color: #065f46;
      padding: 0.8rem 1rem;
      border-radius: 0.8rem;
      margin-bottom: 1rem;
      display: none;
      font-size: 0.9rem;
    }

    .success-message.show { display: block; }

    @media (max-width: 480px) {
      .signup-card { padding: 2rem 1.5rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="signup-card">
      <a href="index.html" class="logo-link">
        <img class="logo-img" src="photos/logo.png" alt="BMB logo" onerror="this.src='https://via.placeholder.com/60x60?text=BMB'">
      </a>

      <div class="signup-header">
        <h1>Create Account</h1>
        <p>Join BMB Electronics today</p>
      </div>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <form id="signupForm">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="John" required>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Doe" required>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@example.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number (Optional)</label>
          <input type="tel" id="phone" placeholder="+260 96 860 2546">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
          <small style="color: var(--gray-400); margin-top: 4px; display: block;">Must be at least 8 characters</small>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" required>
        </div>

        <div class="form-group">
          <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 400;">
            <input type="checkbox" id="terms" required style="width: 16px; height: 16px; flex-shrink: 0; accent-color: var(--primary); cursor: pointer;">
            <span style="color: var(--gray-400); font-size: 0.9rem; line-height: 1.4;">
              I agree to the <a href="#" style="color: var(--primary); font-weight: 600;">Terms of Service</a> and <a href="#" style="color: var(--primary); font-weight: 600;">Privacy Policy</a>
            </span>
          </label>
        </div>

        <button type="submit" id="signupBtn" class="btn btn-primary">Create Account</button>

        <div class="divider"><span>or continue with</span></div>

        <div class="social-login">
          <button type="button" class="social-btn google" onclick="handleGoogleSignIn()">
            <i class="fa-brands fa-google"></i> Continue with Google
          </button>
        </div>

        <div class="login-link">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </form>

      <a href="index.html" class="back-home">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
      </a>
    </div>
  </div>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signUpUser, signInWithGoogle, signInWithFacebook } from './js/auth.js';

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const email = document.getElementById('email').value;
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const terms = document.getElementById('terms').checked;
      
      const errorDiv = document.getElementById('errorMessage');
      const signupBtn = document.getElementById('signupBtn');
      
      if (!terms) {
        errorDiv.textContent = 'Please agree to the Terms of Service';
        errorDiv.classList.add('show');
        return;
      }
      
      if (password !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.classList.add('show');
        return;
      }
      
      if (password.length < 8) {
        errorDiv.textContent = 'Password must be at least 8 characters';
        errorDiv.classList.add('show');
        return;
      }
      
      signupBtn.disabled = true;
      signupBtn.textContent = 'Creating Account...';
      errorDiv.classList.remove('show');
      
      const result = await signUpUser(email, password, {
        firstName,
        lastName,
        name: `${firstName} ${lastName}`.trim(),
        phone
      });
      
      if (result.success) {
        document.getElementById('successMessage').textContent = 'Account created successfully! Redirecting...';
        document.getElementById('successMessage').classList.add('show');
        setTimeout(() => { window.location.href = 'profile.html'; }, 2000);
      } else {
        errorDiv.textContent = result.error;
        errorDiv.classList.add('show');
        signupBtn.disabled = false;
        signupBtn.textContent = 'Create Account';
      }
    });

    window.handleGoogleSignIn = async () => {
      const result = await signInWithGoogle();
      if (result.success) {
        window.location.href = 'profile.html';
      } else {
        document.getElementById('errorMessage').textContent = result.error;
        document.getElementById('errorMessage').classList.add('show');
      }
    };

    window.handleFacebookSignIn = async () => {
      const result = await signInWithFacebook();
      if (result.success) {
        window.location.href = 'profile.html';
      } else {
        document.getElementById('errorMessage').textContent = result.error;
        document.getElementById('errorMessage').classList.add('show');
      }
    };
  </script>
</body>
</html>
