<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BMB Electronics | Store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #00bcd4;
      --primary-dark: #0097a7;
      --dark: #0f172a;
      --slate-800: #1e293b;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --white: #ffffff;
      --radius-lg: 1.5rem;
      --radius-md: 1rem;
      --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--dark); line-height: 1.6; overflow-x: hidden; }
    .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
    nav {
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(10px);
      padding: 0.8rem 0;
      position: sticky; top: 0; z-index: 1000;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    nav .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .logo-link { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-img { height: 32px; width: auto; }
    .logo-text { font-size: 1.3rem; font-weight: 800; color: var(--dark); letter-spacing: -1px; }
    .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: var(--dark); }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { text-decoration: none; color: var(--dark); font-weight: 500; transition: 0.3s; font-size: 0.95rem; }
    .nav-links a:hover, .nav-links a.active { color: var(--primary); }
    .nav-icons { display: flex; gap: 1.2rem; font-size: 1.2rem; align-items: center; }
    .nav-icons a { color: var(--dark); text-decoration: none; }
    .nav-icons i { cursor: pointer; transition: 0.3s; }
    .nav-icons i:hover { color: var(--primary); }
    .cart-icon-wrap { position: relative; cursor: pointer; }
    .cart-badge {
      position: absolute; top: -8px; right: -8px;
      background: #ef4444; color: white;
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 10px; font-weight: 700;
      display: none; align-items: center; justify-content: center;
    }
    .page-header {
      background: linear-gradient(rgba(15,23,42,0.8), rgba(15,23,42,0.8)), url('photos/e.jpeg') center/cover;
      padding: 4rem 1rem; text-align: center; color: white; margin: 10px; border-radius: var(--radius-lg);
    }
    .filters {
      display: flex; justify-content: space-between; align-items: center; margin: 2rem 0; flex-wrap: wrap; gap: 1rem;
      background: white; padding: 1.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow);
    }
    .filter-group { display: flex; gap: 1rem; flex-wrap: wrap; flex: 1; }
    .filter-select { padding: 0.8rem 1.2rem; border-radius: 100px; border: 1px solid #e2e8f0; background: white; font-family: 'Inter', sans-serif; cursor: pointer; font-size: 0.95rem; min-width: 160px; }
    .search-box { display: flex; align-items: center; background: white; border: 1px solid #e2e8f0; border-radius: 100px; padding: 0.3rem 0.3rem 0.3rem 1.2rem; flex: 1; min-width: 250px; }
    .search-box input { border: none; outline: none; padding: 0.5rem 0; width: 100%; font-family: 'Inter', sans-serif; font-size: 0.95rem; }
    .search-box button { background: var(--primary); border: none; color: white; padding: 0.6rem 1.2rem; border-radius: 100px; cursor: pointer; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
    .product-card {
      background: white; border-radius: var(--radius-lg); padding: 1.2rem; border: 1px solid #f1f5f9;
      transition: 0.4s; cursor: pointer; display: flex; flex-direction: column;
    }
    .product-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
    .stock-tag { position: absolute; top: 0.75rem; left: 0.75rem; padding: 0.2rem 0.55rem; border-radius: 100px; font-size: 0.65rem; font-weight: 700; z-index: 2; }
    .stock-tag.stocked { background: #dcfce7; color: #16a34a; }
    .stock-tag.low { background: #fff7ed; color: #ea580c; }
    .stock-tag.soldout { background: #fee2e2; color: #dc2626; }
    .card-img-wrap { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; background: var(--gray-100); border-radius: var(--radius-md); padding: 0.5rem; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .price { font-size: 1.25rem; font-weight: 800; color: var(--primary); margin: 0.4rem 0; }
    .btn { display: inline-block; padding: 0.75rem 1.2rem; border-radius: 100px; font-weight: 600; text-decoration: none; border: none; cursor: pointer; font-size: 0.88rem; margin-top: auto; font-family: 'Inter', sans-serif; }
    .btn-primary { background: var(--primary); color: white; width: 100%; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .pagination { display: flex; justify-content: center; gap: 0.5rem; margin: 3rem 0; }
    .page-item { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: white; border: 1px solid #e2e8f0; cursor: pointer; }
    .page-item.active { background: var(--primary); color: white; }
    /* Modal styles (product detail) */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 2000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: var(--radius-lg); max-width: 1000px; width: 95%; max-height: 90vh; overflow-y: auto; position: relative; }
    .modal-close { position: sticky; top: 1rem; float: right; width: 36px; height: 36px; border-radius: 50%; background: white; border: none; cursor: pointer; margin: 1rem; }
    .product-details { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; padding: 2rem; }
    .cart-action-row { display: flex; gap: 10px; align-items: center; margin-top: 1.2rem; }
    .qty-selector { display: flex; border: 1px solid var(--gray-200); border-radius: 100px; overflow: hidden; }
    .qty-btn { width: 38px; height: 38px; border: none; background: var(--gray-100); cursor: pointer; }
    /* Cart sidebar */
    .cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; }
    .cart-overlay.show { display: block; }
    .cart-sidebar { position: fixed; top: 0; right: -420px; width: 400px; height: 100vh; background: white; z-index: 3001; transition: right 0.35s; display: flex; flex-direction: column; }
    .cart-sidebar.open { right: 0; }
    .cart-header { display: flex; justify-content: space-between; padding: 1.5rem; border-bottom: 1px solid var(--gray-200); }
    .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
    .cart-footer { padding: 1.5rem; border-top: 1px solid var(--gray-200); }
    .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: white; border-radius: 100px; padding: 1rem; text-align: center; transition: 0.3s; transform: translateY(150%); z-index: 9999; max-width: 380px; margin: 0 auto; }
    .toast.show { transform: translateY(0); }
    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      .nav-links { display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; flex-direction: column; }
      .nav-links.show { display: flex; }
      .product-details { grid-template-columns: 1fr; }
      .cart-sidebar { width: 100%; right: -100%; }
    }
  </style>
</head>
<body>
<nav>
  <div class="container">
    <a href="index.html" class="logo-link"><img class="logo-img" src="photos/logo.png" alt="logo"><span class="logo-text">BMB Electronics</span></a>
    <div class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a><a href="store.html" class="active">Store</a><a href="contact.html">Contact</a><a href="#" id="accountLink">Account</a>
    </div>
    <div class="nav-icons">
      <div class="cart-icon-wrap" onclick="openCart()"><i class="fa-solid fa-cart-shopping"></i><span class="cart-badge" id="cartBadge">0</span></div>
      <a href="#" id="accountIcon"><i class="fa-regular fa-circle-user"></i></a>
    </div>
  </div>
</nav>
<section class="page-header"><div class="container"><h1>Our Store</h1><p>Phones · Laptops · Accessories</p></div></section>
<div class="container">
  <div class="filters">
    <div class="filter-group">
      <select class="filter-select" id="categoryFilter" onchange="filterProducts()"><option value="all">All Categories</option></select>
      <select class="filter-select" id="brandFilter" onchange="filterProducts()"><option value="all">All Brands</option></select>
      <select class="filter-select" id="sortFilter" onchange="filterProducts()"><option value="featured">Featured</option><option value="price-low">Price: Low to High</option><option value="price-high">Price: High to Low</option></select>
    </div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="Search..." onkeyup="if(event.key==='Enter') filterProducts()"><button onclick="filterProducts()"><i class="fa-solid fa-search"></i></button></div>
  </div>
  <div class="product-grid" id="productGrid"><div style="text-align:center;padding:3rem;"><div class="loading-spinner"></div></div></div>
  <div class="pagination" id="pagination"></div>
</div>
<div class="modal" id="productModal"><div class="modal-content"><button class="modal-close" onclick="closeProductModal()"><i class="fa-solid fa-times"></i></button><div class="product-details" id="productDetails"></div></div></div>
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-sidebar" id="cartSidebar"><div class="cart-header"><h3>Your Cart</h3><button class="cart-close" onclick="closeCart()"><i class="fa-solid fa-times"></i></button></div><div class="cart-items" id="cartItemsContainer"></div><div class="cart-footer" id="cartFooter" style="display:none"><div class="cart-total"><span>Total</span><span id="cartTotalAmount">K0</span></div><button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button></div></div>
<div class="toast" id="toast"><i class="fa-regular fa-circle-check"></i><span id="toastMsg"></span></div>
<script type="module">
  import { auth, db } from './js/firebase-config.js';
  import { collection, getDocs, query, orderBy, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { observeAuthState } from './js/auth.js';
  let allProducts = [], filteredProducts = [], currentPage = 1, PER_PAGE = 12;
  let cartItems = [], modalProduct = null, modalSelectedStorage = null, modalSelectedColor = null, modalQty = 1;
  const COLOR_MAP = { black:'#1a1a1a', white:'#f0f0f0', silver:'#b0b0b0', gold:'#c9a84c', blue:'#2563eb', red:'#dc2626', green:'#16a34a', purple:'#7c3aed', gray:'#9ca3af' };
  function getHex(c) { return COLOR_MAP[c?.toLowerCase()] || '#888'; }
  window.toggleMenu = () => document.getElementById('navLinks').classList.toggle('show');
  function handleAccountClick() { auth.currentUser ? (window.location.href='profile.html') : (confirm('Please login') && (window.location.href='login.html')); }
  document.getElementById('accountLink').onclick = e => { e.preventDefault(); handleAccountClick(); };
  document.getElementById('accountIcon').onclick = e => { e.preventDefault(); handleAccountClick(); };
  observeAuthState(user => { document.querySelector('#accountIcon i').className = user ? 'fa-solid fa-circle-user' : 'fa-regular fa-circle-user'; if(user) loadCartFromFirestore(); });
  async function loadProducts() {
    const snap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
    allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    populateDropdowns(); filteredProducts = [...allProducts]; displayProducts();
  }
  function populateDropdowns() {
    const cats = [...new Set(allProducts.map(p=>p.category).filter(Boolean))].sort();
    const brands = [...new Set(allProducts.map(p=>p.brand).filter(Boolean))].sort();
    document.getElementById('categoryFilter').innerHTML = '<option value="all">All Categories</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
    document.getElementById('brandFilter').innerHTML = '<option value="all">All Brands</option>' + brands.map(b=>`<option value="${b}">${b}</option>`).join('');
  }
  function displayProducts() {
    const start = (currentPage-1)*PER_PAGE, page = filteredProducts.slice(start, start+PER_PAGE);
    document.getElementById('productGrid').innerHTML = page.map(p => `
      <div class="product-card" onclick="openProductModal('${p.id}')">
        <div class="stock-tag ${p.stock<=0?'soldout':p.stock<5?'low':'stocked'}">${p.stock<=0?'Out of Stock':p.stock<5?`Low (${p.stock})`:'In Stock'}</div>
        <div class="card-img-wrap">${p.images?.[0] ? `<img src="${p.images[0]}" alt="${p.name}">` : '<div>📦</div>'}</div>
        <h3>${escapeHtml(p.name)}</h3><div class="price">K${p.price.toLocaleString()}</div>
        <button class="btn btn-primary" onclick="event.stopPropagation(); quickAddToCart('${p.id}')" ${p.stock<=0?'disabled':''}>Add to Cart</button>
      </div>`).join('');
    updatePagination();
  }
  function escapeHtml(s) { return s?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) || ''; }
  function updatePagination() { /* simplified */ }
  window.filterProducts = () => { /* apply filters */ filteredProducts = [...allProducts]; currentPage=1; displayProducts(); };
  window.openProductModal = (id) => { /* show modal with details */ };
  window.closeProductModal = () => { document.getElementById('productModal').classList.remove('show'); };
  window.quickAddToCart = async (productId) => { /* add to cart */ };
  async function loadCartFromFirestore() { const snap = await getDoc(doc(db, "users", auth.currentUser.uid)); cartItems = snap.data()?.cart || []; updateCartUI(); }
  async function saveCartToFirestore() { await updateDoc(doc(db, "users", auth.currentUser.uid), { cart: cartItems }); }
  function updateCartUI() { const total = cartItems.reduce((s,i)=>s+i.qty,0); document.getElementById('cartBadge').style.display = total ? 'flex' : 'none'; document.getElementById('cartBadge').innerText = total; }
  window.openCart = () => { renderCartSidebar(); document.getElementById('cartSidebar').classList.add('open'); document.getElementById('cartOverlay').classList.add('show'); };
  window.closeCart = () => { document.getElementById('cartSidebar').classList.remove('open'); document.getElementById('cartOverlay').classList.remove('show'); };
  function renderCartSidebar() { /* render items */ }
  loadProducts();
</script>
</body>
</html>
