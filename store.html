<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BMB Electronics | Store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #00bcd4; --primary-dark: #0097a7; --dark: #0f172a;
      --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-400: #94a3b8;
      --white: #ffffff; --radius-lg: 1.5rem; --radius-md: 1rem;
      --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--dark); }
    .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }

    /* ── NAV ── */
    nav { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); padding: 0.8rem 0; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    nav .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .logo-link { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-img { height: 32px; width: auto; }
    .logo-text { font-size: 1.3rem; font-weight: 800; color: var(--dark); letter-spacing: -1px; }
    .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { text-decoration: none; color: var(--dark); font-weight: 500; transition: 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: var(--primary); }
    .nav-icons { display: flex; gap: 1.2rem; font-size: 1.2rem; align-items: center; }
    .cart-icon-wrap { position: relative; cursor: pointer; }
    .cart-badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 700; display: none; align-items: center; justify-content: center; }

    /* ── PAGE HEADER ── */
    .page-header { background: url('photos/e.jpeg') center/cover no-repeat; padding: 4rem 1rem; text-align: center; color: white; margin: 10px; border-radius: var(--radius-lg); position: relative; }
    .page-header .overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.75); border-radius: var(--radius-lg); }
    .page-header .inner { position: relative; z-index: 1; }
    .page-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }

    /* ── FILTERS ── */
    .filters { display: flex; justify-content: space-between; align-items: center; margin: 2rem 0; flex-wrap: wrap; gap: 1rem; background: white; padding: 1.25rem 1.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow); }
    .filter-group { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .filter-select { padding: 0.65rem 1.1rem; border-radius: 100px; border: 1.5px solid var(--gray-200); background: white; font-family: 'Inter', sans-serif; cursor: pointer; font-size: 0.9rem; outline: none; }
    .filter-select:focus { border-color: var(--primary); }
    .search-box { display: flex; align-items: center; background: white; border: 1.5px solid var(--gray-200); border-radius: 100px; padding: 0.3rem 0.4rem 0.3rem 1.1rem; flex: 1; min-width: 240px; }
    .search-box input { border: none; outline: none; padding: 0.45rem 0; width: 100%; font-family: 'Inter', sans-serif; }
    .search-box button { background: var(--primary); border: none; color: white; padding: 0.55rem 1.1rem; border-radius: 100px; cursor: pointer; }

    /* ── PRODUCT GRID ── */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1.25rem; margin-bottom: 3rem; }
    .product-card { background: white; border-radius: var(--radius-lg); border: 1.5px solid var(--gray-200); transition: 0.3s; cursor: pointer; overflow: hidden; }
    .product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .card-img-wrap { height: 210px; display: flex; align-items: center; justify-content: center; background: var(--gray-100); padding: 1rem; position: relative; }
    .card-img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .card-body { padding: 1rem 1.1rem 1.1rem; }
    .card-brand { font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; }
    .card-name { font-size: 0.92rem; font-weight: 600; margin: 4px 0; }
    .card-price-row { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 0.5rem; }
    .card-price { font-size: 1.2rem; font-weight: 800; color: var(--dark); }
    .card-old-price { font-size: 0.85rem; color: var(--gray-400); text-decoration: line-through; }

    /* Color dots on card */
    .card-colors { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
    .card-color-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 1.5px solid rgba(0,0,0,0.1);
      background-size: cover; background-position: center;
      flex-shrink: 0;
    }
    .card-color-more { font-size: 0.72rem; color: var(--gray-400); align-self: center; }

    /* Storage chips on card */
    .card-storages { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.8rem; }
    .card-storage-chip { font-size: 0.7rem; padding: 0.2rem 0.55rem; border: 1px solid var(--gray-200); border-radius: 100px; color: var(--gray-400); }

    .btn-add { padding: 0.6rem; width: 100%; background: var(--primary); color: white; border: none; border-radius: 100px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; transition: 0.2s; }
    .btn-add:hover { background: var(--primary-dark); }
    .btn-add:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }

    /* ── PRODUCT MODAL ── */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); z-index: 2000; align-items: center; justify-content: center; padding: 1rem; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: var(--radius-lg); max-width: 960px; width: 100%; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .modal-top { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--gray-200); }
    .modal-crumb { font-size: 0.8rem; color: var(--gray-400); }
    .modal-close { width: 34px; height: 34px; border-radius: 50%; background: var(--gray-100); border: none; cursor: pointer; font-size: 1rem; transition: 0.2s; }
    .modal-close:hover { background: #fee2e2; color: #ef4444; }
    .modal-body { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
    .modal-gallery { background: var(--gray-100); display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .modal-gallery img { max-width: 100%; max-height: 300px; object-fit: contain; transition: 0.3s; }
    .modal-info { padding: 1.75rem; overflow-y: auto; }
    .modal-brand { font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; }
    .modal-name { font-size: 1.4rem; font-weight: 800; margin: 6px 0; }
    .modal-price-row { display: flex; align-items: baseline; gap: 0.75rem; margin-bottom: 1rem; }
    .modal-price { font-size: 1.85rem; font-weight: 800; }
    .modal-old-price { font-size: 1rem; color: var(--gray-400); text-decoration: line-through; }

    .opt-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; color: var(--gray-400); margin: 0.9rem 0 0.5rem; letter-spacing: 0.04em; }
    .opt-value { font-size: 0.85rem; font-weight: 600; color: var(--dark); display: inline; }

    /* Color swatches — show image thumbnail */
    .color-swatches { display: flex; gap: 0.55rem; flex-wrap: wrap; }
    .color-swatch {
      width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
      border: 2.5px solid transparent; transition: 0.2s;
      background-size: cover; background-position: center;
      position: relative; overflow: hidden;
    }
    .color-swatch:hover { transform: scale(1.05); }
    .color-swatch.selected { border-color: var(--primary); box-shadow: 0 0 0 2px white, 0 0 0 4px var(--primary); }
    .color-swatch-label { font-size: 0.78rem; color: var(--gray-400); margin-top: 0.4rem; }

    /* Storage chips */
    .storage-options { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .storage-chip {
      padding: 0.5rem 1rem; border: 1.5px solid var(--gray-200); border-radius: 100px;
      cursor: pointer; font-size: 0.85rem; transition: 0.2s; font-family: 'Inter', sans-serif;
      background: white;
    }
    .storage-chip:hover:not(.out-of-stock) { border-color: var(--primary); }
    .storage-chip.selected { border-color: var(--primary); background: rgba(0,188,212,0.1); color: var(--primary); font-weight: 600; }
    .storage-chip.out-of-stock { opacity: 0.45; cursor: not-allowed; text-decoration: line-through; }

    .qty-row { display: flex; align-items: center; gap: 0.5rem; margin: 1rem 0; }
    .qty-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--gray-200); background: white; cursor: pointer; font-weight: 700; font-size: 1rem; transition: 0.2s; }
    .qty-btn:hover { border-color: var(--primary); color: var(--primary); }
    .qty-display { font-size: 1rem; font-weight: 700; min-width: 28px; text-align: center; }
    .stock-note { font-size: 0.78rem; color: var(--gray-400); }

    .modal-add-btn {
      width: 100%; padding: 0.9rem; border-radius: 100px; background: var(--primary);
      color: white; border: none; font-weight: 700; cursor: pointer; margin-top: 1rem;
      font-family: 'Inter', sans-serif; font-size: 0.95rem; transition: 0.2s;
    }
    .modal-add-btn:hover:not(:disabled) { background: var(--primary-dark); }
    .modal-add-btn:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }

    /* ── CART SIDEBAR ── */
    .cart-sidebar { position: fixed; top: 0; right: -420px; width: 400px; height: 100vh; background: white; z-index: 3001; transition: right 0.35s; display: flex; flex-direction: column; box-shadow: -4px 0 20px rgba(0,0,0,0.1); }
    .cart-sidebar.open { right: 0; }
    .cart-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; }
    .cart-header h3 { font-size: 1.1rem; font-weight: 700; }
    .cart-close-btn { width: 34px; height: 34px; border: none; background: var(--gray-100); border-radius: 50%; cursor: pointer; font-size: 1rem; }
    .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
    .cart-item { display: flex; gap: 0.8rem; padding: 0.8rem; background: var(--gray-100); border-radius: var(--radius-md); margin-bottom: 0.6rem; }
    .cart-item-img { width: 60px; height: 60px; object-fit: contain; background: white; border-radius: 8px; padding: 4px; flex-shrink: 0; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 2px; }
    .cart-item-variant { font-size: 0.72rem; color: var(--gray-400); margin-bottom: 4px; }
    .cart-item-price { font-weight: 800; font-size: 0.9rem; }
    .cart-item-controls { display: flex; align-items: center; gap: 0.3rem; }
    .cart-item-controls button { width: 26px; height: 26px; border: 1.5px solid var(--gray-200); border-radius: 50%; background: white; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; }
    .cart-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--gray-200); }
    .cart-totals { margin-bottom: 1rem; font-size: 0.88rem; }
    .cart-totals-row { display: flex; justify-content: space-between; padding: 0.25rem 0; color: var(--gray-400); }
    .cart-totals-row.total { font-size: 1rem; font-weight: 800; color: var(--dark); border-top: 1.5px solid var(--gray-200); margin-top: 0.5rem; padding-top: 0.5rem; }
    .checkout-btn { width: 100%; padding: 0.9rem; background: var(--primary); color: white; border: none; border-radius: 100px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.95rem; }
    .checkout-btn:hover { background: var(--primary-dark); }

    /* ── CART NOTIF ── */
    .cart-notif { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--dark); color: white; padding: 0.8rem 1.4rem; border-radius: 100px; display: flex; gap: 0.8rem; align-items: center; z-index: 9999; transition: 0.35s; opacity: 0; font-size: 0.88rem; }
    .cart-notif.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── SELECT PROMPT ── */
    .select-prompt { font-size: 0.82rem; color: var(--gray-400); font-style: italic; margin-top: 0.3rem; }

    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      .nav-links { display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; flex-direction: column; padding: 1rem; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
      .nav-links.show { display: flex; }
      .modal-body { grid-template-columns: 1fr; overflow-y: auto; }
      .modal-gallery { min-height: 200px; }
      .cart-sidebar { width: 100%; right: -100%; }
    }
  </style>
</head>
<body>

<nav>
  <div class="container">
    <a href="index.html" class="logo-link">
      <img class="logo-img" src="photos/logo.png" alt="BMB Electronics">
      <span class="logo-text">BMB Electronics</span>
    </a>
    <div class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="store.html" class="active">Store</a>
      <a href="contact.html">Contact</a>
      <a href="#" id="accountLink">Account</a>
    </div>
    <div class="nav-icons">
      <div class="cart-icon-wrap" onclick="openCart()">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartBadge">0</span>
      </div>
      <a href="#" id="accountIcon"><i class="fa-regular fa-circle-user"></i></a>
    </div>
  </div>
</nav>

<section class="page-header">
  <div class="overlay"></div>
  <div class="inner">
    <h1>Our Store</h1>
    <p>Phones · Laptops · Tablets · Accessories</p>
  </div>
</section>

<div class="container">
  <div class="filters">
    <div class="filter-group">
      <select class="filter-select" id="categoryFilter" onchange="filterProducts()">
        <option value="all">All Categories</option>
      </select>
      <select class="filter-select" id="brandFilter" onchange="filterProducts()">
        <option value="all">All Brands</option>
      </select>
      <select class="filter-select" id="sortFilter" onchange="filterProducts()">
        <option value="featured">Featured</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
      </select>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search products…" oninput="filterProducts()">
      <button onclick="filterProducts()"><i class="fa-solid fa-search"></i></button>
    </div>
  </div>

  <div class="product-grid" id="productGrid">
    <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gray-400)">
      <i class="fa-solid fa-spinner fa-spin" style="font-size:2rem;display:block;margin-bottom:1rem"></i>Loading products…
    </div>
  </div>
</div>

<!-- ── PRODUCT MODAL ── -->
<div class="modal" id="productModal">
  <div class="modal-content">
    <div class="modal-top">
      <span class="modal-crumb" id="modalCrumb"></span>
      <button class="modal-close" onclick="closeProductModal()"><i class="fa-solid fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-gallery">
        <img id="modalImage" src="" alt="" onerror="this.src='https://placehold.co/300x300?text=No+Image'">
      </div>
      <div class="modal-info" id="modalInfo"></div>
    </div>
  </div>
</div>

<!-- ── CART SIDEBAR ── -->
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3><i class="fa-solid fa-cart-shopping" style="color:var(--primary)"></i> Your Cart</h3>
    <button class="cart-close-btn" onclick="closeCart()"><i class="fa-solid fa-times"></i></button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-totals" id="cartTotals"></div>
    <button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
  </div>
</div>

<div class="cart-notif" id="cartNotif">
  <i class="fa-solid fa-circle-check"></i>
  <span id="notifMsg">Added to cart</span>
</div>

<!-- ═══════════════ SCRIPT ═══════════════ -->
<script type="module">
import { auth, db } from './js/firebase-config.js';
import { collection, getDocs, query, orderBy, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { observeAuthState } from './js/auth.js';

let allProducts = [], filteredProducts = [];
let cartItems = [];
let notifTimer = null;

/* ── Modal state ── */
let modalProduct = null;
let selectedColor = null;   // color name string
let selectedStorage = null; // storage string
let modalQty = 1;

/* ── Auth & nav ── */
window.toggleMenu = () => document.getElementById('navLinks').classList.toggle('show');
function handleAccount() {
  auth.currentUser ? window.location.href = 'profile.html' : (confirm('Please log in to continue.') && (window.location.href = 'login.html'));
}
document.getElementById('accountLink').onclick = e => { e.preventDefault(); handleAccount(); };
document.getElementById('accountIcon').onclick = e => { e.preventDefault(); handleAccount(); };

observeAuthState(async user => {
  document.querySelector('#accountIcon i').className = user ? 'fa-solid fa-circle-user' : 'fa-regular fa-circle-user';
  if (user) await loadCart();
});

/* ── Load products ── */
async function loadProducts() {
  const snap = await getDocs(query(collection(db, 'products'), orderBy('createdAt', 'desc')));
  allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  populateFilters();
  filteredProducts = [...allProducts];
  displayProducts();
}

function populateFilters() {
  const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
  document.getElementById('categoryFilter').innerHTML =
    '<option value="all">All Categories</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
  const brands = [...new Set(allProducts.map(p => p.brand).filter(Boolean))];
  document.getElementById('brandFilter').innerHTML =
    '<option value="all">All Brands</option>' + brands.map(b => `<option value="${b}">${b}</option>`).join('');
}

/* ─────────────────────────────────────────────
   PRODUCT CARD
   Shows: first color image, all color dots,
   all unique storage sizes, price
───────────────────────────────────────────── */
function displayProducts() {
  const grid = document.getElementById('productGrid');
  if (!filteredProducts.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gray-400)">No products found.</div>';
    return;
  }

  grid.innerHTML = filteredProducts.map(p => {
    const firstImg = p.variants?.[0]?.imageUrl || '';

    // Unique colors (up to 4 shown + overflow label)
    const colors = getUniqueColors(p);
    const visibleColors = colors.slice(0, 4);
    const extraColors = colors.length > 4 ? colors.length - 4 : 0;
    const colorDots = visibleColors.map(c =>
      `<div class="card-color-dot" style="background-image:url(${c.imageUrl})" title="${c.color}"></div>`
    ).join('') + (extraColors ? `<span class="card-color-more">+${extraColors}</span>` : '');

    // Unique storage sizes across ALL colors
    const storages = getUniqueStorages(p);
    const storageChips = storages.slice(0, 4).map(s =>
      `<span class="card-storage-chip">${s}</span>`
    ).join('');

    const totalStock = getTotalStock(p);
    const isOutOfStock = totalStock <= 0;

    return `
      <div class="product-card" onclick="openProductModal('${p.id}')">
        <div class="card-img-wrap">
          <img src="${firstImg}" alt="${p.name}" onerror="this.src='https://placehold.co/200x200?text=No+Image'">
        </div>
        <div class="card-body">
          <div class="card-brand">${p.brand || ''}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-price-row">
            <span class="card-price">K${(p.price || 0).toLocaleString()}</span>
            ${p.oldPrice ? `<span class="card-old-price">K${p.oldPrice.toLocaleString()}</span>` : ''}
          </div>
          ${colors.length ? `<div class="card-colors">${colorDots}</div>` : ''}
          ${storages.length ? `<div class="card-storages">${storageChips}</div>` : ''}
          <button class="btn-add" onclick="event.stopPropagation(); quickAdd('${p.id}')"
            ${isOutOfStock ? 'disabled' : ''}>
            ${isOutOfStock ? 'Out of Stock' : '<i class="fa-solid fa-cart-plus"></i> Add to Cart'}
          </button>
        </div>
      </div>`;
  }).join('');
}

/* ── Filter / sort ── */
window.filterProducts = () => {
  const cat = document.getElementById('categoryFilter').value;
  const brand = document.getElementById('brandFilter').value;
  const sort = document.getElementById('sortFilter').value;
  const q = document.getElementById('searchInput').value.toLowerCase();

  filteredProducts = allProducts.filter(p =>
    (cat === 'all' || p.category === cat) &&
    (brand === 'all' || p.brand === brand) &&
    (!q || p.name?.toLowerCase().includes(q))
  );
  if (sort === 'price-low') filteredProducts.sort((a, b) => a.price - b.price);
  if (sort === 'price-high') filteredProducts.sort((a, b) => b.price - a.price);
  displayProducts();
};

/* ─────────────────────────────────────────────
   PRODUCT MODAL
   Step 1: User sees image of first color + ALL
           color swatches + ALL unique storages
   Step 2: User picks a color → image updates,
           storage chips update to that color's options
   Step 3: User picks storage → qty + Add btn enabled
───────────────────────────────────────────── */
window.openProductModal = (id) => {
  modalProduct = allProducts.find(p => p.id === id);
  if (!modalProduct) return;

  // Start with first color pre-selected
  const colors = getUniqueColors(modalProduct);
  selectedColor = colors[0]?.color || null;
  selectedStorage = null;
  modalQty = 1;

  renderModal();
  document.getElementById('productModal').classList.add('show');
};

function renderModal() {
  const colors = getUniqueColors(modalProduct);
  const currentVariant = modalProduct.variants?.find(v => v.color === selectedColor);

  // Update gallery image
  const imgEl = document.getElementById('modalImage');
  if (imgEl) imgEl.src = currentVariant?.imageUrl || 'https://placehold.co/300x300?text=No+Image';

  // Crumb
  document.getElementById('modalCrumb').textContent = `${modalProduct.brand || ''} · ${modalProduct.type || modalProduct.category || ''}`;

  // Storage options for selected color
  const storageOptions = currentVariant?.storageOptions || [];
  const selectedStockCount = storageOptions.find(o => o.storage === selectedStorage)?.stock || 0;

  // Color swatches HTML
  const swatchesHtml = colors.map(c => `
    <div class="color-swatch ${c.color === selectedColor ? 'selected' : ''}"
      style="background-image:url(${c.imageUrl})"
      title="${c.color}"
      onclick="selectColor('${c.color}')"></div>
  `).join('');

  // Storage chips — only show if a color is selected
  let storageHtml = '';
  if (selectedColor && storageOptions.length) {
    storageHtml = `
      <div class="opt-label">Storage <span class="opt-value">${selectedStorage || ''}</span></div>
      <div class="storage-options">
        ${storageOptions.map(opt => `
          <button class="storage-chip ${opt.storage === selectedStorage ? 'selected' : ''} ${opt.stock <= 0 ? 'out-of-stock' : ''}"
            onclick="selectStorage('${opt.storage}')"
            ${opt.stock <= 0 ? 'disabled' : ''}>
            ${opt.storage}
            ${opt.stock <= 0 ? ' · Out of stock' : opt.stock <= 5 ? ` · ${opt.stock} left` : ''}
          </button>`).join('')}
      </div>`;
  } else if (selectedColor && !storageOptions.length) {
    storageHtml = `<div class="opt-label">Storage</div><p class="select-prompt">No storage options available.</p>`;
  } else {
    storageHtml = `<div class="opt-label">Storage</div><p class="select-prompt">Select a color first.</p>`;
  }

  // Qty + add button
  const canAdd = selectedColor && selectedStorage && selectedStockCount > 0;
  const qtyHtml = canAdd ? `
    <div class="qty-row">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <span class="qty-display" id="modalQtyDisplay">${modalQty}</span>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
      <span class="stock-note">${selectedStockCount} in stock</span>
    </div>` : '';

  document.getElementById('modalInfo').innerHTML = `
    <div class="modal-brand">${modalProduct.brand || ''}</div>
    <div class="modal-name">${modalProduct.name}</div>
    <div class="modal-price-row">
      <span class="modal-price">K${(modalProduct.price || 0).toLocaleString()}</span>
      ${modalProduct.oldPrice ? `<span class="modal-old-price">K${modalProduct.oldPrice.toLocaleString()}</span>` : ''}
    </div>
    ${modalProduct.shortDesc ? `<p style="font-size:0.88rem;color:var(--gray-400);margin-bottom:1rem;line-height:1.5">${modalProduct.shortDesc}</p>` : ''}

    <div class="opt-label">Color <span class="opt-value">${selectedColor || ''}</span></div>
    <div class="color-swatches">${swatchesHtml}</div>

    ${storageHtml}
    ${qtyHtml}

    <button class="modal-add-btn" onclick="addFromModal()" ${!canAdd ? 'disabled' : ''}>
      ${canAdd ? `<i class="fa-solid fa-cart-plus"></i> Add to Cart` : `Select color &amp; storage`}
    </button>
  `;
}

/* ── Color selection → update image + storage ── */
window.selectColor = (color) => {
  selectedColor = color;
  selectedStorage = null;
  modalQty = 1;
  // Animate image swap
  const imgEl = document.getElementById('modalImage');
  if (imgEl) { imgEl.style.opacity = '0'; setTimeout(() => { imgEl.style.opacity = '1'; }, 150); }
  renderModal();
};

/* ── Storage selection ── */
window.selectStorage = (storage) => {
  selectedStorage = storage;
  modalQty = 1;
  renderModal();
};

/* ── Qty ── */
window.changeQty = (delta) => {
  if (!selectedColor || !selectedStorage) return;
  const variant = modalProduct.variants?.find(v => v.color === selectedColor);
  const stock = variant?.storageOptions?.find(o => o.storage === selectedStorage)?.stock || 0;
  modalQty = Math.max(1, Math.min(stock, modalQty + delta));
  const el = document.getElementById('modalQtyDisplay');
  if (el) el.textContent = modalQty;
};

/* ── Add from modal ── */
window.addFromModal = async () => {
  if (!selectedColor || !selectedStorage || !modalProduct) return;
  const variant = modalProduct.variants?.find(v => v.color === selectedColor);
  const opt = variant?.storageOptions?.find(o => o.storage === selectedStorage);
  if (!opt || opt.stock < modalQty) { alert('Not enough stock.'); return; }

  await addToCart({
    id: modalProduct.id,
    name: modalProduct.name,
    price: modalProduct.price,
    color: selectedColor,
    storage: selectedStorage,
    image: variant.imageUrl,
    qty: modalQty
  });
  showNotif(`${modalProduct.name} · ${selectedColor} · ${selectedStorage}`);
  closeProductModal();
};

/* ── Quick add (first color + first available storage) ── */
window.quickAdd = async (id) => {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const firstVariant = p.variants?.[0];
  if (!firstVariant) return;
  const firstStorage = firstVariant.storageOptions?.find(o => o.stock > 0);
  if (!firstStorage) { alert('This product is out of stock.'); return; }
  await addToCart({
    id: p.id, name: p.name, price: p.price,
    color: firstVariant.color, storage: firstStorage.storage,
    image: firstVariant.imageUrl, qty: 1
  });
  showNotif(`${p.name} · ${firstVariant.color} · ${firstStorage.storage}`);
};

window.closeProductModal = () => document.getElementById('productModal').classList.remove('show');

/* ─────────────────────────────────────────────
   CART
───────────────────────────────────────────── */
async function addToCart(item) {
  const key = `${item.id}|${item.color}|${item.storage}`;
  const existing = cartItems.find(c => `${c.id}|${c.color}|${c.storage}` === key);
  if (existing) existing.qty += item.qty;
  else cartItems.push({ ...item });
  updateCartBadge();
  await saveCart();
}

async function loadCart() {
  if (!auth.currentUser) return;
  const snap = await getDoc(doc(db, 'users', auth.currentUser.uid));
  cartItems = snap.data()?.cart || [];
  updateCartBadge();
}

async function saveCart() {
  if (auth.currentUser) await updateDoc(doc(db, 'users', auth.currentUser.uid), { cart: cartItems });
}

function updateCartBadge() {
  const total = cartItems.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.style.display = total ? 'flex' : 'none';
  badge.textContent = total > 99 ? '99+' : total;
}

function showNotif(msg) {
  const el = document.getElementById('cartNotif');
  document.getElementById('notifMsg').textContent = msg;
  el.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

window.openCart = () => { renderCart(); document.getElementById('cartSidebar').classList.add('open'); };
window.closeCart = () => document.getElementById('cartSidebar').classList.remove('open');

function renderCart() {
  const container = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  if (!cartItems.length) {
    container.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--gray-400)"><i class="fa-solid fa-cart-shopping" style="font-size:2.5rem;display:block;margin-bottom:1rem;opacity:0.3"></i>Your cart is empty</div>';
    footer.style.display = 'none';
    return;
  }
  let sub = 0;
  container.innerHTML = cartItems.map((item, idx) => {
    sub += item.price * item.qty;
    return `<div class="cart-item">
      <img class="cart-item-img" src="${item.image || ''}" alt="${item.name}" onerror="this.src='https://placehold.co/60x60'">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-variant">${item.color} · ${item.storage}</div>
        <div class="cart-item-price">K${(item.price * item.qty).toLocaleString()}</div>
      </div>
      <div>
        <div class="cart-item-controls">
          <button onclick="updateCartQty(${idx},-1)">−</button>
          <span style="font-size:0.85rem;font-weight:700;min-width:18px;text-align:center">${item.qty}</span>
          <button onclick="updateCartQty(${idx},1)">+</button>
        </div>
        <button onclick="removeCartItem(${idx})" style="margin-top:0.4rem;background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:0.85rem;width:100%">
          <i class="fa-regular fa-trash-can"></i>
        </button>
      </div>
    </div>`;
  }).join('');

  const ship = 50, tax = Math.round(sub * 0.16), total = sub + ship + tax;
  document.getElementById('cartTotals').innerHTML = `
    <div class="cart-totals-row"><span>Subtotal</span><span>K${sub.toLocaleString()}</span></div>
    <div class="cart-totals-row"><span>Shipping</span><span>K${ship}</span></div>
    <div class="cart-totals-row"><span>Tax (16%)</span><span>K${tax.toLocaleString()}</span></div>
    <div class="cart-totals-row total"><span>Total</span><span>K${total.toLocaleString()}</span></div>
  `;
  footer.style.display = 'block';
}

window.updateCartQty = async (idx, delta) => {
  const nq = cartItems[idx].qty + delta;
  if (nq < 1) return;
  cartItems[idx].qty = nq;
  await saveCart(); updateCartBadge(); renderCart();
};
window.removeCartItem = async (idx) => {
  cartItems.splice(idx, 1);
  await saveCart(); updateCartBadge(); renderCart();
};

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
// Unique colors preserving order, deduped by color name
function getUniqueColors(p) {
  const seen = new Set();
  const result = [];
  for (const v of (p.variants || [])) {
    if (!seen.has(v.color)) {
      seen.add(v.color);
      result.push({ color: v.color, imageUrl: v.imageUrl });
    }
  }
  return result;
}

// All unique storage sizes across ALL color variants (for card display)
function getUniqueStorages(p) {
  const seen = new Set();
  for (const v of (p.variants || [])) {
    for (const o of (v.storageOptions || [])) {
      if (o.storage) seen.add(o.storage);
    }
  }
  return [...seen];
}

function getTotalStock(p) {
  return (p.variants || []).reduce((s, v) =>
    s + (v.storageOptions || []).reduce((ss, o) => ss + (o.stock || 0), 0), 0);
}

loadProducts();
</script>
