<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BMB Electronics | Store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --primary:#00bcd4;--primary-dark:#0097a7;--dark:#0f172a;
      --gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-400:#94a3b8;
      --radius-lg:1.5rem;--radius-md:1rem;--shadow:0 10px 15px -3px rgba(0,0,0,0.1);
    }
    body{font-family:'Inter',sans-serif;background:#fff;color:var(--dark);}
    .container{width:90%;max-width:1200px;margin:0 auto;padding:0 15px;}

    /* NAV */
    nav{background:rgba(255,255,255,0.98);backdrop-filter:blur(10px);padding:0.8rem 0;position:sticky;top:0;z-index:1000;border-bottom:1px solid rgba(0,0,0,0.05);}
    nav .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
    .logo-link{display:flex;align-items:center;gap:8px;text-decoration:none;}
    .logo-img{height:32px;width:auto;}
    .logo-text{font-size:1.3rem;font-weight:800;color:var(--dark);letter-spacing:-1px;}
    .menu-toggle{display:none;font-size:1.5rem;cursor:pointer;}
    .nav-links{display:flex;gap:2rem;}
    .nav-links a{text-decoration:none;color:var(--dark);font-weight:500;transition:0.3s;}
    .nav-links a:hover,.nav-links a.active{color:var(--primary);}
    .nav-icons{display:flex;gap:1.2rem;font-size:1.2rem;align-items:center;}
    .cart-icon-wrap{position:relative;cursor:pointer;}
    .cart-badge{position:absolute;top:-8px;right:-8px;background:#ef4444;color:white;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;}

    /* PAGE HEADER */
    .page-header{background:url('photos/e.jpeg') center/cover no-repeat;padding:4rem 1rem;text-align:center;color:white;margin:10px;border-radius:var(--radius-lg);position:relative;}
    .page-header .overlay{position:absolute;inset:0;background:rgba(15,23,42,0.75);border-radius:var(--radius-lg);}
    .page-header .inner{position:relative;z-index:1;}
    .page-header h1{font-size:2.5rem;font-weight:800;margin-bottom:0.5rem;}

    /* FILTERS */
    .filters{display:flex;justify-content:space-between;align-items:center;margin:2rem 0;flex-wrap:wrap;gap:1rem;background:white;padding:1.25rem 1.5rem;border-radius:var(--radius-lg);box-shadow:var(--shadow);}
    .filter-group{display:flex;gap:0.75rem;flex-wrap:wrap;}
    .filter-select{padding:0.65rem 1.1rem;border-radius:100px;border:1.5px solid var(--gray-200);background:white;font-family:'Inter',sans-serif;cursor:pointer;font-size:0.9rem;outline:none;}
    .filter-select:focus{border-color:var(--primary);}
    .search-box{display:flex;align-items:center;background:white;border:1.5px solid var(--gray-200);border-radius:100px;padding:0.3rem 0.4rem 0.3rem 1.1rem;flex:1;min-width:240px;}
    .search-box input{border:none;outline:none;padding:0.45rem 0;width:100%;font-family:'Inter',sans-serif;}
    .search-box button{background:var(--primary);border:none;color:white;padding:0.55rem 1.1rem;border-radius:100px;cursor:pointer;}

    /* PRODUCT CARDS */
    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:1.25rem;margin-bottom:3rem;}
    .product-card{background:white;border-radius:var(--radius-lg);border:1.5px solid var(--gray-200);transition:transform 0.3s,box-shadow 0.3s;cursor:pointer;overflow:hidden;}
    .product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);}

    /* FIX: image wrap — uses position relative + absolute children for crossfade */
    .card-img-wrap{height:200px;background:var(--gray-100);position:relative;overflow:hidden;}
    .card-img-wrap img{
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:contain;padding:1rem;
      opacity:0;transition:opacity 0.5s ease;
    }
    .card-img-wrap img.active{opacity:1;}
    /* FIX: fallback icon shown when no image */
    .card-img-placeholder{
      position:absolute;inset:0;display:flex;align-items:center;
      justify-content:center;font-size:3rem;color:var(--gray-400);
    }

    .card-body{padding:0.9rem 1rem 1rem;}
    .card-brand{font-size:0.68rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.04em;}
    .card-name{font-size:0.92rem;font-weight:700;margin:3px 0 6px;}
    .card-price{font-size:1.1rem;font-weight:800;color:var(--dark);margin-bottom:0.65rem;}
    .card-colors{display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center;margin-bottom:0.65rem;}
    .card-color-dot{width:20px;height:20px;border-radius:50%;border:2.5px solid transparent;cursor:default;transition:border-color 0.2s,transform 0.15s;flex-shrink:0;}
    .card-color-dot.clickable{cursor:pointer;}
    .card-color-dot.clickable:hover{transform:scale(1.15);}
    .card-color-dot.active.multi{border-color:var(--primary);box-shadow:0 0 0 2px rgba(0,188,212,0.25);}
    .card-storages{display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:0.8rem;}
    .card-stor-chip{font-size:0.68rem;padding:0.18rem 0.5rem;border:1px solid var(--gray-200);border-radius:100px;color:var(--gray-400);}
    .btn-view{width:100%;padding:0.6rem;background:var(--primary);color:white;border:none;border-radius:100px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.88rem;transition:0.2s;}
    .btn-view:hover{background:var(--primary-dark);}
    .btn-view:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed;}

    /* PRODUCT DETAIL MODAL */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(8px);z-index:2000;align-items:flex-start;justify-content:center;padding:1.25rem;overflow-y:auto;}
    .modal.show{display:flex;}
    .modal-box{background:white;border-radius:var(--radius-lg);max-width:1080px;width:100%;margin:auto;animation:fadeUp 0.28s ease;display:flex;flex-direction:column;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
    .mbar{display:flex;justify-content:space-between;align-items:flex-start;padding:1.1rem 1.5rem 1rem;border-bottom:1px solid var(--gray-200);gap:1rem;}
    .mbar-left{display:flex;flex-direction:column;gap:3px;}
    .mbar-brand{font-size:0.65rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.06em;}
    .mbar-name{font-size:1.25rem;font-weight:800;line-height:1.2;}
    .mbar-range{font-size:0.88rem;color:var(--gray-400);font-weight:500;}
    .mbar-close{width:36px;height:36px;border-radius:50%;background:var(--gray-100);border:none;cursor:pointer;font-size:1rem;flex-shrink:0;transition:0.15s;}
    .mbar-close:hover{background:#fee2e2;color:#ef4444;}
    .mbody{display:grid;grid-template-columns:400px 1fr;min-height:0;}
    .mleft{display:flex;flex-direction:column;border-right:1px solid var(--gray-200);}

    /* FIX: modal gallery — ensure image is always properly displayed */
    .mgallery{
      background:var(--gray-100);display:flex;align-items:center;
      justify-content:center;padding:2.5rem 2rem;min-height:300px;position:relative;
    }
    .mgallery img{
      max-width:100%;max-height:270px;object-fit:contain;
      transition:opacity 0.25s;
    }
    .mgallery img.fade{opacity:0;}
    .mgallery-placeholder{
      font-size:4rem;color:var(--gray-400);
      display:flex;align-items:center;justify-content:center;
    }

    .mcolor-label{padding:0.6rem 1.2rem;border-top:1px solid var(--gray-200);display:flex;align-items:center;gap:0.5rem;background:white;}
    .mcolor-dot-sm{width:13px;height:13px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(0,0,0,0.1);transition:background 0.2s;}
    .mcolor-name-text{font-size:0.82rem;font-weight:600;color:var(--gray-400);}
    .mselection{padding:0.9rem 1.2rem;border-top:1px solid var(--gray-200);display:flex;flex-direction:column;gap:0.4rem;}
    .msel-row{display:flex;justify-content:space-between;align-items:center;}
    .msel-lbl{font-size:0.78rem;color:var(--gray-400);}
    .msel-val{font-size:0.82rem;font-weight:600;color:var(--dark);}
    .msel-price-big{font-size:1.55rem;font-weight:800;color:var(--dark);line-height:1;}
    .msel-compare{font-size:0.9rem;color:var(--gray-400);text-decoration:line-through;margin-left:0.45rem;}
    .msel-off-badge{font-size:0.68rem;font-weight:700;background:#fef2f2;color:#ef4444;padding:0.18rem 0.5rem;border-radius:100px;margin-left:0.35rem;vertical-align:middle;}
    .madd-row{padding:0.9rem 1.2rem;border-top:1px solid var(--gray-200);display:flex;align-items:center;gap:0.7rem;}
    .qty-wrap{display:flex;align-items:center;gap:0.35rem;background:var(--gray-100);border-radius:100px;padding:0.28rem 0.55rem;flex-shrink:0;}
    .qty-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--gray-200);background:white;cursor:pointer;font-size:0.95rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:0.15s;}
    .qty-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary);}
    .qty-btn:disabled{opacity:0.38;cursor:not-allowed;}
    .qty-num{font-size:0.9rem;font-weight:700;min-width:20px;text-align:center;}
    .btn-atc{flex:1;padding:0.72rem 1rem;background:var(--primary);color:white;border:none;border-radius:100px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.88rem;transition:0.2s;white-space:nowrap;}
    .btn-atc:hover:not(:disabled){background:var(--primary-dark);}
    .btn-atc:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed;}
    .mright{overflow-y:auto;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:1.4rem;max-height:640px;}
    .mdesc{font-size:0.87rem;color:var(--gray-400);line-height:1.75;padding:0.9rem 1rem;background:var(--gray-100);border-radius:var(--radius-md);}
    .msec-lbl{font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--gray-400);margin-bottom:0.65rem;}
    .vcard{border:2px solid var(--gray-200);border-radius:var(--radius-md);overflow:hidden;transition:border-color 0.2s,box-shadow 0.2s;}
    .vcard.vc-active{border-color:var(--primary);box-shadow:0 0 0 3px rgba(0,188,212,0.12);}
    .vcard-hd{display:flex;align-items:center;gap:0.65rem;padding:0.72rem 1rem;background:var(--gray-100);border-bottom:1.5px solid var(--gray-200);cursor:pointer;user-select:none;transition:background 0.15s;}
    .vcard-hd:hover{background:#e8f7f9;}
    .vcard.vc-active .vcard-hd{background:#e0f8fb;}
    .vc-swatch{width:26px;height:26px;border-radius:50%;flex-shrink:0;border:2.5px solid rgba(0,0,0,0.1);}
    .vc-colorname{font-size:0.9rem;font-weight:700;flex:1;color:var(--dark);}
    .vc-range{font-size:0.76rem;color:var(--gray-400);}
    .vc-thumb{width:42px;height:42px;border-radius:8px;object-fit:contain;background:white;padding:3px;border:1px solid var(--gray-200);flex-shrink:0;}
    .vc-badge{font-size:0.62rem;font-weight:700;background:var(--primary);color:white;padding:0.18rem 0.5rem;border-radius:100px;display:none;flex-shrink:0;}
    .vcard.vc-active .vc-badge{display:inline-block;}
    .vcard-opts{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:0.5rem;padding:0.85rem 1rem;}
    .vopt{border:1.5px solid var(--gray-200);border-radius:var(--radius-md);padding:0.65rem 0.75rem;cursor:pointer;display:flex;flex-direction:column;gap:3px;transition:border-color 0.15s,background 0.15s;}
    .vopt:hover:not(.vopt-oos){border-color:var(--primary);background:rgba(0,188,212,0.03);}
    .vopt.vopt-sel{border-color:var(--primary);background:rgba(0,188,212,0.08);}
    .vopt.vopt-oos{opacity:0.35;cursor:not-allowed;}
    .vopt-stor{font-size:0.86rem;font-weight:700;color:var(--dark);}
    .vopt-price{font-size:0.9rem;font-weight:800;color:var(--primary);}
    .vopt-compare{font-size:0.72rem;color:var(--gray-400);text-decoration:line-through;}
    .vopt-off{font-size:0.64rem;font-weight:700;color:#ef4444;}
    .vopt-stock{font-size:0.68rem;color:var(--gray-400);margin-top:1px;}

    /* CART */
    .cart-sidebar{position:fixed;top:0;right:-420px;width:400px;height:100vh;background:white;z-index:3001;transition:right 0.35s;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,0.1);}
    .cart-sidebar.open{right:0;}
    .cart-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center;}
    .cart-header h3{font-size:1.1rem;font-weight:700;}
    .cart-close-btn{width:34px;height:34px;border:none;background:var(--gray-100);border-radius:50%;cursor:pointer;font-size:1rem;}
    .cart-items{flex:1;overflow-y:auto;padding:1rem;}
    .cart-item{display:flex;gap:0.8rem;padding:0.8rem;background:var(--gray-100);border-radius:var(--radius-md);margin-bottom:0.6rem;}
    /* FIX: cart item image always visible */
    .cart-item-img{width:60px;height:60px;object-fit:contain;background:white;border-radius:8px;padding:4px;flex-shrink:0;}
    .cart-item-info{flex:1;min-width:0;}
    .cart-item-name{font-weight:600;font-size:0.85rem;margin-bottom:2px;}
    .cart-item-variant{font-size:0.72rem;color:var(--gray-400);margin-bottom:4px;display:flex;align-items:center;gap:5px;}
    .cart-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,0.1);}
    .cart-item-price{font-weight:800;font-size:0.9rem;}
    .cart-item-controls{display:flex;align-items:center;gap:0.3rem;}
    .cart-item-controls button{width:26px;height:26px;border:1.5px solid var(--gray-200);border-radius:50%;background:white;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;}
    .cart-footer{padding:1rem 1.5rem;border-top:1px solid var(--gray-200);}
    .cart-totals{margin-bottom:1rem;font-size:0.88rem;}
    .cart-totals-row{display:flex;justify-content:space-between;padding:0.25rem 0;color:var(--gray-400);}
    .cart-totals-row.total{font-size:1rem;font-weight:800;color:var(--dark);border-top:1.5px solid var(--gray-200);margin-top:0.5rem;padding-top:0.5rem;}
    .checkout-btn{width:100%;padding:0.9rem;background:var(--primary);color:white;border:none;border-radius:100px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.95rem;}
    .checkout-btn:hover{background:var(--primary-dark);}
    .cart-notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:white;padding:0.8rem 1.4rem;border-radius:100px;display:flex;gap:0.8rem;align-items:center;z-index:9999;transition:0.35s;opacity:0;font-size:0.88rem;}
    .cart-notif.show{transform:translateX(-50%) translateY(0);opacity:1;}

    /* RESPONSIVE */
    @media(max-width:820px){
      .menu-toggle{display:block;}
      .nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:white;flex-direction:column;padding:1rem;box-shadow:0 8px 20px rgba(0,0,0,0.1);}
      .nav-links.show{display:flex;}
      .mbody{grid-template-columns:1fr;}
      .mleft{border-right:none;border-bottom:1px solid var(--gray-200);}
      .mright{max-height:none;}
      .cart-sidebar{width:100%;right:-100%;}
    }
  </style>
</head>
<body>

<nav>
  <div class="container">
    <a href="index.html" class="logo-link">
      <!-- FIX: hide broken logo img gracefully -->
      <img class="logo-img" src="photos/logo.png" alt="BMB Electronics" onerror="this.style.display='none'">
      <span class="logo-text">BMB Electronics</span>
    </a>
    <div class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="store.html" class="active">Store</a>
      <a href="contact.html">Contact</a>
      <a href="#" id="accountLink">Account</a>
    </div>
    <div class="nav-icons">
      <div class="cart-icon-wrap" onclick="openCart()">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartBadge">0</span>
      </div>
      <a href="#" id="accountIcon"><i class="fa-regular fa-circle-user"></i></a>
    </div>
  </div>
</nav>

<section class="page-header">
  <div class="overlay"></div>
  <div class="inner"><h1>Our Store</h1><p>Phones · Laptops · Tablets · Accessories</p></div>
</section>

<div class="container">
  <div class="filters">
    <div class="filter-group">
      <select class="filter-select" id="typeFilter" onchange="filterProducts()"><option value="all">All Types</option></select>
      <select class="filter-select" id="brandFilter" onchange="filterProducts()"><option value="all">All Brands</option></select>
      <select class="filter-select" id="sortFilter" onchange="filterProducts()">
        <option value="featured">Featured</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
      </select>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search products…" oninput="filterProducts()">
      <button onclick="filterProducts()"><i class="fa-solid fa-search"></i></button>
    </div>
  </div>
  <div class="product-grid" id="productGrid">
    <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gray-400)">
      <i class="fa-solid fa-spinner fa-spin" style="font-size:2rem;display:block;margin-bottom:1rem"></i>Loading products…
    </div>
  </div>
</div>

<!-- PRODUCT DETAIL MODAL -->
<div class="modal" id="productModal">
  <div class="modal-box">
    <div class="mbar">
      <div class="mbar-left">
        <div class="mbar-brand" id="mBrand"></div>
        <div class="mbar-name" id="mName"></div>
        <div class="mbar-range" id="mRange"></div>
      </div>
      <button class="mbar-close" onclick="closeModal()"><i class="fa-solid fa-times"></i></button>
    </div>
    <div class="mbody">
      <div class="mleft">
        <div class="mgallery" id="mGallery">
          <img id="mImg" src="" alt="" style="display:none">
          <div class="mgallery-placeholder" id="mImgPlaceholder"><i class="fa-solid fa-box-open"></i></div>
        </div>
        <div class="mcolor-label">
          <span class="mcolor-dot-sm" id="mColorDot" style="background:#e2e8f0"></span>
          <span class="mcolor-name-text" id="mColorName">Select a color &amp; storage below</span>
        </div>
        <div class="mselection">
          <div class="msel-row"><span class="msel-lbl">Storage</span><span class="msel-val" id="mSelStor">—</span></div>
          <div class="msel-row"><span class="msel-lbl">Stock</span><span class="msel-val" id="mSelStock">—</span></div>
          <div class="msel-row" style="margin-top:2px;align-items:baseline;flex-wrap:wrap;gap:2px;">
            <span class="msel-lbl">Price</span>
            <span style="display:flex;align-items:baseline;flex-wrap:wrap;gap:3px;">
              <span class="msel-price-big" id="mSelPrice">—</span>
              <span class="msel-compare" id="mSelCompare" style="display:none"></span>
              <span class="msel-off-badge" id="mSelOff" style="display:none"></span>
            </span>
          </div>
        </div>
        <div class="madd-row">
          <div class="qty-wrap">
            <button class="qty-btn" id="qtyMinus" onclick="changeQty(-1)" disabled>−</button>
            <span class="qty-num" id="qtyNum">1</span>
            <button class="qty-btn" id="qtyPlus" onclick="changeQty(1)" disabled>+</button>
          </div>
          <button class="btn-atc" id="btnAtc" onclick="addFromModal()" disabled>
            <i class="fa-solid fa-cart-plus"></i>&nbsp;Select an option
          </button>
        </div>
      </div>
      <div class="mright" id="mRight"></div>
    </div>
  </div>
</div>

<!-- CART SIDEBAR -->
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3><i class="fa-solid fa-cart-shopping" style="color:var(--primary)"></i> Your Cart</h3>
    <button class="cart-close-btn" onclick="closeCart()"><i class="fa-solid fa-times"></i></button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-totals" id="cartTotals"></div>
    <button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
  </div>
</div>
<div class="cart-notif" id="cartNotif">
  <i class="fa-solid fa-circle-check"></i><span id="notifMsg">Added to cart</span>
</div>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import { collection, getDocs, query, orderBy, doc, getDoc, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { observeAuthState } from './js/auth.js';

/* ── Global state ── */
let allProducts = [], filteredProducts = [], cartItems = [], notifTimer = null;
const cardState = {}, CYCLE_MS = 5000;

let mProduct = null, mColorIdx = null, mStorIdx = null, mQty = 1;

/* ── Auth ── */
window.toggleMenu = () => document.getElementById('navLinks').classList.toggle('show');

function handleAccount() {
  auth.currentUser
    ? (window.location.href = 'profile.html')
    : (confirm('Please log in.') && (window.location.href = 'login.html'));
}
document.getElementById('accountLink').onclick = e => { e.preventDefault(); handleAccount(); };
document.getElementById('accountIcon').onclick = e => { e.preventDefault(); handleAccount(); };

observeAuthState(async user => {
  document.querySelector('#accountIcon i').className =
    user ? 'fa-solid fa-circle-user' : 'fa-regular fa-circle-user';
  if (user) await loadCart();
});

/* ── Data loading ── */
async function loadProducts() {
  const snap = await getDocs(query(collection(db, 'products'), orderBy('createdAt', 'desc')));
  allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  populateFilters();
  filteredProducts = [...allProducts];
  renderGrid();
}

function populateFilters() {
  const types = [...new Set(allProducts.map(p => p.type).filter(Boolean))];
  document.getElementById('typeFilter').innerHTML =
    '<option value="all">All Types</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
  const brands = [...new Set(allProducts.map(p => p.brand).filter(Boolean))];
  document.getElementById('brandFilter').innerHTML =
    '<option value="all">All Brands</option>' + brands.map(b => `<option value="${b}">${b}</option>`).join('');
}

/* ── Price helpers ── */
function getAllPrices(p) {
  return (p.variants || []).flatMap(v => (v.storageOptions || []).map(o => o.price)).filter(x => x > 0);
}
function getPriceRangeStr(p) {
  const prices = getAllPrices(p);
  if (!prices.length) return 'K0';
  const lo = Math.min(...prices), hi = Math.max(...prices);
  return lo === hi ? `K${lo.toLocaleString()}` : `K${lo.toLocaleString()} – K${hi.toLocaleString()}`;
}
function getTotalStock(p) {
  return (p.variants || []).reduce((s, v) =>
    s + (v.storageOptions || []).reduce((ss, o) => ss + (o.stock || 0), 0), 0);
}
function getUniqueStorages(p) {
  const s = new Set();
  (p.variants || []).forEach(v => (v.storageOptions || []).forEach(o => o.storage && s.add(o.storage)));
  return [...s];
}

/* ── Card grid ── */
function renderGrid() {
  Object.values(cardState).forEach(s => clearInterval(s.timer));
  Object.keys(cardState).forEach(k => delete cardState[k]);
  const grid = document.getElementById('productGrid');

  if (!filteredProducts.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gray-400)">No products found.</div>';
    return;
  }

  grid.innerHTML = filteredProducts.map(p => {
    const variants = p.variants || [];
    const isMulti = variants.length > 1;
    const priceStr = getPriceRangeStr(p);
    const oos = getTotalStock(p) <= 0;
    const storages = getUniqueStorages(p);

    /* FIX: build images for all variants — each img starts hidden (opacity:0),
       first gets class 'active'. Works even if imageUrl is empty. */
    const imgs = variants.map((v, i) => {
      const src = v.imageUrl || '';
      if (!src) return ''; // skip empty
      return `<img
        src="${src}"
        class="${i === 0 ? 'active' : ''}"
        alt="${v.color || ''}"
        onerror="this.style.display='none'"
      >`;
    }).join('');

    /* If no images at all, show a placeholder icon */
    const hasAnyImg = variants.some(v => v.imageUrl);
    const placeholder = hasAnyImg ? '' : '<div class="card-img-placeholder"><i class="fa-solid fa-box-open"></i></div>';

    const dots = variants.map((v, i) =>
      `<div class="card-color-dot${i === 0 ? ' active' : ''}${isMulti ? ' clickable multi' : ''}"
           title="${v.color || ''}" style="background:${v.hex || '#ccc'}"
           ${isMulti ? `onclick="event.stopPropagation();jumpToColor('${p.id}',${i})"` : ''}>
       </div>`).join('');

    const chips = storages.slice(0, 4).map(s => `<span class="card-stor-chip">${s}</span>`).join('');

    return `<div class="product-card" onclick="openModal('${p.id}')">
      <div class="card-img-wrap" id="cimgwrap-${p.id}">${imgs}${placeholder}</div>
      <div class="card-body">
        <div class="card-brand">${p.brand || ''}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-price">${priceStr}</div>
        ${variants.length ? `<div class="card-colors" id="ccolors-${p.id}">${dots}</div>` : ''}
        ${storages.length ? `<div class="card-storages">${chips}</div>` : ''}
        <button class="btn-view" onclick="event.stopPropagation();openModal('${p.id}')" ${oos ? 'disabled' : ''}>
          ${oos ? 'Out of Stock' : '<i class="fa-solid fa-eye"></i> View Product'}
        </button>
      </div>
    </div>`;
  }).join('');

  /* Auto-cycle colors for multi-variant products */
  filteredProducts.forEach(p => {
    if ((p.variants || []).length > 1) {
      cardState[p.id] = { activeColorIdx: 0 };
      cardState[p.id].timer = setInterval(() => {
        const s = cardState[p.id];
        const next = (s.activeColorIdx + 1) % p.variants.length;
        applyCardColor(p.id, next);
        s.activeColorIdx = next;
      }, CYCLE_MS);
    }
  });
}

function applyCardColor(pid, cidx) {
  const wrap = document.getElementById(`cimgwrap-${pid}`);
  if (wrap) {
    /* FIX: only toggle active on actual <img> elements (skip placeholder divs) */
    const imgs = wrap.querySelectorAll('img');
    imgs.forEach((img, i) => {
      img.className = i === cidx ? 'active' : '';
    });
  }
  document.getElementById(`ccolors-${pid}`)?.querySelectorAll('.card-color-dot')
    .forEach((el, i) => el.classList.toggle('active', i === cidx));
  if (cardState[pid]) cardState[pid].activeColorIdx = cidx;
}

window.jumpToColor = (pid, cidx) => {
  if (cardState[pid]) {
    clearInterval(cardState[pid].timer);
    const p = allProducts.find(x => x.id === pid);
    if ((p?.variants || []).length > 1)
      cardState[pid].timer = setInterval(() => {
        const s = cardState[pid];
        applyCardColor(pid, (s.activeColorIdx + 1) % p.variants.length);
      }, CYCLE_MS);
  }
  applyCardColor(pid, cidx);
};

window.filterProducts = () => {
  const type = document.getElementById('typeFilter').value;
  const brand = document.getElementById('brandFilter').value;
  const sort = document.getElementById('sortFilter').value;
  const q = document.getElementById('searchInput').value.toLowerCase();
  filteredProducts = allProducts.filter(p =>
    (type === 'all' || p.type === type) && (brand === 'all' || p.brand === brand) &&
    (!q || p.name?.toLowerCase().includes(q)));
  if (sort === 'price-low') filteredProducts.sort((a, b) => Math.min(...getAllPrices(a)) - Math.min(...getAllPrices(b)));
  if (sort === 'price-high') filteredProducts.sort((a, b) => Math.min(...getAllPrices(b)) - Math.min(...getAllPrices(a)));
  renderGrid();
};

/* ── MODAL ── */
window.openModal = id => {
  mProduct = allProducts.find(p => p.id === id);
  if (!mProduct) return;
  mColorIdx = null; mStorIdx = null; mQty = 1;
  buildModal();
  document.getElementById('productModal').classList.add('show');
};
window.closeModal = () => document.getElementById('productModal').classList.remove('show');

function buildModal() {
  const p = mProduct;
  const variants = p.variants || [];

  document.getElementById('mBrand').textContent = p.brand || '';
  document.getElementById('mName').textContent = p.name;
  document.getElementById('mRange').textContent = getPriceRangeStr(p);

  /* FIX: show image properly, fall back to placeholder icon */
  setModalImage(variants[0]?.imageUrl || '');
  setLeftDefaults();

  let html = '';
  if (p.description) html += `<div class="mdesc">${p.description}</div>`;
  html += `<div><div class="msec-lbl">${variants.length > 1 ? `${variants.length} Colors Available` : 'Available Options'}</div>`;

  variants.forEach((v, ci) => {
    const opts = v.storageOptions || [];
    const prices = opts.map(o => o.price).filter(Boolean);
    const lo = prices.length ? Math.min(...prices) : 0;
    const hi = prices.length ? Math.max(...prices) : 0;
    const rangeStr = lo === hi ? `K${lo.toLocaleString()}` : `K${lo.toLocaleString()} – K${hi.toLocaleString()}`;

    const optsHtml = opts.map((opt, si) => {
      const oos = opt.stock <= 0;
      const low = !oos && opt.stock <= 5;
      const savPct = opt.comparePrice > 0
        ? Math.round(((opt.comparePrice - opt.price) / opt.comparePrice) * 100) : 0;
      const stockLabel = oos ? 'Out of stock' : low ? `Only ${opt.stock} left` : `${opt.stock} in stock`;
      return `<div class="vopt${oos ? ' vopt-oos' : ''}" id="vopt-${ci}-${si}"
                   ${!oos ? `onclick="selectOption(${ci},${si})"` : ''}>
        <div class="vopt-stor">${opt.storage || '—'}</div>
        <div class="vopt-price">K${(opt.price || 0).toLocaleString()}</div>
        ${opt.comparePrice > 0 ? `<div class="vopt-compare">K${opt.comparePrice.toLocaleString()}</div>` : ''}
        ${savPct > 0 ? `<div class="vopt-off">${savPct}% off</div>` : ''}
        <div class="vopt-stock">${stockLabel}</div>
      </div>`;
    }).join('');

    /* FIX: thumbnail — hide if no image */
    const thumbHtml = v.imageUrl
      ? `<img class="vc-thumb" src="${v.imageUrl}" alt="${v.color || ''}" onerror="this.style.display='none'">`
      : '';

    html += `<div class="vcard" id="vcard-${ci}" style="margin-bottom:0.6rem;">
      <div class="vcard-hd" onclick="previewColor(${ci})">
        <span class="vc-swatch" style="background:${v.hex || '#ccc'}"></span>
        <span class="vc-colorname">${v.color || 'Color ' + (ci + 1)}</span>
        <span class="vc-range">${rangeStr}</span>
        ${thumbHtml}
        <span class="vc-badge">Active</span>
      </div>
      <div class="vcard-opts">${optsHtml}</div>
    </div>`;
  });

  html += `</div>`;
  document.getElementById('mRight').innerHTML = html;
}

/* FIX: centralised function to update modal image with fallback */
function setModalImage(src) {
  const imgEl = document.getElementById('mImg');
  const placeholder = document.getElementById('mImgPlaceholder');

  if (src) {
    imgEl.style.display = '';
    imgEl.classList.remove('fade');
    imgEl.src = src;
    imgEl.onerror = () => {
      imgEl.style.display = 'none';
      placeholder.style.display = 'flex';
    };
    placeholder.style.display = 'none';
  } else {
    imgEl.style.display = 'none';
    placeholder.style.display = 'flex';
  }
}

window.previewColor = ci => {
  const color = mProduct?.variants[ci]; if (!color) return;
  const imgEl = document.getElementById('mImg');
  imgEl.classList.add('fade');
  setTimeout(() => { setModalImage(color.imageUrl || ''); }, 200);
  document.getElementById('mColorDot').style.background = color.hex || '#ccc';
  document.getElementById('mColorName').textContent = color.color || '';
  document.getElementById('mColorName').style.color = 'var(--dark)';
};

window.selectOption = (ci, si) => {
  const p = mProduct;
  const color = p.variants?.[ci];
  const opt = color?.storageOptions?.[si];
  if (!opt || opt.stock <= 0) return;

  mColorIdx = ci; mStorIdx = si; mQty = 1;

  const imgEl = document.getElementById('mImg');
  imgEl.classList.add('fade');
  setTimeout(() => { setModalImage(color.imageUrl || ''); }, 200);

  document.getElementById('mColorDot').style.background = color.hex || '#ccc';
  document.getElementById('mColorName').textContent = color.color || '';
  document.getElementById('mColorName').style.color = 'var(--dark)';

  document.getElementById('mSelStor').textContent = opt.storage || '—';
  const stock = opt.stock;
  document.getElementById('mSelStock').textContent =
    stock <= 0 ? 'Out of stock' : stock <= 5 ? `Only ${stock} left` : `${stock} in stock`;
  document.getElementById('mSelPrice').textContent = `K${(opt.price || 0).toLocaleString()}`;

  const cmpEl = document.getElementById('mSelCompare');
  const offEl = document.getElementById('mSelOff');
  if (opt.comparePrice > 0) {
    cmpEl.textContent = `K${opt.comparePrice.toLocaleString()}`;
    cmpEl.style.display = '';
    const savPct = Math.round(((opt.comparePrice - opt.price) / opt.comparePrice) * 100);
    if (savPct > 0) { offEl.textContent = `${savPct}% off`; offEl.style.display = ''; }
    else { offEl.style.display = 'none'; }
  } else {
    cmpEl.style.display = 'none'; offEl.style.display = 'none';
  }

  document.querySelectorAll('.vcard').forEach(c => c.classList.remove('vc-active'));
  document.querySelectorAll('.vopt').forEach(o => o.classList.remove('vopt-sel'));
  document.getElementById(`vcard-${ci}`)?.classList.add('vc-active');
  document.getElementById(`vopt-${ci}-${si}`)?.classList.add('vopt-sel');

  const atcBtn = document.getElementById('btnAtc');
  atcBtn.disabled = false;
  atcBtn.innerHTML = `<i class="fa-solid fa-cart-plus"></i>&nbsp;Add to Cart · K${(opt.price || 0).toLocaleString()}`;
  document.getElementById('qtyMinus').disabled = false;
  document.getElementById('qtyPlus').disabled = false;
  document.getElementById('qtyNum').textContent = '1';
};

function setLeftDefaults() {
  document.getElementById('mColorDot').style.background = '#e2e8f0';
  document.getElementById('mColorName').textContent = 'Select a color & storage below';
  document.getElementById('mColorName').style.color = 'var(--gray-400)';
  document.getElementById('mSelStor').textContent = '—';
  document.getElementById('mSelStock').textContent = '—';
  document.getElementById('mSelPrice').textContent = '—';
  document.getElementById('mSelCompare').style.display = 'none';
  document.getElementById('mSelOff').style.display = 'none';
  document.getElementById('btnAtc').disabled = true;
  document.getElementById('btnAtc').innerHTML = '<i class="fa-solid fa-cart-plus"></i>&nbsp;Select an option';
  document.getElementById('qtyMinus').disabled = true;
  document.getElementById('qtyPlus').disabled = true;
  document.getElementById('qtyNum').textContent = '1';
}

window.changeQty = delta => {
  if (mColorIdx === null || mStorIdx === null) return;
  const stock = mProduct.variants[mColorIdx]?.storageOptions[mStorIdx]?.stock || 0;
  mQty = Math.max(1, Math.min(stock, mQty + delta));
  document.getElementById('qtyNum').textContent = mQty;
};

window.addFromModal = async () => {
  if (mColorIdx === null || mStorIdx === null || !mProduct) return;
  const color = mProduct.variants[mColorIdx];
  const opt = color?.storageOptions[mStorIdx];
  if (!opt || opt.stock < mQty) { alert('Not enough stock.'); return; }
  await addToCart({
    id: mProduct.id, name: mProduct.name, price: opt.price,
    color: color.color, hex: color.hex || '', storage: opt.storage,
    image: color.imageUrl || '', qty: mQty
  });
  showNotif(`${mProduct.name} · ${color.color} · ${opt.storage}`);
  closeModal();
};

/* ── Cart ── */
async function addToCart(item) {
  const key = `${item.id}|${item.color}|${item.storage}`;
  const ex = cartItems.find(c => `${c.id}|${c.color}|${c.storage}` === key);
  if (ex) ex.qty += item.qty; else cartItems.push({ ...item });
  updateCartBadge(); await saveCart();
}

async function loadCart() {
  if (!auth.currentUser) return;
  const snap = await getDoc(doc(db, 'users', auth.currentUser.uid));
  cartItems = snap.data()?.cart || []; updateCartBadge();
}

async function saveCart() {
  if (auth.currentUser)
    await updateDoc(doc(db, 'users', auth.currentUser.uid), { cart: cartItems });
}

function updateCartBadge() {
  const total = cartItems.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.style.display = total ? 'flex' : 'none';
  badge.textContent = total > 99 ? '99+' : total;
}

function showNotif(msg) {
  const el = document.getElementById('cartNotif');
  document.getElementById('notifMsg').textContent = msg;
  el.classList.add('show'); clearTimeout(notifTimer);
  notifTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

window.openCart = () => { renderCart(); document.getElementById('cartSidebar').classList.add('open'); };
window.closeCart = () => document.getElementById('cartSidebar').classList.remove('open');

function renderCart() {
  const container = document.getElementById('cartItems'), footer = document.getElementById('cartFooter');
  if (!cartItems.length) {
    container.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--gray-400)"><i class="fa-solid fa-cart-shopping" style="font-size:2.5rem;display:block;margin-bottom:1rem;opacity:0.3"></i>Your cart is empty</div>';
    footer.style.display = 'none'; return;
  }
  let sub = 0;
  container.innerHTML = cartItems.map((item, idx) => {
    sub += item.price * item.qty;
    /* FIX: cart image with proper fallback */
    const imgSrc = item.image || '';
    return `<div class="cart-item">
      ${imgSrc
        ? `<img class="cart-item-img" src="${imgSrc}" alt="${item.name}" onerror="this.src='https://placehold.co/60x60?text=📦'">`
        : `<div style="width:60px;height:60px;background:var(--gray-100);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0">📦</div>`
      }
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-variant">
          <span class="cart-color-dot" style="background:${item.hex || '#ccc'}"></span>
          ${item.color} · ${item.storage}
        </div>
        <div class="cart-item-price">K${(item.price * item.qty).toLocaleString()}</div>
      </div>
      <div>
        <div class="cart-item-controls">
          <button onclick="updateCartQty(${idx},-1)">−</button>
          <span style="font-size:0.85rem;font-weight:700;min-width:18px;text-align:center">${item.qty}</span>
          <button onclick="updateCartQty(${idx},1)">+</button>
        </div>
        <button onclick="removeCartItem(${idx})"
          style="margin-top:0.4rem;background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:0.85rem;width:100%">
          <i class="fa-regular fa-trash-can"></i>
        </button>
      </div>
    </div>`;
  }).join('');
  const ship = 50, tax = Math.round(sub * 0.16), total = sub + ship + tax;
  document.getElementById('cartTotals').innerHTML = `
    <div class="cart-totals-row"><span>Subtotal</span><span>K${sub.toLocaleString()}</span></div>
    <div class="cart-totals-row"><span>Shipping</span><span>K${ship}</span></div>
    <div class="cart-totals-row"><span>Tax (16%)</span><span>K${tax.toLocaleString()}</span></div>
    <div class="cart-totals-row total"><span>Total</span><span>K${total.toLocaleString()}</span></div>`;
  footer.style.display = 'block';
}

window.updateCartQty = async (idx, delta) => {
  const nq = cartItems[idx].qty + delta; if (nq < 1) return;
  cartItems[idx].qty = nq; await saveCart(); updateCartBadge(); renderCart();
};
window.removeCartItem = async idx => {
  cartItems.splice(idx, 1); await saveCart(); updateCartBadge(); renderCart();
};

loadProducts();
</script>
</body>
</html>
