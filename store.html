<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BMB Electronics | Store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--primary:#00bcd4;--primary-dark:#0097a7;--dark:#0f172a;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-400:#94a3b8;--radius-lg:1.5rem;--radius-md:1rem;--shadow:0 10px 15px -3px rgba(0,0,0,0.1);}
    body{font-family:'Inter',sans-serif;background:#fff;color:var(--dark);}
    .container{width:90%;max-width:1200px;margin:0 auto;padding:0 15px;}
    nav{background:rgba(255,255,255,0.98);backdrop-filter:blur(10px);padding:0.8rem 0;position:sticky;top:0;z-index:1000;border-bottom:1px solid rgba(0,0,0,0.05);}
    nav .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
    .logo-link{display:flex;align-items:center;gap:8px;text-decoration:none;}
    .logo-img{height:32px;width:auto;}
    .logo-text{font-size:1.3rem;font-weight:800;color:var(--dark);letter-spacing:-1px;}
    .menu-toggle{display:none;font-size:1.5rem;cursor:pointer;}
    .nav-links{display:flex;gap:2rem;}
    .nav-links a{text-decoration:none;color:var(--dark);font-weight:500;transition:0.3s;}
    .nav-links a:hover,.nav-links a.active{color:var(--primary);}
    .nav-icons{display:flex;gap:1.2rem;font-size:1.2rem;align-items:center;}
    .cart-icon-wrap{position:relative;cursor:pointer;}
    .cart-badge{position:absolute;top:-8px;right:-8px;background:#ef4444;color:white;width:18px;height:18px;border-radius:50%;font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;}
    .page-header{background:url('photos/e.jpeg') center/cover no-repeat;padding:4rem 1rem;text-align:center;color:white;margin:10px;border-radius:var(--radius-lg);position:relative;}
    .page-header .overlay{position:absolute;inset:0;background:rgba(15,23,42,0.75);border-radius:var(--radius-lg);}
    .page-header .inner{position:relative;z-index:1;}
    .page-header h1{font-size:2.5rem;font-weight:800;margin-bottom:0.5rem;}
    .filters{display:flex;justify-content:space-between;align-items:center;margin:2rem 0;flex-wrap:wrap;gap:1rem;background:white;padding:1.25rem 1.5rem;border-radius:var(--radius-lg);box-shadow:var(--shadow);}
    .filter-group{display:flex;gap:0.75rem;flex-wrap:wrap;}
    .filter-select{padding:0.65rem 1.1rem;border-radius:100px;border:1.5px solid var(--gray-200);background:white;font-family:'Inter',sans-serif;cursor:pointer;font-size:0.9rem;outline:none;}
    .filter-select:focus{border-color:var(--primary);}
    .search-box{display:flex;align-items:center;background:white;border:1.5px solid var(--gray-200);border-radius:100px;padding:0.3rem 0.4rem 0.3rem 1.1rem;flex:1;min-width:240px;}
    .search-box input{border:none;outline:none;padding:0.45rem 0;width:100%;font-family:'Inter',sans-serif;}
    .search-box button{background:var(--primary);border:none;color:white;padding:0.55rem 1.1rem;border-radius:100px;cursor:pointer;}
    .product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:1.25rem;margin-bottom:3rem;}
    .product-card{background:white;border-radius:var(--radius-lg);border:1.5px solid var(--gray-200);transition:transform 0.3s,box-shadow 0.3s;cursor:pointer;overflow:hidden;}
    .product-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);}
    .card-img-wrap{height:200px;background:var(--gray-100);position:relative;overflow:hidden;}
    .card-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:1rem;transition:opacity 0.5s ease;}
    .card-img-wrap img.active{opacity:1;}.card-img-wrap img.inactive{opacity:0;}
    .card-body{padding:0.9rem 1rem 1rem;}
    .card-brand{font-size:0.68rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.04em;}
    .card-name{font-size:0.92rem;font-weight:700;margin:3px 0 6px;}
    .card-price{font-size:1.1rem;font-weight:800;color:var(--dark);margin-bottom:0.65rem;}
    .card-price span{font-size:0.82rem;font-weight:400;color:var(--gray-400);text-decoration:line-through;margin-left:0.4rem;}
    .card-colors{display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center;margin-bottom:0.65rem;}
    /* Color dot — no highlight for single variants */
    .card-color-dot{width:20px;height:20px;border-radius:50%;border:2.5px solid transparent;cursor:default;transition:border-color 0.2s,transform 0.15s;flex-shrink:0;}
    .card-color-dot.clickable{cursor:pointer;}
    .card-color-dot.clickable:hover{transform:scale(1.15);}
    .card-color-dot.active.multi{border-color:var(--primary);box-shadow:0 0 0 2px rgba(0,188,212,0.25);}
    .card-storages{display:flex;gap:0.3rem;flex-wrap:wrap;margin-bottom:0.8rem;}
    .card-stor-chip{font-size:0.68rem;padding:0.18rem 0.5rem;border:1px solid var(--gray-200);border-radius:100px;color:var(--gray-400);}
    .btn-view{width:100%;padding:0.6rem;background:var(--primary);color:white;border:none;border-radius:100px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.88rem;transition:0.2s;}
    .btn-view:hover{background:var(--primary-dark);}
    .btn-view:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed;}

    /* ===================== REDESIGNED MODAL ===================== */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);z-index:2000;align-items:center;justify-content:center;padding:1rem;}
    .modal.show{display:flex;}
    .modal-box{background:white;border-radius:var(--radius-lg);max-width:980px;width:100%;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;animation:fadeUp 0.25s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    /* Top bar */
    .modal-topbar{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;border-bottom:1px solid var(--gray-200);flex-shrink:0;background:white;}
    .modal-topbar-info{display:flex;flex-direction:column;gap:2px;}
    .modal-topbar-brand{font-size:0.68rem;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:0.05em;}
    .modal-topbar-name{font-size:1.15rem;font-weight:800;}
    .modal-topbar-price{font-size:0.9rem;font-weight:600;color:var(--gray-400);}
    .modal-close{width:34px;height:34px;border-radius:50%;background:var(--gray-100);border:none;cursor:pointer;font-size:1rem;}
    .modal-close:hover{background:#fee2e2;color:#ef4444;}
    /* Body split */
    .modal-body{display:grid;grid-template-columns:1fr 1.15fr;flex:1;overflow:hidden;min-height:0;}
    /* Left: gallery + variant thumbs */
    .modal-left{background:var(--gray-100);display:flex;flex-direction:column;overflow:hidden;}
    .modal-gallery-main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;}
    .modal-gallery-img{max-width:100%;max-height:260px;object-fit:contain;transition:opacity 0.3s;}
    .modal-gallery-img.fading{opacity:0;}
    .modal-variant-thumbs{display:flex;gap:0.5rem;padding:0.75rem 1rem;overflow-x:auto;border-top:1px solid var(--gray-200);background:white;scrollbar-width:none;}
    .modal-variant-thumbs::-webkit-scrollbar{display:none;}
    .mvt{width:56px;height:56px;border-radius:10px;border:2px solid var(--gray-200);background:var(--gray-100);cursor:pointer;overflow:hidden;flex-shrink:0;transition:border-color 0.2s;padding:4px;}
    .mvt img{width:100%;height:100%;object-fit:contain;}
    .mvt.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(0,188,212,0.2);}
    /* Right: picker */
    .modal-right{display:flex;flex-direction:column;overflow-y:auto;padding:0;}
    /* Variant tabs */
    .modal-variant-tabs{display:flex;gap:0;border-bottom:1px solid var(--gray-200);overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
    .modal-variant-tabs::-webkit-scrollbar{display:none;}
    .mvtab{padding:0.75rem 1.1rem;font-size:0.82rem;font-weight:600;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:color 0.2s,border-color 0.2s;color:var(--gray-400);display:flex;align-items:center;gap:0.4rem;}
    .mvtab:hover{color:var(--dark);}
    .mvtab.active{color:var(--primary);border-bottom-color:var(--primary);}
    .mvtab-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,0.1);}
    /* Variant detail panel */
    .mvpanel{padding:1.25rem 1.5rem;flex:1;display:flex;flex-direction:column;gap:1rem;}
    .mvpanel-header{display:flex;flex-direction:column;gap:4px;}
    .mvpanel-color{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray-400);}
    .mvpanel-price-row{display:flex;align-items:baseline;gap:0.6rem;}
    .mvpanel-price{font-size:1.8rem;font-weight:800;color:var(--dark);line-height:1;}
    .mvpanel-compare{font-size:1rem;font-weight:400;color:var(--gray-400);text-decoration:line-through;}
    .mvpanel-badge{font-size:0.7rem;font-weight:700;background:#fef2f2;color:#ef4444;padding:0.2rem 0.5rem;border-radius:100px;}
    .mvpanel-desc{font-size:0.85rem;color:var(--gray-400);line-height:1.65;padding:0.75rem;background:var(--gray-100);border-radius:var(--radius-md);}
    .section-lbl{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--gray-400);margin-bottom:0.4rem;}
    .stor-rows{display:flex;flex-direction:column;gap:0.4rem;}
    .sv-row{display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1rem;border:2px solid var(--gray-200);border-radius:var(--radius-md);cursor:pointer;transition:border-color 0.15s,background 0.15s;}
    .sv-row:hover:not(.oos){border-color:var(--primary);background:rgba(0,188,212,0.03);}
    .sv-row.selected{border-color:var(--primary);background:rgba(0,188,212,0.07);}
    .sv-row.oos{opacity:0.38;cursor:not-allowed;}
    .sv-left{display:flex;flex-direction:column;gap:2px;}
    .sv-stor{font-size:0.9rem;font-weight:600;color:var(--dark);}
    .sv-stock{font-size:0.72rem;color:var(--gray-400);}
    .sv-price-col{display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
    .sv-price{font-size:1rem;font-weight:800;color:var(--primary);}
    .sv-compare{font-size:0.75rem;color:var(--gray-400);text-decoration:line-through;}
    .qty-add-row{display:flex;align-items:center;gap:0.75rem;margin-top:auto;padding-top:0.5rem;}
    .qty-wrap{display:flex;align-items:center;gap:0.4rem;background:var(--gray-100);border-radius:100px;padding:0.3rem 0.6rem;}
    .qty-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--gray-200);background:white;cursor:pointer;font-size:1rem;font-weight:700;display:flex;align-items:center;justify-content:center;transition:0.15s;}
    .qty-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary);}
    .qty-btn:disabled{opacity:.4;cursor:not-allowed;}
    .qty-num{font-size:0.95rem;font-weight:700;min-width:22px;text-align:center;}
    .btn-add-cart{flex:1;padding:0.75rem;background:var(--primary);color:white;border:none;border-radius:100px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.9rem;transition:0.2s;white-space:nowrap;}
    .btn-add-cart:hover:not(:disabled){background:var(--primary-dark);}
    .btn-add-cart:disabled{background:var(--gray-200);color:var(--gray-400);cursor:not-allowed;}
    /* ===================== CART ===================== */
    .cart-sidebar{position:fixed;top:0;right:-420px;width:400px;height:100vh;background:white;z-index:3001;transition:right 0.35s;display:flex;flex-direction:column;box-shadow:-4px 0 20px rgba(0,0,0,0.1);}
    .cart-sidebar.open{right:0;}
    .cart-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center;}
    .cart-header h3{font-size:1.1rem;font-weight:700;}
    .cart-close-btn{width:34px;height:34px;border:none;background:var(--gray-100);border-radius:50%;cursor:pointer;font-size:1rem;}
    .cart-items{flex:1;overflow-y:auto;padding:1rem;}
    .cart-item{display:flex;gap:0.8rem;padding:0.8rem;background:var(--gray-100);border-radius:var(--radius-md);margin-bottom:0.6rem;}
    .cart-item-img{width:60px;height:60px;object-fit:contain;background:white;border-radius:8px;padding:4px;flex-shrink:0;}
    .cart-item-info{flex:1;min-width:0;}
    .cart-item-name{font-weight:600;font-size:0.85rem;margin-bottom:2px;}
    .cart-item-variant{font-size:0.72rem;color:var(--gray-400);margin-bottom:4px;display:flex;align-items:center;gap:5px;}
    .cart-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,0.1);}
    .cart-item-price{font-weight:800;font-size:0.9rem;}
    .cart-item-controls{display:flex;align-items:center;gap:0.3rem;}
    .cart-item-controls button{width:26px;height:26px;border:1.5px solid var(--gray-200);border-radius:50%;background:white;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;}
    .cart-footer{padding:1rem 1.5rem;border-top:1px solid var(--gray-200);}
    .cart-totals{margin-bottom:1rem;font-size:0.88rem;}
    .cart-totals-row{display:flex;justify-content:space-between;padding:0.25rem 0;color:var(--gray-400);}
    .cart-totals-row.total{font-size:1rem;font-weight:800;color:var(--dark);border-top:1.5px solid var(--gray-200);margin-top:0.5rem;padding-top:0.5rem;}
    .checkout-btn{width:100%;padding:0.9rem;background:var(--primary);color:white;border:none;border-radius:100px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.95rem;}
    .checkout-btn:hover{background:var(--primary-dark);}
    .cart-notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--dark);color:white;padding:0.8rem 1.4rem;border-radius:100px;display:flex;gap:0.8rem;align-items:center;z-index:9999;transition:0.35s;opacity:0;font-size:0.88rem;}
    .cart-notif.show{transform:translateX(-50%) translateY(0);opacity:1;}
    @media(max-width:768px){
      .menu-toggle{display:block;}
      .nav-links{display:none;position:absolute;top:100%;left:0;right:0;background:white;flex-direction:column;padding:1rem;box-shadow:0 8px 20px rgba(0,0,0,0.1);}
      .nav-links.show{display:flex;}
      .modal-body{grid-template-columns:1fr;overflow-y:auto;}
      .modal-left{min-height:240px;}
      .modal-variant-thumbs{border-top:none;border-bottom:1px solid var(--gray-200);}
      .cart-sidebar{width:100%;right:-100%;}
    }
  </style>
</head>
<body>
<nav>
  <div class="container">
    <a href="index.html" class="logo-link">
      <img class="logo-img" src="photos/logo.png" alt="BMB Electronics">
      <span class="logo-text">BMB Electronics</span>
    </a>
    <div class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
    <div class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="store.html" class="active">Store</a>
      <a href="contact.html">Contact</a>
      <a href="#" id="accountLink">Account</a>
    </div>
    <div class="nav-icons">
      <div class="cart-icon-wrap" onclick="openCart()">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartBadge">0</span>
      </div>
      <a href="#" id="accountIcon"><i class="fa-regular fa-circle-user"></i></a>
    </div>
  </div>
</nav>

<section class="page-header">
  <div class="overlay"></div>
  <div class="inner"><h1>Our Store</h1><p>Phones · Laptops · Tablets · Accessories</p></div>
</section>

<div class="container">
  <div class="filters">
    <div class="filter-group">
      <select class="filter-select" id="typeFilter" onchange="filterProducts()"><option value="all">All Types</option></select>
      <select class="filter-select" id="brandFilter" onchange="filterProducts()"><option value="all">All Brands</option></select>
      <select class="filter-select" id="sortFilter" onchange="filterProducts()">
        <option value="featured">Featured</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
      </select>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search products…" oninput="filterProducts()">
      <button onclick="filterProducts()"><i class="fa-solid fa-search"></i></button>
    </div>
  </div>
  <div class="product-grid" id="productGrid">
    <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gray-400)">
      <i class="fa-solid fa-spinner fa-spin" style="font-size:2rem;display:block;margin-bottom:1rem"></i>Loading products…
    </div>
  </div>
</div>

<!-- REDESIGNED VARIANT MODAL -->
<div class="modal" id="productModal">
  <div class="modal-box">
    <!-- Top bar -->
    <div class="modal-topbar">
      <div class="modal-topbar-info">
        <div class="modal-topbar-brand" id="mBrand"></div>
        <div class="modal-topbar-name" id="mName"></div>
        <div class="modal-topbar-price" id="mPriceRange"></div>
      </div>
      <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-times"></i></button>
    </div>
    <!-- Body -->
    <div class="modal-body">
      <!-- Left: gallery -->
      <div class="modal-left">
        <div class="modal-gallery-main">
          <img class="modal-gallery-img" id="mImg" src="" alt="" onerror="this.src='https://placehold.co/300x300?text=No+Image'">
        </div>
        <div class="modal-variant-thumbs" id="mThumbs"></div>
      </div>
      <!-- Right: variant tabs + options -->
      <div class="modal-right">
        <div class="modal-variant-tabs" id="mTabs"></div>
        <div class="mvpanel" id="mPanel"></div>
      </div>
    </div>
  </div>
</div>

<!-- CART -->
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3><i class="fa-solid fa-cart-shopping" style="color:var(--primary)"></i> Your Cart</h3>
    <button class="cart-close-btn" onclick="closeCart()"><i class="fa-solid fa-times"></i></button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter" style="display:none">
    <div class="cart-totals" id="cartTotals"></div>
    <button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
  </div>
</div>
<div class="cart-notif" id="cartNotif"><i class="fa-solid fa-circle-check"></i><span id="notifMsg">Added to cart</span></div>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import { collection, getDocs, query, orderBy, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { observeAuthState } from './js/auth.js';

let allProducts=[],filteredProducts=[],cartItems=[],notifTimer=null;
const cardState={},CYCLE_MS=5000;
// Modal state
let mProduct=null,mColorIdx=0,mStorIdx=null,mQty=1;

window.toggleMenu=()=>document.getElementById('navLinks').classList.toggle('show');
function handleAccount(){auth.currentUser?window.location.href='profile.html':(confirm('Please log in.')&&(window.location.href='login.html'));}
document.getElementById('accountLink').onclick=e=>{e.preventDefault();handleAccount();};
document.getElementById('accountIcon').onclick=e=>{e.preventDefault();handleAccount();};
observeAuthState(async user=>{
  document.querySelector('#accountIcon i').className=user?'fa-solid fa-circle-user':'fa-regular fa-circle-user';
  if(user)await loadCart();
});

async function loadProducts(){
  const snap=await getDocs(query(collection(db,'products'),orderBy('createdAt','desc')));
  allProducts=snap.docs.map(d=>({id:d.id,...d.data()}));
  populateFilters();filteredProducts=[...allProducts];renderGrid();
}
function populateFilters(){
  const types=[...new Set(allProducts.map(p=>p.type).filter(Boolean))];
  document.getElementById('typeFilter').innerHTML='<option value="all">All Types</option>'+types.map(t=>`<option value="${t}">${t}</option>`).join('');
  const brands=[...new Set(allProducts.map(p=>p.brand).filter(Boolean))];
  document.getElementById('brandFilter').innerHTML='<option value="all">All Brands</option>'+brands.map(b=>`<option value="${b}">${b}</option>`).join('');
}

// ── Price helpers ──────────────────────────────────────────────
function getAllPrices(p){
  return(p.variants||[]).flatMap(v=>(v.storageOptions||[]).map(o=>o.price)).filter(x=>x>0);
}
function getPriceRangeStr(p){
  const prices=getAllPrices(p);
  if(!prices.length)return'K0';
  const lo=Math.min(...prices),hi=Math.max(...prices);
  return lo===hi?`K${lo.toLocaleString()}`:`K${lo.toLocaleString()} – K${hi.toLocaleString()}`;
}
function getTotalStock(p){return(p.variants||[]).reduce((s,v)=>s+(v.storageOptions||[]).reduce((ss,o)=>ss+(o.stock||0),0),0);}
function getUniqueStorages(p){const s=new Set();(p.variants||[]).forEach(v=>(v.storageOptions||[]).forEach(o=>o.storage&&s.add(o.storage)));return[...s];}

// ── Card grid ─────────────────────────────────────────────────
function renderGrid(){
  Object.values(cardState).forEach(s=>clearInterval(s.timer));
  Object.keys(cardState).forEach(k=>delete cardState[k]);
  const grid=document.getElementById('productGrid');
  if(!filteredProducts.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--gray-400)">No products found.</div>';return;}
  grid.innerHTML=filteredProducts.map(p=>{
    const variants=p.variants||[];
    const isMulti=variants.length>1;
    const priceStr=getPriceRangeStr(p);
    const oos=getTotalStock(p)<=0;
    const storages=getUniqueStorages(p);
    const imgs=variants.map((v,i)=>`<img src="${v.imageUrl||''}" class="${i===0?'active':'inactive'}" alt="${v.color||''}" onerror="this.src='https://placehold.co/200x200?text=No+Image'">`).join('');
    // Dots: only clickable + highlighted when multi-variant
    const dots=variants.map((v,i)=>`<div class="card-color-dot${i===0?' active':''}${isMulti?' clickable multi':''}" title="${v.color||''}" style="background:${v.hex||'#ccc'}" ${isMulti?`onclick="event.stopPropagation();jumpToColor('${p.id}',${i})"`:''} ></div>`).join('');
    const storChips=storages.slice(0,4).map(s=>`<span class="card-stor-chip">${s}</span>`).join('');
    return `<div class="product-card" onclick="openModal('${p.id}')">
      <div class="card-img-wrap" id="cimgwrap-${p.id}">${imgs}</div>
      <div class="card-body">
        <div class="card-brand">${p.brand||''}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-price">${priceStr}</div>
        ${variants.length?`<div class="card-colors" id="ccolors-${p.id}">${dots}</div>`:''}
        ${storages.length?`<div class="card-storages">${storChips}</div>`:''}
        <button class="btn-view" onclick="event.stopPropagation();openModal('${p.id}')" ${oos?'disabled':''}>
          ${oos?'Out of Stock':'<i class="fa-solid fa-eye"></i> View Options'}
        </button>
      </div>
    </div>`;
  }).join('');
  filteredProducts.forEach(p=>{
    const variants=p.variants||[];
    if(variants.length>1){
      cardState[p.id]={activeColorIdx:0};
      cardState[p.id].timer=setInterval(()=>{
        const s=cardState[p.id];const next=(s.activeColorIdx+1)%variants.length;
        applyCardColor(p.id,next);s.activeColorIdx=next;
      },CYCLE_MS);
    }
  });
}

function applyCardColor(pid,cidx){
  const wrap=document.getElementById(`cimgwrap-${pid}`);
  if(wrap)wrap.querySelectorAll('img').forEach((img,i)=>img.className=i===cidx?'active':'inactive');
  const colorsEl=document.getElementById(`ccolors-${pid}`);
  const isMulti=(allProducts.find(x=>x.id===pid)?.variants||[]).length>1;
  if(colorsEl)colorsEl.querySelectorAll('.card-color-dot').forEach((el,i)=>{
    el.classList.toggle('active',i===cidx);
    if(isMulti)el.classList.toggle('multi',true);
  });
  if(cardState[pid])cardState[pid].activeColorIdx=cidx;
}
window.jumpToColor=(pid,cidx)=>{
  if(cardState[pid]){
    clearInterval(cardState[pid].timer);
    const p=allProducts.find(x=>x.id===pid);const variants=p?.variants||[];
    if(variants.length>1)cardState[pid].timer=setInterval(()=>{const s=cardState[pid];const next=(s.activeColorIdx+1)%variants.length;applyCardColor(pid,next);},CYCLE_MS);
  }
  applyCardColor(pid,cidx);
};
window.filterProducts=()=>{
  const type=document.getElementById('typeFilter').value;
  const brand=document.getElementById('brandFilter').value;
  const sort=document.getElementById('sortFilter').value;
  const q=document.getElementById('searchInput').value.toLowerCase();
  filteredProducts=allProducts.filter(p=>(type==='all'||p.type===type)&&(brand==='all'||p.brand===brand)&&(!q||p.name?.toLowerCase().includes(q)));
  if(sort==='price-low')filteredProducts.sort((a,b)=>Math.min(...getAllPrices(a))-Math.min(...getAllPrices(b)));
  if(sort==='price-high')filteredProducts.sort((a,b)=>Math.min(...getAllPrices(b))-Math.min(...getAllPrices(a)));
  renderGrid();
};

// ── MODAL ─────────────────────────────────────────────────────
window.openModal=(id)=>{
  mProduct=allProducts.find(p=>p.id===id);if(!mProduct)return;
  mColorIdx=cardState[id]?.activeColorIdx||0;mStorIdx=null;mQty=1;
  renderModal();
  document.getElementById('productModal').classList.add('show');
};

function renderModal(){
  const p=mProduct;
  const variants=p.variants||[];
  // Top bar
  document.getElementById('mBrand').textContent=p.brand||'';
  document.getElementById('mName').textContent=p.name;
  document.getElementById('mPriceRange').textContent=getPriceRangeStr(p);
  // Thumbnail strip (one per variant)
  document.getElementById('mThumbs').innerHTML=variants.map((v,i)=>`
    <div class="mvt${i===mColorIdx?' active':''}" onclick="switchVariant(${i})" title="${v.color||''}">
      <img src="${v.imageUrl||''}" alt="${v.color||''}" onerror="this.src='https://placehold.co/56x56?text=?'">
    </div>`).join('');
  // Main gallery image
  const imgEl=document.getElementById('mImg');
  imgEl.classList.add('fading');
  setTimeout(()=>{imgEl.src=variants[mColorIdx]?.imageUrl||'';imgEl.classList.remove('fading');},180);
  // Variant tabs
  document.getElementById('mTabs').innerHTML=variants.map((v,i)=>`
    <div class="mvtab${i===mColorIdx?' active':''}" onclick="switchVariant(${i})">
      <span class="mvtab-dot" style="background:${v.hex||'#ccc'}"></span>
      ${v.color||'Variant '+(i+1)}
    </div>`).join('');
  // Panel
  renderPanel();
}

function renderPanel(){
  const p=mProduct;
  const variants=p.variants||[];
  const color=variants[mColorIdx];
  const storageOpts=color?.storageOptions||[];
  const selStor=mStorIdx!==null?storageOpts[mStorIdx]:null;

  // Determine displayed price
  let priceHtml;
  if(selStor){
    const savings=selStor.comparePrice>0?Math.round(((selStor.comparePrice-selStor.price)/selStor.comparePrice)*100):0;
    priceHtml=`<div class="mvpanel-price-row">
      <span class="mvpanel-price">K${selStor.price.toLocaleString()}</span>
      ${selStor.comparePrice>0?`<span class="mvpanel-compare">K${selStor.comparePrice.toLocaleString()}</span>`:''}
      ${savings>0?`<span class="mvpanel-badge">${savings}% off</span>`:''}
    </div>`;
  } else {
    const prices=storageOpts.map(o=>o.price).filter(Boolean);
    const lo=prices.length?Math.min(...prices):0,hi=prices.length?Math.max(...prices):0;
    const rangeStr=lo===hi?`K${lo.toLocaleString()}`:`K${lo.toLocaleString()} – K${hi.toLocaleString()}`;
    priceHtml=`<div class="mvpanel-price-row"><span class="mvpanel-price">${rangeStr}</span></div>
    <div style="font-size:0.78rem;color:var(--gray-400);margin-top:2px">Select a storage option</div>`;
  }

  const storRows=storageOpts.map((opt,i)=>{
    const oos=opt.stock<=0,low=!oos&&opt.stock<=5;
    const savPct=opt.comparePrice>0?Math.round(((opt.comparePrice-opt.price)/opt.comparePrice)*100):0;
    return`<div class="sv-row${i===mStorIdx?' selected':''}${oos?' oos':''}" ${!oos?`onclick="pickStor(${i})"`:'title="Out of stock"'}>
      <div class="sv-left">
        <div class="sv-stor">${opt.storage}</div>
        <div class="sv-stock">${oos?'Out of stock':low?`Only ${opt.stock} left`:`${opt.stock} in stock`}</div>
      </div>
      <div class="sv-price-col">
        <div class="sv-price">K${(opt.price||0).toLocaleString()}</div>
        ${opt.comparePrice>0?`<div class="sv-compare">K${opt.comparePrice.toLocaleString()}</div>`:''}
        ${savPct>0?`<div style="font-size:0.65rem;font-weight:700;color:#ef4444">${savPct}% off</div>`:''}
      </div>
    </div>`;
  }).join('');

  const canAdd=mStorIdx!==null&&selStor&&selStor.stock>0;

  document.getElementById('mPanel').innerHTML=`
    <div class="mvpanel-header">
      <div class="mvpanel-color">${color?.color||''}</div>
      ${priceHtml}
    </div>
    ${p.description?`<div class="mvpanel-desc">${p.description}</div>`:''}
    <div>
      <div class="section-lbl">Storage &amp; Pricing</div>
      <div class="stor-rows">${storRows.length?storRows:'<p style="font-size:0.82rem;color:var(--gray-400)">No storage options.</p>'}</div>
    </div>
    <div class="qty-add-row">
      <div class="qty-wrap">
        <button class="qty-btn" onclick="changeQty(-1)" ${!canAdd?'disabled':''}>−</button>
        <span class="qty-num">${mQty}</span>
        <button class="qty-btn" onclick="changeQty(1)" ${!canAdd?'disabled':''}>+</button>
      </div>
      <button class="btn-add-cart" onclick="addFromModal()" ${!canAdd?'disabled':''}>
        ${canAdd?`<i class="fa-solid fa-cart-plus"></i> Add to Cart · K${selStor.price.toLocaleString()}`:'Select a storage option'}
      </button>
    </div>`;
}

window.switchVariant=(idx)=>{
  mColorIdx=idx;mStorIdx=null;mQty=1;
  // Update tabs
  document.querySelectorAll('.mvtab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.mvt').forEach((t,i)=>t.classList.toggle('active',i===idx));
  // Fade image
  const imgEl=document.getElementById('mImg');
  imgEl.classList.add('fading');
  setTimeout(()=>{imgEl.src=mProduct.variants[idx]?.imageUrl||'';imgEl.classList.remove('fading');},180);
  renderPanel();
};
window.pickStor=(idx)=>{mStorIdx=idx;mQty=1;renderPanel();};
window.changeQty=(delta)=>{
  if(mStorIdx===null)return;
  const stock=mProduct.variants[mColorIdx]?.storageOptions[mStorIdx]?.stock||0;
  mQty=Math.max(1,Math.min(stock,mQty+delta));
  const qEl=document.querySelector('.qty-num');if(qEl)qEl.textContent=mQty;
};
window.addFromModal=async()=>{
  if(mStorIdx===null||!mProduct)return;
  const color=mProduct.variants[mColorIdx];const opt=color?.storageOptions[mStorIdx];
  if(!opt||opt.stock<mQty){alert('Not enough stock.');return;}
  await addToCart({id:mProduct.id,name:mProduct.name,price:opt.price,color:color.color,hex:color.hex||'',storage:opt.storage,image:color.imageUrl,qty:mQty});
  showNotif(`${mProduct.name} · ${color.color} · ${opt.storage}`);closeModal();
};
window.closeModal=()=>document.getElementById('productModal').classList.remove('show');

// ── Cart ───────────────────────────────────────────────────────
async function addToCart(item){
  const key=`${item.id}|${item.color}|${item.storage}`;
  const ex=cartItems.find(c=>`${c.id}|${c.color}|${c.storage}`===key);
  if(ex)ex.qty+=item.qty;else cartItems.push({...item});
  updateCartBadge();await saveCart();
}
async function loadCart(){if(!auth.currentUser)return;const snap=await getDoc(doc(db,'users',auth.currentUser.uid));cartItems=snap.data()?.cart||[];updateCartBadge();}
async function saveCart(){if(auth.currentUser)await updateDoc(doc(db,'users',auth.currentUser.uid),{cart:cartItems});}
function updateCartBadge(){const total=cartItems.reduce((s,i)=>s+i.qty,0);const badge=document.getElementById('cartBadge');badge.style.display=total?'flex':'none';badge.textContent=total>99?'99+':total;}
function showNotif(msg){const el=document.getElementById('cartNotif');document.getElementById('notifMsg').textContent=msg;el.classList.add('show');clearTimeout(notifTimer);notifTimer=setTimeout(()=>el.classList.remove('show'),3000);}
window.openCart=()=>{renderCart();document.getElementById('cartSidebar').classList.add('open');};
window.closeCart=()=>document.getElementById('cartSidebar').classList.remove('open');
function renderCart(){
  const container=document.getElementById('cartItems'),footer=document.getElementById('cartFooter');
  if(!cartItems.length){container.innerHTML='<div style="padding:2rem;text-align:center;color:var(--gray-400)"><i class="fa-solid fa-cart-shopping" style="font-size:2.5rem;display:block;margin-bottom:1rem;opacity:0.3"></i>Your cart is empty</div>';footer.style.display='none';return;}
  let sub=0;
  container.innerHTML=cartItems.map((item,idx)=>{sub+=item.price*item.qty;return`<div class="cart-item">
    <img class="cart-item-img" src="${item.image||''}" alt="${item.name}" onerror="this.src='https://placehold.co/60x60'">
    <div class="cart-item-info">
      <div class="cart-item-name">${item.name}</div>
      <div class="cart-item-variant"><span class="cart-color-dot" style="background:${item.hex||'#ccc'}"></span>${item.color} · ${item.storage}</div>
      <div class="cart-item-price">K${(item.price*item.qty).toLocaleString()}</div>
    </div>
    <div>
      <div class="cart-item-controls">
        <button onclick="updateCartQty(${idx},-1)">−</button>
        <span style="font-size:0.85rem;font-weight:700;min-width:18px;text-align:center">${item.qty}</span>
        <button onclick="updateCartQty(${idx},1)">+</button>
      </div>
      <button onclick="removeCartItem(${idx})" style="margin-top:0.4rem;background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:0.85rem;width:100%"><i class="fa-regular fa-trash-can"></i></button>
    </div>
  </div>`;}).join('');
  const ship=50,tax=Math.round(sub*0.16),total=sub+ship+tax;
  document.getElementById('cartTotals').innerHTML=`
    <div class="cart-totals-row"><span>Subtotal</span><span>K${sub.toLocaleString()}</span></div>
    <div class="cart-totals-row"><span>Shipping</span><span>K${ship}</span></div>
    <div class="cart-totals-row"><span>Tax (16%)</span><span>K${tax.toLocaleString()}</span></div>
    <div class="cart-totals-row total"><span>Total</span><span>K${total.toLocaleString()}</span></div>`;
  footer.style.display='block';
}
window.updateCartQty=async(idx,delta)=>{const nq=cartItems[idx].qty+delta;if(nq<1)return;cartItems[idx].qty=nq;await saveCart();updateCartBadge();renderCart();};
window.removeCartItem=async(idx)=>{cartItems.splice(idx,1);await saveCart();updateCartBadge();renderCart();};
loadProducts();
</script>
</body>
</html>
