<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BMB Electronics | Store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Same styles as original store.html – keep unchanged for brevity */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #00bcd4; --primary-dark: #0097a7; --dark: #0f172a; --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-400: #94a3b8; --white: #ffffff; --radius-lg: 1.5rem; --radius-md: 1rem; --shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--dark); }
    .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
    /* Nav styles (same as original) */
    nav { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); padding: 0.8rem 0; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    nav .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .logo-link { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-img { height: 32px; width: auto; }
    .logo-text { font-size: 1.3rem; font-weight: 800; color: var(--dark); letter-spacing: -1px; }
    .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: var(--dark); }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { text-decoration: none; color: var(--dark); font-weight: 500; transition: 0.3s; font-size: 0.95rem; }
    .nav-links a:hover, .nav-links a.active { color: var(--primary); }
    .nav-icons { display: flex; gap: 1.2rem; font-size: 1.2rem; align-items: center; }
    .nav-icons a { color: var(--dark); text-decoration: none; }
    .nav-icons i { cursor: pointer; transition: 0.3s; }
    .cart-icon-wrap { position: relative; cursor: pointer; }
    .cart-badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 700; display: none; align-items: center; justify-content: center; }
    .page-header { background: url('photos/e.jpeg') center/cover no-repeat; padding: 4rem 1rem; text-align: center; color: white; margin: 10px; border-radius: var(--radius-lg); position: relative; overflow: hidden; }
    .page-header .overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.75); border-radius: var(--radius-lg); }
    .page-header .inner { position: relative; z-index: 1; }
    .filters { display: flex; justify-content: space-between; align-items: center; margin: 2rem 0; flex-wrap: wrap; gap: 1rem; background: white; padding: 1.25rem 1.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow); border: 1px solid var(--gray-200); }
    .filter-group { display: flex; gap: 0.75rem; flex-wrap: wrap; flex: 1; }
    .filter-select { padding: 0.65rem 1.1rem; border-radius: 100px; border: 1.5px solid var(--gray-200); background: white; font-family: 'Inter', sans-serif; cursor: pointer; font-size: 0.88rem; min-width: 150px; }
    .search-box { display: flex; align-items: center; background: white; border: 1.5px solid var(--gray-200); border-radius: 100px; padding: 0.3rem 0.4rem 0.3rem 1.1rem; flex: 1; min-width: 240px; }
    .search-box input { border: none; outline: none; padding: 0.45rem 0; width: 100%; font-family: 'Inter', sans-serif; font-size: 0.9rem; }
    .search-box button { background: var(--primary); border: none; color: white; padding: 0.55rem 1.1rem; border-radius: 100px; cursor: pointer; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1.25rem; margin-bottom: 3rem; }
    .product-card { background: white; border-radius: var(--radius-lg); border: 1.5px solid var(--gray-200); transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; }
    .product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); border-color: rgba(0,188,212,0.35); }
    .card-img-wrap { width: 100%; height: 210px; display: flex; align-items: center; justify-content: center; background: var(--gray-100); padding: 1rem; position: relative; overflow: hidden; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: contain; }
    .stock-tag { position: absolute; top: 10px; left: 10px; padding: 0.2rem 0.6rem; border-radius: 100px; font-size: 0.65rem; font-weight: 700; z-index: 2; background: #dcfce7; color: #16a34a; }
    .stock-tag.low { background: #fff7ed; color: #ea580c; }
    .stock-tag.soldout { background: #fee2e2; color: #dc2626; }
    .card-body { padding: 1rem 1.1rem 1.1rem; display: flex; flex-direction: column; flex: 1; gap: 3px; }
    .card-brand { font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; }
    .card-name { font-size: 0.92rem; font-weight: 600; line-height: 1.3; }
    .card-price { font-size: 1.2rem; font-weight: 800; color: var(--dark); margin-top: 4px; }
    .btn-add { margin-top: auto; padding: 0.72rem 1rem; width: 100%; background: var(--primary); color: white; border: none; border-radius: 100px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; }
    .btn-add:disabled { background: var(--gray-200); cursor: not-allowed; }
    /* Modal styles for variant selection */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); z-index: 2000; align-items: center; justify-content: center; padding: 1rem; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: var(--radius-lg); max-width: 960px; width: 100%; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; animation: modalPop 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes modalPop { from { transform: scale(0.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal-top { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid var(--gray-200); flex-shrink: 0; }
    .modal-close { width: 34px; height: 34px; border-radius: 50%; background: var(--gray-100); border: none; cursor: pointer; }
    .modal-body { display: grid; grid-template-columns: 1fr 1fr; overflow-y: auto; flex: 1; }
    .modal-gallery { background: var(--gray-100); display: flex; align-items: center; justify-content: center; padding: 2rem; min-height: 340px; }
    .modal-gallery img { max-width: 100%; max-height: 300px; object-fit: contain; }
    .modal-info { padding: 1.75rem; overflow-y: auto; }
    .modal-brand { font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; }
    .modal-name { font-size: 1.4rem; font-weight: 800; line-height: 1.2; margin-bottom: 6px; }
    .modal-price { font-size: 1.85rem; font-weight: 800; color: var(--dark); margin-bottom: 1.25rem; }
    .opt-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; color: var(--gray-400); margin-bottom: 0.5rem; margin-top: 0.8rem; }
    .opt-row { display: flex; flex-wrap: wrap; gap: 0.45rem; margin-bottom: 0.5rem; }
    .opt-chip { padding: 0.38rem 0.85rem; border-radius: 100px; border: 1.5px solid var(--gray-200); font-size: 0.82rem; font-weight: 500; cursor: pointer; background: white; transition: all 0.2s; }
    .opt-chip.sel, .opt-chip:hover { border-color: var(--primary); color: var(--primary); background: rgba(0,188,212,0.06); font-weight: 600; }
    .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--gray-200); cursor: pointer; transition: all 0.2s; }
    .color-dot.sel { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,188,212,0.2); }
    .qty-row { display: flex; align-items: center; gap: 8px; margin: 1rem 0; }
    .qty-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--gray-200); background: white; cursor: pointer; font-weight: 700; }
    .qty-num { width: 40px; text-align: center; font-weight: 700; font-size: 1rem; }
    .modal-add-btn { width: 100%; padding: 0.9rem; border-radius: 100px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .modal-add-btn:disabled { background: var(--gray-200); cursor: not-allowed; }
    /* Cart sidebar (same as original) */
    .cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 3000; }
    .cart-overlay.show { display: block; }
    .cart-sidebar { position: fixed; top: 0; right: -420px; width: 400px; height: 100vh; background: white; z-index: 3001; transition: right 0.35s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; box-shadow: -12px 0 40px rgba(0,0,0,0.1); }
    .cart-sidebar.open { right: 0; }
    .cart-header { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray-200); }
    .cart-close-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--gray-100); cursor: pointer; }
    .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
    .cart-item-row { display: flex; gap: 10px; padding: 0.85rem; background: var(--gray-100); border-radius: var(--radius-md); margin-bottom: 0.6rem; }
    .ci-img { width: 58px; height: 58px; border-radius: 8px; object-fit: contain; background: white; padding: 3px; }
    .ci-info { flex: 1; min-width: 0; }
    .ci-name { font-size: 0.84rem; font-weight: 600; }
    .ci-meta { font-size: 0.72rem; color: var(--gray-400); margin-bottom: 6px; }
    .ci-row { display: flex; align-items: center; justify-content: space-between; }
    .ci-price { font-weight: 800; font-size: 0.9rem; color: var(--primary); }
    .ci-controls { display: flex; align-items: center; gap: 5px; }
    .ci-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--gray-200); background: white; cursor: pointer; }
    .ci-remove { background: none; border: none; color: var(--gray-400); cursor: pointer; }
    .cart-footer { padding: 1.25rem 1.5rem; border-top: 1px solid var(--gray-200); }
    .cart-total-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--gray-400); padding: 0.25rem 0; }
    .cart-total-row.grand { font-size: 1rem; font-weight: 800; color: var(--dark); padding-top: 0.65rem; border-top: 1px solid var(--gray-200); margin-top: 0.4rem; }
    .checkout-btn { width: 100%; background: var(--primary); color: white; border: none; border-radius: 100px; padding: 0.9rem; font-weight: 700; cursor: pointer; margin-top: 1rem; }
    .cart-notif { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120px); background: var(--dark); color: white; border-radius: 1.25rem; padding: 0.85rem; display: flex; align-items: center; gap: 12px; min-width: 300px; z-index: 9999; transition: transform 0.4s; opacity: 0; pointer-events: none; }
    .cart-notif.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
    .pagination { display: flex; justify-content: center; gap: 0.4rem; margin: 3rem 0; }
    .page-item { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: white; border: 1.5px solid var(--gray-200); cursor: pointer; }
    .page-item.active { background: var(--primary); border-color: var(--primary); color: white; }
    @media (max-width: 768px) { .menu-toggle { display: block; } .nav-links { display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; flex-direction: column; padding: 1rem; } .nav-links.show { display: flex; } .modal-body { grid-template-columns: 1fr; } .cart-sidebar { width: 100%; right: -100%; } }
  </style>
</head>
<body>

<nav>
  <div class="container">
    <a href="index.html" class="logo-link"><img class="logo-img" src="photos/logo.png" alt="logo"><span class="logo-text">BMB Electronics</span></a>
    <div class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
    <div class="nav-links" id="navLinks"><a href="index.html">Home</a><a href="store.html" class="active">Store</a><a href="contact.html">Contact</a><a href="#" id="accountLink">Account</a></div>
    <div class="nav-icons"><div class="cart-icon-wrap" onclick="openCart()"><i class="fa-solid fa-cart-shopping"></i><span class="cart-badge" id="cartBadge">0</span></div><a href="#" id="accountIcon"><i class="fa-regular fa-circle-user"></i></a></div>
  </div>
</nav>

<section class="page-header"><div class="overlay"></div><div class="inner"><h1>Our Store</h1><p>Phones · Laptops · Accessories</p></div></section>

<div class="container">
  <div class="filters">
    <div class="filter-group"><select class="filter-select" id="categoryFilter" onchange="filterProducts()"><option value="all">All Categories</option></select><select class="filter-select" id="brandFilter" onchange="filterProducts()"><option value="all">All Brands</option></select><select class="filter-select" id="sortFilter" onchange="filterProducts()"><option value="featured">Featured</option><option value="price-low">Price: Low to High</option><option value="price-high">Price: High to Low</option></select></div>
    <div class="search-box"><input type="text" id="searchInput" placeholder="Search products…" onkeyup="if(event.key==='Enter')filterProducts()"><button onclick="filterProducts()"><i class="fa-solid fa-search"></i></button></div>
  </div>
  <div class="product-grid" id="productGrid"><div style="background:white;border-radius:var(--radius-lg);border:1.5px solid var(--gray-200);overflow:hidden;"><div class="skel" style="height:210px;background:#e2e8f0;"></div><div style="padding:1rem"><div class="skel" style="height:10px;width:45%;background:#e2e8f0;margin-bottom:8px;"></div><div class="skel" style="height:14px;width:75%;background:#e2e8f0;"></div></div></div></div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Product Modal with Variants -->
<div class="modal" id="productModal"><div class="modal-content"><div class="modal-top"><span class="modal-crumb" id="modalCrumb">Product Details</span><button class="modal-close" onclick="closeProductModal()"><i class="fa-solid fa-times"></i></button></div><div class="modal-body" id="productDetails"></div></div></div>

<!-- Cart Sidebar -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div><div class="cart-sidebar" id="cartSidebar"><div class="cart-header"><h3>Your Cart</h3><button class="cart-close-btn" onclick="closeCart()"><i class="fa-solid fa-times"></i></button></div><div class="cart-items" id="cartItemsContainer"></div><div class="cart-footer" id="cartFooter" style="display:none;"><div id="cartTotals"></div><button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button></div></div>
<div class="cart-notif" id="cartNotif"><div class="notif-img-box" id="notifImgBox"><span style="font-size:1.6rem;">📦</span></div><div class="notif-text"><div class="notif-label"><i class="fa-solid fa-circle-check"></i> Added to cart</div><div class="notif-name" id="notifName">Item</div><div class="notif-sub" id="notifSub">1 item in cart</div></div><button class="notif-view-btn" onclick="openCart(); hideNotif();">View Cart</button></div>

<script type="module">
  import { auth, db } from './js/firebase-config.js';
  import { collection, getDocs, query, orderBy, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { observeAuthState } from './js/auth.js';

  const COLOR_MAP = { black:'#1a1a1a', white:'#f0f0f0', silver:'#b8b8b8', gold:'#c9a84c', blue:'#2563eb', red:'#dc2626', green:'#16a34a', purple:'#7c3aed', gray:'#9ca3af', pink:'#ec4899', orange:'#f97316' };
  const getHex = c => COLOR_MAP[c?.toLowerCase()] || '#888';

  let allProducts = [], filteredProducts = [], currentPage = 1;
  const PER_PAGE = 12;
  let cartItems = [];
  let modalProduct = null, modalSelectedStorage = null, modalSelectedColor = null, modalQty = 1;
  let notifTimer = null;

  window.toggleMenu = () => document.getElementById('navLinks').classList.toggle('show');
  function handleAccount() { auth.currentUser ? window.location.href='profile.html' : (confirm('Please log in') && (window.location.href='login.html')); }
  document.getElementById('accountLink').onclick = e => { e.preventDefault(); handleAccount(); };
  document.getElementById('accountIcon').onclick = e => { e.preventDefault(); handleAccount(); };

  observeAuthState(async user => {
    document.querySelector('#accountIcon i').className = user ? 'fa-solid fa-circle-user' : 'fa-regular fa-circle-user';
    if (user) await loadCartFromFirestore();
  });

  async function loadProducts() {
    const snap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
    allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    populateDropdowns();
    filteredProducts = [...allProducts];
    displayProducts();
  }

  function populateDropdowns() {
    const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
    const brands = [...new Set(allProducts.map(p => p.brand).filter(Boolean))];
    document.getElementById('categoryFilter').innerHTML = '<option value="all">All Categories</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
    document.getElementById('brandFilter').innerHTML = '<option value="all">All Brands</option>' + brands.map(b => `<option value="${b}">${b}</option>`).join('');
  }

  window.filterProducts = () => {
    const cat = document.getElementById('categoryFilter').value;
    const brand = document.getElementById('brandFilter').value;
    const sort = document.getElementById('sortFilter').value;
    const q = document.getElementById('searchInput').value.toLowerCase();
    filteredProducts = allProducts.filter(p => (cat === 'all' || p.category === cat) && (brand === 'all' || p.brand === brand) && (!q || p.name?.toLowerCase().includes(q) || p.brand?.toLowerCase().includes(q)));
    if (sort === 'price-low') filteredProducts.sort((a,b) => a.price - b.price);
    if (sort === 'price-high') filteredProducts.sort((a,b) => b.price - a.price);
    currentPage = 1;
    displayProducts();
  };

  function displayProducts() {
    const start = (currentPage - 1) * PER_PAGE;
    const page = filteredProducts.slice(start, start + PER_PAGE);
    if (!page.length) { document.getElementById('productGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:4rem">No products found.</div>'; document.getElementById('pagination').innerHTML = ''; return; }
    document.getElementById('productGrid').innerHTML = page.map(p => {
      const totalStock = p.variants?.reduce((sum, v) => sum + (v.stock || 0), 0) || 0;
      const stockClass = totalStock <= 0 ? 'soldout' : totalStock < 5 ? 'low' : '';
      const stockText = totalStock <= 0 ? 'Out of Stock' : totalStock < 5 ? `Only ${totalStock} left` : 'In Stock';
      const imgEl = p.images?.[0] ? `<img src="${p.images[0]}" alt="${p.name}" loading="lazy">` : `<span class="img-placeholder">📦</span>`;
      return `<div class="product-card" onclick="openProductModal('${p.id}')"><div class="card-img-wrap"><span class="stock-tag ${stockClass}">${stockText}</span>${imgEl}</div><div class="card-body"><div class="card-brand">${p.brand || ''}</div><div class="card-name">${p.name}</div><div class="card-price">K${p.price.toLocaleString()}</div><button class="btn-add" onclick="event.stopPropagation(); quickAdd('${p.id}')" ${totalStock <= 0 ? 'disabled' : ''}><i class="fa-solid fa-cart-plus"></i> Add to Cart</button></div></div>`;
    }).join('');
    updatePagination();
  }

  function updatePagination() {
    const total = Math.ceil(filteredProducts.length / PER_PAGE);
    if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = `<button class="page-item" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left"></i></button>`;
    for (let i = 1; i <= total; i++) if (i === 1 || i === total || Math.abs(i - currentPage) <= 1) html += `<button class="page-item ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    html += `<button class="page-item" onclick="goPage(${currentPage + 1})" ${currentPage === total ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i></button>`;
    document.getElementById('pagination').innerHTML = html;
  }
  window.goPage = p => { currentPage = p; displayProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }); };

  // Open product modal with variant selection
  window.openProductModal = (id) => {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    modalProduct = p;
    // Set default selected variant: first available with stock > 0, else first in lists
    const availableVariants = p.variants?.filter(v => v.stock > 0) || [];
    if (availableVariants.length) {
      modalSelectedStorage = availableVariants[0].attributes.storage;
      modalSelectedColor = availableVariants[0].attributes.color;
    } else {
      modalSelectedStorage = p.storageOptions?.[0] || null;
      modalSelectedColor = p.colorOptions?.[0] || null;
    }
    modalQty = 1;
    renderModal();
    document.getElementById('productModal').classList.add('show');
    document.body.style.overflow = 'hidden';
  };

  function getVariantStock(storage, color) {
    const variant = modalProduct.variants?.find(v => v.attributes.storage === storage && v.attributes.color === color);
    return variant ? variant.stock : 0;
  }

  function renderModal() {
    const p = modalProduct;
    const imgEl = p.images?.[0] ? `<img src="${p.images[0]}" alt="${p.name}">` : `<span class="gallery-ph">📦</span>`;
    const storageHtml = p.storageOptions?.length ? `<div class="opt-label">Storage</div><div class="opt-row">${p.storageOptions.map(s => `<button class="opt-chip ${s === modalSelectedStorage ? 'sel' : ''}" onclick="selectStorage('${s}')">${s}</button>`).join('')}</div>` : '';
    const colorHtml = p.colorOptions?.length ? `<div class="opt-label">Colour</div><div class="opt-row">${p.colorOptions.map(c => `<button class="color-dot ${c === modalSelectedColor ? 'sel' : ''}" onclick="selectColor('${c}')" style="background:${getHex(c)};" title="${c}"></button>`).join('')}</div>` : '';
    const currentStock = getVariantStock(modalSelectedStorage, modalSelectedColor);
    document.getElementById('modalCrumb').textContent = `${p.brand || ''} · ${p.category || 'Product'}`;
    document.getElementById('productDetails').innerHTML = `<div class="modal-gallery">${imgEl}</div><div class="modal-info"><div class="modal-brand">${p.brand || ''}</div><div class="modal-name">${p.name}</div><div class="modal-price">K${p.price.toLocaleString()}</div>${p.description ? `<div class="modal-desc">${p.description}</div>` : ''}${storageHtml}${colorHtml}<div class="opt-label">Quantity</div><div class="qty-row"><button class="qty-btn" onclick="chQty(-1)">−</button><span class="qty-num" id="mqty">${modalQty}</span><button class="qty-btn" onclick="chQty(1)">+</button><span class="qty-stock">${currentStock} in stock</span></div><button class="modal-add-btn" onclick="addFromModal()" ${currentStock <= 0 ? 'disabled' : ''}><i class="fa-solid fa-cart-plus"></i> Add to Cart</button></div>`;
  }

  window.selectStorage = (s) => { modalSelectedStorage = s; modalQty = 1; renderModal(); };
  window.selectColor = (c) => { modalSelectedColor = c; modalQty = 1; renderModal(); };
  window.chQty = (d) => { const maxStock = getVariantStock(modalSelectedStorage, modalSelectedColor); modalQty = Math.max(1, Math.min(maxStock, modalQty + d)); document.getElementById('mqty') && (document.getElementById('mqty').textContent = modalQty); };
  window.addFromModal = async () => {
    if (!modalSelectedStorage || !modalSelectedColor) { alert('Please select storage and color'); return; }
    await addToCart({ id: modalProduct.id, name: modalProduct.name, price: modalProduct.price, img: modalProduct.images?.[0] || '', storage: modalSelectedStorage, color: modalSelectedColor, qty: modalQty });
    showNotif(modalProduct.name, modalQty);
    closeProductModal();
  };
  window.closeProductModal = () => { document.getElementById('productModal').classList.remove('show'); document.body.style.overflow = ''; };

  window.quickAdd = async (id) => {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    // For quick add, choose first available variant with stock > 0
    const available = p.variants?.find(v => v.stock > 0);
    if (!available) { alert('This product is out of stock'); return; }
    await addToCart({ id: p.id, name: p.name, price: p.price, img: p.images?.[0] || '', storage: available.attributes.storage, color: available.attributes.color, qty: 1 });
    showNotif(p.name, 1);
  };

  async function addToCart(item) {
    const key = `${item.id}|${item.storage}|${item.color}`;
    const existing = cartItems.find(c => `${c.id}|${c.storage}|${c.color}` === key);
    if (existing) existing.qty += item.qty;
    else cartItems.push({ ...item });
    updateBadge();
    await saveCart();
  }

  async function loadCartFromFirestore() {
    if (!auth.currentUser) return;
    const snap = await getDoc(doc(db, "users", auth.currentUser.uid));
    cartItems = snap.data()?.cart || [];
    updateBadge();
  }
  async function saveCart() {
    if (!auth.currentUser) return;
    await updateDoc(doc(db, "users", auth.currentUser.uid), { cart: cartItems });
  }
  function updateBadge() {
    const total = cartItems.reduce((s, i) => s + i.qty, 0);
    const b = document.getElementById('cartBadge');
    b.style.display = total ? 'flex' : 'none';
    b.textContent = total > 99 ? '99+' : total;
  }

  function showNotif(name, qty) {
    document.getElementById('notifName').textContent = name;
    const total = cartItems.reduce((s, i) => s + i.qty, 0);
    document.getElementById('notifSub').textContent = `${total} item${total !== 1 ? 's' : ''} in cart`;
    const el = document.getElementById('cartNotif');
    el.classList.add('show');
    clearTimeout(notifTimer);
    notifTimer = setTimeout(() => el.classList.remove('show'), 4500);
  }
  window.hideNotif = () => { document.getElementById('cartNotif').classList.remove('show'); clearTimeout(notifTimer); };

  window.openCart = () => { renderCart(); document.getElementById('cartSidebar').classList.add('open'); document.getElementById('cartOverlay').classList.add('show'); document.body.style.overflow = 'hidden'; };
  window.closeCart = () => { document.getElementById('cartSidebar').classList.remove('open'); document.getElementById('cartOverlay').classList.remove('show'); document.body.style.overflow = ''; };

  function renderCart() {
    if (!cartItems.length) { document.getElementById('cartItemsContainer').innerHTML = '<div class="cart-empty-state"><i class="fa-solid fa-cart-shopping"></i><p>Your cart is empty</p></div>'; document.getElementById('cartFooter').style.display = 'none'; return; }
    let sub = 0;
    document.getElementById('cartItemsContainer').innerHTML = cartItems.map((item, idx) => {
      sub += item.price * item.qty;
      return `<div class="cart-item-row"><img class="ci-img" src="${item.img || ''}" onerror="this.style.display='none'"><div class="ci-info"><div class="ci-name">${item.name}</div><div class="ci-meta">${item.storage} · ${item.color}</div><div class="ci-row"><span class="ci-price">K${(item.price * item.qty).toLocaleString()}</span><div class="ci-controls"><button class="ci-btn" onclick="updateQty(${idx},-1)">−</button><span class="ci-qty">${item.qty}</span><button class="ci-btn" onclick="updateQty(${idx},1)">+</button><button class="ci-remove" onclick="removeItem(${idx})"><i class="fa-regular fa-trash-can"></i></button></div></div></div></div>`;
    }).join('');
    const ship = 50, tax = Math.round(sub * 0.16), total = sub + ship + tax;
    document.getElementById('cartTotals').innerHTML = `<div class="cart-total-row"><span>Subtotal</span><span>K${sub.toLocaleString()}</span></div><div class="cart-total-row"><span>Shipping</span><span>K${ship}</span></div><div class="cart-total-row"><span>Tax (16%)</span><span>K${tax.toLocaleString()}</span></div><div class="cart-total-row grand"><span>Total</span><span>K${total.toLocaleString()}</span></div>`;
    document.getElementById('cartFooter').style.display = 'block';
  }
  window.updateQty = async (idx, d) => { cartItems[idx].qty = Math.max(1, cartItems[idx].qty + d); updateBadge(); await saveCart(); renderCart(); };
  window.removeItem = async (idx) => { cartItems.splice(idx, 1); updateBadge(); await saveCart(); renderCart(); };

  loadProducts();
</script>
</body>
</html>
