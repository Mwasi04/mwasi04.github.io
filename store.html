<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>BMB Electronics | Store</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Same base styles as before – keep compact */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary: #00bcd4; --primary-dark: #0097a7; --dark: #0f172a; --gray-100: #f1f5f9; --gray-200: #e2e8f0; --gray-400: #94a3b8; --white: #ffffff; --radius-lg: 1.5rem; --radius-md: 1rem; --shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--dark); }
    .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
    nav { background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); padding: 0.8rem 0; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
    nav .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
    .logo-link { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-img { height: 32px; width: auto; }
    .logo-text { font-size: 1.3rem; font-weight: 800; color: var(--dark); letter-spacing: -1px; }
    .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { text-decoration: none; color: var(--dark); font-weight: 500; transition: 0.3s; }
    .nav-links a:hover, .nav-links a.active { color: var(--primary); }
    .nav-icons { display: flex; gap: 1.2rem; font-size: 1.2rem; align-items: center; }
    .cart-icon-wrap { position: relative; cursor: pointer; }
    .cart-badge { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; width: 18px; height: 18px; border-radius: 50%; font-size: 10px; font-weight: 700; display: none; align-items: center; justify-content: center; }
    .page-header { background: url('photos/e.jpeg') center/cover no-repeat; padding: 4rem 1rem; text-align: center; color: white; margin: 10px; border-radius: var(--radius-lg); position: relative; }
    .page-header .overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.75); border-radius: var(--radius-lg); }
    .page-header .inner { position: relative; z-index: 1; }
    .filters { display: flex; justify-content: space-between; align-items: center; margin: 2rem 0; flex-wrap: wrap; gap: 1rem; background: white; padding: 1.25rem 1.5rem; border-radius: var(--radius-lg); box-shadow: var(--shadow); }
    .filter-group { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .filter-select { padding: 0.65rem 1.1rem; border-radius: 100px; border: 1.5px solid var(--gray-200); background: white; font-family: 'Inter', sans-serif; cursor: pointer; }
    .search-box { display: flex; align-items: center; background: white; border: 1.5px solid var(--gray-200); border-radius: 100px; padding: 0.3rem 0.4rem 0.3rem 1.1rem; flex: 1; min-width: 240px; }
    .search-box input { border: none; outline: none; padding: 0.45rem 0; width: 100%; }
    .search-box button { background: var(--primary); border: none; color: white; padding: 0.55rem 1.1rem; border-radius: 100px; cursor: pointer; }
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 1.25rem; margin-bottom: 3rem; }
    .product-card { background: white; border-radius: var(--radius-lg); border: 1.5px solid var(--gray-200); transition: 0.3s; cursor: pointer; overflow: hidden; }
    .product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .card-img-wrap { height: 210px; display: flex; align-items: center; justify-content: center; background: var(--gray-100); padding: 1rem; position: relative; }
    .card-img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .card-body { padding: 1rem 1.1rem 1.1rem; }
    .card-brand { font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; }
    .card-name { font-size: 0.92rem; font-weight: 600; margin: 4px 0; }
    .card-price { font-size: 1.2rem; font-weight: 800; color: var(--dark); }
    .btn-add { margin-top: 0.8rem; padding: 0.6rem; width: 100%; background: var(--primary); color: white; border: none; border-radius: 100px; font-weight: 600; cursor: pointer; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); z-index: 2000; align-items: center; justify-content: center; padding: 1rem; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: var(--radius-lg); max-width: 960px; width: 100%; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
    .modal-top { display: flex; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid var(--gray-200); }
    .modal-close { width: 34px; height: 34px; border-radius: 50%; background: var(--gray-100); border: none; cursor: pointer; }
    .modal-body { display: grid; grid-template-columns: 1fr 1fr; overflow-y: auto; flex: 1; }
    .modal-gallery { background: var(--gray-100); display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .modal-gallery img { max-width: 100%; max-height: 300px; object-fit: contain; }
    .modal-info { padding: 1.75rem; overflow-y: auto; }
    .modal-brand { font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; }
    .modal-name { font-size: 1.4rem; font-weight: 800; margin: 6px 0; }
    .modal-price { font-size: 1.85rem; font-weight: 800; margin-bottom: 1rem; }
    .opt-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; color: var(--gray-400); margin: 0.8rem 0 0.5rem; }
    .color-swatches { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .color-swatch { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; background-size: cover; background-position: center; }
    .color-swatch.selected { border-color: var(--primary); box-shadow: 0 0 0 2px white, 0 0 0 4px var(--primary); }
    .storage-options { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .storage-chip { padding: 0.5rem 1rem; border: 1.5px solid var(--gray-200); border-radius: 100px; cursor: pointer; font-size: 0.85rem; }
    .storage-chip.selected { border-color: var(--primary); background: rgba(0,188,212,0.1); color: var(--primary); }
    .storage-chip.disabled { opacity: 0.5; cursor: not-allowed; }
    .qty-row { display: flex; align-items: center; gap: 0.5rem; margin: 1rem 0; }
    .qty-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--gray-200); background: white; cursor: pointer; font-weight: 700; }
    .modal-add-btn { width: 100%; padding: 0.9rem; border-radius: 100px; background: var(--primary); color: white; border: none; font-weight: 700; cursor: pointer; margin-top: 1rem; }
    .cart-sidebar { position: fixed; top: 0; right: -420px; width: 400px; height: 100vh; background: white; z-index: 3001; transition: right 0.35s; display: flex; flex-direction: column; }
    .cart-sidebar.open { right: 0; }
    .cart-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; }
    .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
    .cart-item { display: flex; gap: 0.8rem; padding: 0.8rem; background: var(--gray-100); border-radius: var(--radius-md); margin-bottom: 0.6rem; }
    .cart-item-img { width: 60px; height: 60px; object-fit: contain; background: white; border-radius: 8px; padding: 4px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 600; font-size: 0.85rem; }
    .cart-item-variant { font-size: 0.7rem; color: var(--gray-400); }
    .cart-item-price { font-weight: 800; }
    .cart-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--gray-200); }
    .checkout-btn { width: 100%; padding: 0.9rem; background: var(--primary); color: white; border: none; border-radius: 100px; font-weight: 700; cursor: pointer; }
    .cart-notif { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 0.8rem 1.2rem; border-radius: 100px; display: flex; gap: 0.8rem; z-index: 9999; transition: opacity 0.3s; opacity: 0; pointer-events: none; }
    .cart-notif.show { opacity: 1; pointer-events: auto; }
    @media (max-width: 768px) { .menu-toggle { display: block; } .nav-links { display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; flex-direction: column; padding: 1rem; } .nav-links.show { display: flex; } .modal-body { grid-template-columns: 1fr; } .cart-sidebar { width: 100%; right: -100%; } }
  </style>
</head>
<body>
<nav><div class="container"><a href="index.html" class="logo-link"><img class="logo-img" src="photos/logo.png"><span class="logo-text">BMB Electronics</span></a><div class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div><div class="nav-links" id="navLinks"><a href="index.html">Home</a><a href="store.html" class="active">Store</a><a href="contact.html">Contact</a><a href="#" id="accountLink">Account</a></div><div class="nav-icons"><div class="cart-icon-wrap" onclick="openCart()"><i class="fa-solid fa-cart-shopping"></i><span class="cart-badge" id="cartBadge">0</span></div><a href="#" id="accountIcon"><i class="fa-regular fa-circle-user"></i></a></div></div></nav>
<section class="page-header"><div class="overlay"></div><div class="inner"><h1>Our Store</h1><p>Phones · Laptops · Accessories</p></div></section>
<div class="container"><div class="filters"><div class="filter-group"><select class="filter-select" id="categoryFilter"><option value="all">All Categories</option></select><select class="filter-select" id="brandFilter"><option value="all">All Brands</option></select><select class="filter-select" id="sortFilter"><option value="featured">Featured</option><option value="price-low">Price: Low to High</option><option value="price-high">Price: High to Low</option></select></div><div class="search-box"><input type="text" id="searchInput" placeholder="Search..."><button onclick="filterProducts()"><i class="fa-solid fa-search"></i></button></div></div><div class="product-grid" id="productGrid"></div><div class="pagination" id="pagination"></div></div>
<div class="modal" id="productModal"><div class="modal-content"><div class="modal-top"><span id="modalCrumb"></span><button class="modal-close" onclick="closeProductModal()"><i class="fa-solid fa-times"></i></button></div><div class="modal-body" id="productDetails"></div></div></div>
<div class="cart-sidebar" id="cartSidebar"><div class="cart-header"><h3>Your Cart</h3><button class="cart-close-btn" onclick="closeCart()"><i class="fa-solid fa-times"></i></button></div><div class="cart-items" id="cartItems"></div><div class="cart-footer" id="cartFooter" style="display:none;"><div id="cartTotals"></div><button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button></div></div>
<div class="cart-notif" id="cartNotif"><i class="fa-solid fa-circle-check"></i> <span id="notifMsg">Added to cart</span></div>
<script type="module">
  import { auth, db } from './js/firebase-config.js';
  import { collection, getDocs, query, orderBy, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { observeAuthState } from './js/auth.js';

  let allProducts = [], filteredProducts = [], currentPage = 1;
  const PER_PAGE = 12;
  let cartItems = [];
  let modalProduct = null, selectedColor = null, selectedStorage = null, modalQty = 1;
  let notifTimer = null;

  window.toggleMenu = () => document.getElementById('navLinks').classList.toggle('show');
  function handleAccount() { auth.currentUser ? window.location.href='profile.html' : (confirm('Please log in') && (window.location.href='login.html')); }
  document.getElementById('accountLink').onclick = e => { e.preventDefault(); handleAccount(); };
  document.getElementById('accountIcon').onclick = e => { e.preventDefault(); handleAccount(); };
  observeAuthState(async user => { document.querySelector('#accountIcon i').className = user ? 'fa-solid fa-circle-user' : 'fa-regular fa-circle-user'; if (user) await loadCart(); });

  async function loadProducts() {
    const snap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
    allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    populateFilters();
    filteredProducts = [...allProducts];
    displayProducts();
  }
  function populateFilters() {
    const cats = [...new Set(allProducts.map(p=>p.category).filter(Boolean))];
    document.getElementById('categoryFilter').innerHTML = '<option value="all">All Categories</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
    const brands = [...new Set(allProducts.map(p=>p.brand).filter(Boolean))];
    document.getElementById('brandFilter').innerHTML = '<option value="all">All Brands</option>' + brands.map(b=>`<option value="${b}">${b}</option>`).join('');
  }
  function displayProducts() {
    const start = (currentPage-1)*PER_PAGE;
    const page = filteredProducts.slice(start, start+PER_PAGE);
    const grid = document.getElementById('productGrid');
    if (!page.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem">No products</div>'; return; }
    grid.innerHTML = page.map(p => {
      const img = p.variants?.[0]?.imageUrl || '';
      const totalStock = p.variants?.reduce((sum, v) => sum + (v.storageOptions?.reduce((s, opt) => s + (opt.stock||0),0)||0),0)||0;
      return `<div class="product-card" onclick="openProductModal('${p.id}')"><div class="card-img-wrap"><img src="${img}" onerror="this.src='https://placehold.co/200x200?text=No+Image'"></div><div class="card-body"><div class="card-brand">${p.brand||''}</div><div class="card-name">${p.name}</div><div class="card-price">K${p.price.toLocaleString()}</div><button class="btn-add" onclick="event.stopPropagation(); quickAdd('${p.id}')" ${totalStock<=0?'disabled':''}>Add to Cart</button></div></div>`;
    }).join('');
  }
  window.filterProducts = () => {
    const cat = document.getElementById('categoryFilter').value;
    const brand = document.getElementById('brandFilter').value;
    const sort = document.getElementById('sortFilter').value;
    const q = document.getElementById('searchInput').value.toLowerCase();
    filteredProducts = allProducts.filter(p => (cat==='all'||p.category===cat) && (brand==='all'||p.brand===brand) && (!q||p.name.toLowerCase().includes(q)));
    if (sort==='price-low') filteredProducts.sort((a,b)=>a.price-b.price);
    if (sort==='price-high') filteredProducts.sort((a,b)=>b.price-a.price);
    currentPage=1; displayProducts();
  };
  window.openProductModal = (id) => {
    modalProduct = allProducts.find(p=>p.id===id);
    if (!modalProduct) return;
    // Get all unique colors and their images
    const colors = modalProduct.variants.map(v => ({ color: v.color, imageUrl: v.imageUrl }));
    const uniqueColors = [...new Map(colors.map(c=>[c.color, c.imageUrl])).entries()].map(([color, imageUrl]) => ({ color, imageUrl }));
    selectedColor = uniqueColors[0]?.color || null;
    selectedStorage = null;
    modalQty = 1;
    renderModal(uniqueColors);
    document.getElementById('productModal').classList.add('show');
  };
  function getStorageOptionsForColor(color) {
    const variant = modalProduct.variants.find(v => v.color === color);
    if (!variant) return [];
    return variant.storageOptions.map(opt => ({ storage: opt.storage, stock: opt.stock }));
  }
  function renderModal(uniqueColors) {
    const currentVariant = modalProduct.variants.find(v => v.color === selectedColor);
    const currentImage = currentVariant?.imageUrl || '';
    const storageOptions = getStorageOptionsForColor(selectedColor);
    const selectedStock = storageOptions.find(s => s.storage === selectedStorage)?.stock || 0;
    document.getElementById('modalCrumb').innerHTML = `${modalProduct.brand||''} · ${modalProduct.category||''}`;
    document.getElementById('productDetails').innerHTML = `
      <div class="modal-gallery"><img src="${currentImage}" onerror="this.src='https://placehold.co/300x300?text=No+Image'"></div>
      <div class="modal-info">
        <div class="modal-brand">${modalProduct.brand||''}</div>
        <div class="modal-name">${modalProduct.name}</div>
        <div class="modal-price">K${modalProduct.price.toLocaleString()}</div>
        <div class="opt-label">Color</div>
        <div class="color-swatches">${uniqueColors.map(c => `<div class="color-swatch" style="background-image:url(${c.imageUrl}); background-size:cover;" title="${c.color}" onclick="selectColor('${c.color}')"></div>`).join('')}</div>
        ${storageOptions.length ? `<div class="opt-label">Storage</div><div class="storage-options">${storageOptions.map(opt => `<button class="storage-chip ${selectedStorage===opt.storage?'selected':''} ${opt.stock<=0?'disabled':''}" onclick="selectStorage('${opt.storage}')" ${opt.stock<=0?'disabled':''}>${opt.storage} (${opt.stock} left)</button>`).join('')}</div>` : ''}
        <div class="qty-row"><button class="qty-btn" onclick="changeQty(-1)">−</button><span id="modalQty">${modalQty}</span><button class="qty-btn" onclick="changeQty(1)">+</button></div>
        <button class="modal-add-btn" onclick="addFromModal()" ${selectedStock<=0 || !selectedStorage ? 'disabled' : ''}>Add to Cart</button>
      </div>
    `;
    // Highlight selected color swatch (add class 'selected')
    document.querySelectorAll('.color-swatch').forEach(sw => {
      if (sw.title === selectedColor) sw.classList.add('selected');
    });
  }
  window.selectColor = (color) => {
    selectedColor = color;
    selectedStorage = null;
    modalQty = 1;
    const uniqueColors = [...new Map(modalProduct.variants.map(v=>[v.color, v.imageUrl])).entries()].map(([c,img])=> ({ color:c, imageUrl:img }));
    renderModal(uniqueColors);
  };
  window.selectStorage = (storage) => { selectedStorage = storage; modalQty = 1; renderModal([...new Map(modalProduct.variants.map(v=>[v.color, v.imageUrl])).entries()].map(([c,img])=> ({ color:c, imageUrl:img }))); };
  window.changeQty = (delta) => { const stock = getStorageOptionsForColor(selectedColor).find(s=>s.storage===selectedStorage)?.stock||0; modalQty = Math.max(1, Math.min(stock, modalQty+delta)); document.getElementById('modalQty') && (document.getElementById('modalQty').innerText = modalQty); };
  window.addFromModal = async () => {
    if (!selectedColor || !selectedStorage) return;
    const variant = modalProduct.variants.find(v => v.color === selectedColor);
    const storageOpt = variant.storageOptions.find(opt => opt.storage === selectedStorage);
    if (!storageOpt || storageOpt.stock < modalQty) { alert('Not enough stock'); return; }
    await addToCart({ id: modalProduct.id, name: modalProduct.name, price: modalProduct.price, color: selectedColor, storage: selectedStorage, image: variant.imageUrl, qty: modalQty });
    showNotif(`${modalProduct.name} (${selectedColor}, ${selectedStorage})`);
    closeProductModal();
  };
  window.quickAdd = async (id) => {
    const p = allProducts.find(x=>x.id===id);
    if (!p) return;
    const firstColor = p.variants[0];
    if (!firstColor) return;
    const firstStorage = firstColor.storageOptions.find(opt => opt.stock > 0);
    if (!firstStorage) { alert('Out of stock'); return; }
    await addToCart({ id: p.id, name: p.name, price: p.price, color: firstColor.color, storage: firstStorage.storage, image: firstColor.imageUrl, qty: 1 });
    showNotif(`${p.name} (${firstColor.color}, ${firstStorage.storage})`);
  };
  async function addToCart(item) {
    const key = `${item.id}|${item.color}|${item.storage}`;
    const existing = cartItems.find(c => `${c.id}|${c.color}|${c.storage}` === key);
    if (existing) existing.qty += item.qty;
    else cartItems.push(item);
    updateCartBadge();
    await saveCart();
  }
  async function loadCart() { if (auth.currentUser) { const snap = await getDoc(doc(db,"users",auth.currentUser.uid)); cartItems = snap.data()?.cart || []; updateCartBadge(); } }
  async function saveCart() { if (auth.currentUser) await updateDoc(doc(db,"users",auth.currentUser.uid), { cart: cartItems }); }
  function updateCartBadge() { const total = cartItems.reduce((s,i)=>s+i.qty,0); const badge = document.getElementById('cartBadge'); badge.style.display = total ? 'flex' : 'none'; badge.textContent = total>99?'99+':total; }
  function showNotif(msg) { const el = document.getElementById('cartNotif'); document.getElementById('notifMsg').innerText = msg; el.classList.add('show'); clearTimeout(notifTimer); notifTimer = setTimeout(()=>el.classList.remove('show'),3000); }
  window.openCart = () => { renderCart(); document.getElementById('cartSidebar').classList.add('open'); };
  window.closeCart = () => { document.getElementById('cartSidebar').classList.remove('open'); };
  function renderCart() {
    const container = document.getElementById('cartItems');
    if (!cartItems.length) { container.innerHTML = '<div style="padding:2rem;text-align:center">Your cart is empty</div>'; document.getElementById('cartFooter').style.display='none'; return; }
    let sub = 0;
    container.innerHTML = cartItems.map((item,idx) => {
      sub += item.price * item.qty;
      return `<div class="cart-item"><img class="cart-item-img" src="${item.image}" onerror="this.src='https://placehold.co/60x60'"><div class="cart-item-info"><div class="cart-item-name">${item.name}</div><div class="cart-item-variant">${item.color} · ${item.storage}</div><div class="cart-item-price">K${(item.price*item.qty).toLocaleString()}</div></div><div><button onclick="updateCartQty(${idx},-1)">-</button> ${item.qty} <button onclick="updateCartQty(${idx},1)">+</button><button onclick="removeCartItem(${idx})"><i class="fa-regular fa-trash-can"></i></button></div></div>`;
    }).join('');
    const ship=50, tax=Math.round(sub*0.16), total=sub+ship+tax;
    document.getElementById('cartTotals').innerHTML = `<div>Subtotal: K${sub.toLocaleString()}</div><div>Shipping: K${ship}</div><div>Tax: K${tax}</div><div><strong>Total: K${total.toLocaleString()}</strong></div>`;
    document.getElementById('cartFooter').style.display='block';
  }
  window.updateCartQty = async (idx, delta) => { const newQty = cartItems[idx].qty + delta; if (newQty<1) return; cartItems[idx].qty = newQty; await saveCart(); updateCartBadge(); renderCart(); };
  window.removeCartItem = async (idx) => { cartItems.splice(idx,1); await saveCart(); updateCartBadge(); renderCart(); };
  window.closeProductModal = () => { document.getElementById('productModal').classList.remove('show'); };
  loadProducts();
</script>
</body>
</html>
