<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMB Electronics | Manage Orders</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Same styles as users page but with order-specific styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #00bcd4;
      --primary-dark: #0097a7;
      --dark: #0f172a;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --white: #ffffff;
      --radius-lg: 1.5rem;
      --radius-md: 1rem;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    body { font-family: 'Inter', sans-serif; background: var(--gray-100); color: var(--dark); }

    .admin-container { display: flex; min-height: 100vh; }

    /* Sidebar - Same as dashboard */
    .admin-sidebar {
      width: 280px;
      background: var(--dark);
      color: white;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-header a {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: white;
    }

    .sidebar-header img {
      height: 40px;
      width: auto;
    }

    .sidebar-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .sidebar-header span { color: var(--primary); }

    .sidebar-menu { padding: 2rem 1rem; }

    .menu-item { margin-bottom: 0.5rem; }

    .menu-item a {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      color: var(--gray-400);
      text-decoration: none;
      border-radius: 100px;
      transition: 0.3s;
    }

    .menu-item a:hover,
    .menu-item a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .menu-item.logout {
      margin-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 1rem;
    }

    .menu-item.logout a { color: #ef4444; }

    /* Main Content */
    .admin-main {
      flex: 1;
      margin-left: 280px;
      padding: 2rem;
    }

    .admin-header {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .header-title h1 { font-size: 1.8rem; font-weight: 700; }

    .header-profile {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--gray-100);
      padding: 0.5rem 1rem 0.5rem 0.5rem;
      border-radius: 100px;
    }

    .profile-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow);
    }

    .stat-card h3 {
      font-size: 0.9rem;
      color: var(--gray-400);
      margin-bottom: 0.5rem;
    }

    .stat-card .number {
      font-size: 2rem;
      font-weight: 800;
    }

    /* Filters */
    .filters-section {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .filter-select {
      padding: 0.8rem 1rem;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
    }

    .search-box input {
      flex: 1;
      padding: 0.8rem 1rem;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-md);
    }

    .search-box button {
      padding: 0.8rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
    }

    /* Orders Table */
    .orders-table-container {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      overflow-x: auto;
    }

    .orders-table {
      width: 100%;
      border-collapse: collapse;
    }

    .orders-table th {
      text-align: left;
      padding: 1rem;
      background: var(--gray-100);
      color: var(--gray-400);
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
    }

    .orders-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--gray-200);
    }

    .status-badge {
      padding: 0.3rem 1rem;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-block;
    }

    .status-pending { background: #fed7aa; color: #92400e; }
    .status-processing { background: #dbeafe; color: #1e40af; }
    .status-shipped { background: #d1fae5; color: #065f46; }
    .status-delivered { background: #10b981; color: white; }
    .status-cancelled { background: #fee2e2; color: #ef4444; }

    .action-btn {
      padding: 0.3rem 1rem;
      border-radius: 100px;
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
    }

    .status-select {
      padding: 0.3rem;
      border-radius: var(--radius-md);
      border: 1px solid var(--gray-200);
    }

    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--gray-200);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .admin-sidebar { display: none; }
      .admin-main { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html">
          <img src="../photos/logo.png" alt="BMB">
          <h2>BMB<span>Admin</span></h2>
        </a>
      </div>
      <div class="sidebar-menu">
        <div class="menu-item"><a href="dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></div>
        <div class="menu-item"><a href="users.html"><i class="fa-solid fa-users"></i> Users</a></div>
        <div class="menu-item"><a href="orders.html" class="active"><i class="fa-solid fa-box"></i> Orders</a></div>
        <div class="menu-item"><a href="products.html"><i class="fa-solid fa-cube"></i> Products</a></div>
        <div class="menu-item logout"><a href="#" onclick="handleLogout()"><i class="fa-solid fa-sign-out"></i> Logout</a></div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <header class="admin-header">
        <div class="header-title"><h1>Orders</h1></div>
        <div class="header-profile">
          <div class="profile-avatar" id="adminInitials">A</div>
          <div class="profile-info">
            <div class="name" id="adminName">Admin</div>
            <div class="role">Administrator</div>
          </div>
        </div>
      </header>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card"><h3>Total Orders</h3><div class="number" id="totalOrders">0</div></div>
        <div class="stat-card"><h3>Pending</h3><div class="number" id="pendingCount">0</div></div>
        <div class="stat-card"><h3>Processing</h3><div class="number" id="processingCount">0</div></div>
        <div class="stat-card"><h3>Delivered</h3><div class="number" id="deliveredCount">0</div></div>
      </div>

      <!-- Filters -->
      <div class="filters-section">
        <div class="filters-grid">
          <select class="filter-select" id="statusFilter" onchange="filterOrders()">
            <option value="all">All Status</option>
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="shipped">Shipped</option>
            <option value="delivered">Delivered</option>
          </select>
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by order ID or customer...">
            <button onclick="filterOrders()"><i class="fa-solid fa-search"></i></button>
          </div>
        </div>
      </div>

      <!-- Orders Table -->
      <div class="orders-table-container">
        <table class="orders-table">
          <thead>
            <tr><th>Order ID</th><th>Customer</th><th>Date</th><th>Total</th><th>Status</th><th>Action</th></tr>
          </thead>
          <tbody id="ordersTableBody"><tr><td colspan="6" style="text-align: center;"><div class="loading-spinner"></div></td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { collection, getDocs, doc, updateDoc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { observeAuthState, isUserAdmin } from '../js/auth.js';

    let allOrders = [];

    observeAuthState(async (user) => {
      if (!user) { window.location.href = '../login.html'; return; }
      const admin = await isUserAdmin(user.uid);
      if (!admin) { alert('Access denied'); window.location.href = '../index.html'; return; }
      await updateAdminInfo(user);
      loadOrders();
    });

    async function updateAdminInfo(user) {
      const userDoc = await getDoc(doc(db, "users", user.uid));
      const userData = userDoc.data();
      document.getElementById('adminName').textContent = userData?.name || 'Admin';
      document.getElementById('adminInitials').textContent = (userData?.name || 'A').charAt(0).toUpperCase();
    }

    async function loadOrders() {
      const ordersSnapshot = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
      allOrders = ordersSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      updateStats();
      displayOrders(allOrders);
    }

    function updateStats() {
      document.getElementById('totalOrders').textContent = allOrders.length;
      document.getElementById('pendingCount').textContent = allOrders.filter(o => o.status === 'pending').length;
      document.getElementById('processingCount').textContent = allOrders.filter(o => o.status === 'processing').length;
      document.getElementById('deliveredCount').textContent = allOrders.filter(o => o.status === 'delivered').length;
    }

    function displayOrders(orders) {
      const tbody = document.getElementById('ordersTableBody');
      if (orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No orders found</td></tr>';
        return;
      }
      tbody.innerHTML = orders.map(order => `
        <tr>
          <td><strong>#${order.id.slice(-8)}</strong></td>
          <td>${order.customerName || order.customerEmail || 'N/A'}</td>
          <td>${order.createdAt ? new Date(order.createdAt).toLocaleDateString() : 'N/A'}</td>
          <td>K${order.total?.toLocaleString() || 0}</td>
          <td><span class="status-badge status-${order.status || 'pending'}">${order.status || 'pending'}</span></td>
          <td>
            <select class="status-select" onchange="updateOrderStatus('${order.id}', this.value)">
              <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>Pending</option>
              <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>Processing</option>
              <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
              <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
            </select>
          </td>
        </tr>
      `).join('');
    }

    window.filterOrders = () => {
      const status = document.getElementById('statusFilter').value;
      const search = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allOrders.filter(o => status === 'all' || o.status === status);
      if (search) filtered = filtered.filter(o => o.id.toLowerCase().includes(search) || o.customerName?.toLowerCase().includes(search));
      displayOrders(filtered);
    };

    window.updateOrderStatus = async (orderId, newStatus) => {
      await updateDoc(doc(db, "orders", orderId), { status: newStatus });
      loadOrders();
    };

    window.handleLogout = async () => { await signOut(auth); window.location.href = '../login.html'; };
  </script>
</body>
</html>
