<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMB Electronics | Manage Products</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #00bcd4;
      --primary-dark: #0097a7;
      --dark: #0f172a;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --white: #ffffff;
      --radius-lg: 1.5rem;
      --radius-md: 1rem;
      --radius-sm: 0.5rem;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    body { font-family: 'Inter', sans-serif; background: var(--gray-100); color: var(--dark); }
    .admin-container { display: flex; min-height: 100vh; }
    .admin-sidebar {
      width: 280px; background: var(--dark); color: white;
      position: fixed; height: 100vh; overflow-y: auto;
    }
    .sidebar-header { padding: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-header a { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
    .sidebar-header img { height: 40px; width: auto; }
    .sidebar-header h2 { font-size: 1.5rem; font-weight: 700; }
    .sidebar-header span { color: var(--primary); }
    .sidebar-menu { padding: 2rem 1rem; }
    .menu-item { margin-bottom: 0.5rem; }
    .menu-item a {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.5rem; color: var(--gray-400);
      text-decoration: none; border-radius: 100px; transition: 0.3s;
    }
    .menu-item a:hover, .menu-item a.active { background: rgba(255,255,255,0.1); color: white; }
    .menu-item.logout { margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem; }
    .admin-main { flex: 1; margin-left: 280px; padding: 2rem; }
    .admin-header {
      background: white; border-radius: var(--radius-lg); padding: 1.5rem 2rem;
      margin-bottom: 2rem; display: flex; justify-content: space-between;
      align-items: center; box-shadow: var(--shadow);
    }
    .header-title h1 { font-size: 1.8rem; font-weight: 700; }
    .header-profile {
      display: flex; align-items: center; gap: 1rem;
      background: var(--gray-100); padding: 0.5rem 1rem 0.5rem 0.5rem; border-radius: 100px;
    }
    .profile-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 600;
    }
    .btn {
      padding: 0.8rem 1.5rem; border-radius: 100px; font-weight: 600;
      border: none; cursor: pointer; transition: 0.3s; font-family: 'Inter', sans-serif;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--gray-200); color: var(--dark); }
    .btn-outline { background: transparent; border: 2px solid var(--gray-200); color: var(--dark); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-danger { background: #fee2e2; color: #ef4444; }
    .page-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .filters-section { background: white; border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 2rem; box-shadow: var(--shadow); }
    .filters-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 1rem; }
    .filter-select, .filter-input { padding: 0.8rem 1rem; border: 2px solid var(--gray-200); border-radius: var(--radius-md); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; }
    .filter-select:focus, .filter-input:focus { border-color: var(--primary); }
    .search-box { display: flex; gap: 0.5rem; }
    .search-box input { flex: 1; padding: 0.8rem 1rem; border: 2px solid var(--gray-200); border-radius: var(--radius-md); outline: none; }
    .search-box button { padding: 0.8rem 1.5rem; background: var(--primary); color: white; border: none; border-radius: var(--radius-md); cursor: pointer; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1.5rem; }
    .product-card { background: white; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .product-image { height: 180px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; padding: 1rem; position: relative; }
    .product-image img { max-width: 100%; max-height: 100%; object-fit: cover; }
    .product-info { padding: 1.2rem; }
    .product-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
    .product-price { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
    .product-stock { font-size: 0.8rem; color: var(--gray-400); margin: 0.5rem 0; }
    .product-actions { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
    .product-actions button { flex: 1; padding: 0.55rem; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem; }
    .edit-btn { background: var(--primary); color: white; }
    .delete-btn { background: #fee2e2; color: #ef4444; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: var(--radius-lg); padding: 2rem; max-width: 1000px; width: 95%; max-height: 90vh; overflow-y: auto; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--gray-200); }
    .close-modal { font-size: 1.4rem; cursor: pointer; color: var(--gray-400); transition: 0.3s; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .close-modal:hover { background: #fee2e2; color: #ef4444; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.88rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem 1rem; border: 2px solid var(--gray-200); border-radius: var(--radius-md); font-family: 'Inter', sans-serif; font-size: 0.9rem; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .variants-section { margin: 1.5rem 0; border-top: 2px solid var(--gray-200); padding-top: 1.5rem; }
    .variants-table { width: 100%; border-collapse: collapse; margin: 1rem 0; overflow-x: auto; display: block; }
    .variants-table th, .variants-table td { padding: 0.75rem; border: 1px solid var(--gray-200); text-align: left; }
    .variants-table th { background: var(--gray-100); font-weight: 700; }
    .variants-table td input, .variants-table td select { width: 100%; padding: 0.5rem; border: 1px solid var(--gray-200); border-radius: var(--radius-sm); }
    .remove-variant-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 1.2rem; }
    .add-variant-btn { margin-top: 1rem; }
    .img-preview-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(80px,1fr)); gap: 8px; margin-top: 12px; }
    .img-preview-item { position: relative; aspect-ratio: 1; border-radius: var(--radius-md); overflow: hidden; border: 2px solid var(--gray-200); background: var(--gray-100); }
    .img-preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .img-preview-item .remove-img-btn { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: rgba(0,0,0,0.65); color: white; border: none; border-radius: 50%; cursor: pointer; }
    .upload-zone { border: 2px dashed var(--gray-200); border-radius: var(--radius-lg); padding: 1.5rem; text-align: center; cursor: pointer; background: var(--gray-100); }
    .toast { position: fixed; bottom: 30px; right: 30px; background: white; padding: 1rem 1.5rem; border-radius: 100px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; transform: translateX(400px); transition: 0.35s; z-index: 9999; }
    .toast.show { transform: translateX(0); }
    @media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { margin-left: 0; padding: 1rem; } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="admin-container">
  <aside class="admin-sidebar">
    <div class="sidebar-header"><a href="dashboard.html"><img src="../photos/logo.png" alt="logo"><h2>BMB<span>Admin</span></h2></a></div>
    <div class="sidebar-menu">
      <div class="menu-item"><a href="dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></div>
      <div class="menu-item"><a href="users.html"><i class="fa-solid fa-users"></i> Users</a></div>
      <div class="menu-item"><a href="orders.html"><i class="fa-solid fa-box"></i> Orders</a></div>
      <div class="menu-item"><a href="products.html" class="active"><i class="fa-solid fa-cube"></i> Products</a></div>
      <div class="menu-item logout"><a href="#" onclick="handleLogout()"><i class="fa-solid fa-sign-out"></i> Logout</a></div>
    </div>
  </aside>
  <main class="admin-main">
    <header class="admin-header"><div class="header-title"><h1>Products</h1><p style="color:var(--gray-400);">Manage your catalog with dynamic variants</p></div><div class="header-profile"><div class="profile-avatar" id="adminInitials">A</div><div><div style="font-weight:600" id="adminName">Admin</div><div style="font-size:0.8rem;">Administrator</div></div></div></header>
    <div class="page-actions"><h2>All Products</h2><button class="btn btn-primary" onclick="showAddModal()"><i class="fa-solid fa-plus"></i> Add New Product</button></div>
    <div class="filters-section"><div class="filters-grid"><select class="filter-select" id="categoryFilter" onchange="filterProducts()"><option value="all">All Categories</option></select><select class="filter-select" id="brandFilter" onchange="filterProducts()"><option value="all">All Brands</option></select><div class="search-box"><input type="text" id="searchInput" placeholder="Search..."><button onclick="filterProducts()"><i class="fa-solid fa-search"></i></button></div></div></div>
    <div class="products-grid" id="productsGrid"><div style="grid-column:1/-1;text-align:center;padding:3rem"><div class="loading-spinner"></div><p>Loading...</p></div></div>
  </main>
</div>

<!-- Modal -->
<div id="productModal" class="modal"><div class="modal-content"><div class="modal-header"><h2 id="modalTitle">Add Product</h2><span class="close-modal" onclick="closeModal()">&times;</span></div><form id="productForm" onsubmit="handleSubmit(event)"><input type="hidden" id="editProductId">
  <div class="form-group"><label>Product Name *</label><input type="text" id="f-name" required></div>
  <div class="form-row">
    <div class="form-group"><label>Brand</label><input type="text" id="f-brand"></div>
    <div class="form-group"><label>Product Type *</label><select id="f-type" onchange="onProductTypeChange()" required><option value="">Select type</option><option value="Smartphone">Smartphone</option><option value="Laptop">Laptop</option><option value="Tablet">Tablet</option><option value="Accessory">Accessory</option></select></div>
    <div class="form-group"><label>Category</label><select id="f-category"><option value="phones">Phones</option><option value="laptops">Laptops</option><option value="accessories">Accessories</option><option value="tablets">Tablets</option></select></div>
  </div>
  <div class="form-row"><div class="form-group"><label>Price (K) *</label><input type="number" id="f-price" step="0.01" required></div><div class="form-group"><label>Old Price (K)</label><input type="number" id="f-oldprice" step="0.01"></div></div>
  <div class="form-group"><label>Description</label><textarea id="f-desc" rows="3"></textarea></div>
  <div class="form-group"><label>Short Description</label><textarea id="f-shortdesc" rows="2"></textarea></div>

  <!-- Variants Section -->
  <div class="variants-section"><h3 style="margin-bottom:0.5rem;">Product Variants</h3><p style="font-size:0.8rem;color:var(--gray-400);margin-bottom:1rem;" id="variantHint">Define each variant combination with its quantity.</p>
    <div style="overflow-x: auto;"><table class="variants-table" id="variantsTable"><thead id="variantHeader"></thead><tbody id="variantsTbody"></tbody></table></div>
    <button type="button" class="btn btn-outline add-variant-btn" onclick="addVariantRow()"><i class="fa-solid fa-plus"></i> Add Variant</button>
  </div>

  <!-- Images -->
  <div class="variants-section"><h3>Product Images</h3><div class="upload-zone" id="uploadZone"><input type="file" id="imgFileInput" accept="image/jpeg,image/png,image/webp" multiple><div><i class="fa-solid fa-cloud-upload-alt fa-2x"></i><p>Click or drag images here</p></div></div><div class="img-preview-grid" id="imgPreviewGrid"></div></div>

  <div style="display:flex;gap:1rem;margin-top:2rem;"><button type="submit" class="btn btn-primary" style="flex:1">Save Product</button><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>
</form></div></div>

<div class="toast" id="toast"><i class="fa-regular fa-circle-check"></i><span>Done!</span></div>

<script type="module">
  import { auth, db, storage } from '../js/firebase-config.js';
  import { collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { observeAuthState, isUserAdmin } from '../js/auth.js';

  let allProducts = [];
  let variants = []; // each variant = object with attributes based on product type
  let pendingImages = [], existingImages = [];
  let editingProductId = null;
  let currentProductType = 'Smartphone'; // default

  observeAuthState(async user => {
    if (!user) { window.location.href = '../login.html'; return; }
    const admin = await isUserAdmin(user.uid);
    if (!admin) { alert('Access denied.'); window.location.href = '../index.html'; return; }
    const userDoc = await getDoc(doc(db, "users", user.uid));
    document.getElementById('adminName').textContent = userDoc.data()?.name || 'Admin';
    document.getElementById('adminInitials').textContent = (userDoc.data()?.name || 'A').charAt(0);
    await loadProducts();
  });

  async function loadProducts() {
    const snap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
    allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateFilters();
    displayProducts(allProducts);
  }
  function updateFilters() {
    const cats = [...new Set(allProducts.map(p=>p.category).filter(Boolean))];
    document.getElementById('categoryFilter').innerHTML = '<option value="all">All Categories</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
    const brands = [...new Set(allProducts.map(p=>p.brand).filter(Boolean))];
    document.getElementById('brandFilter').innerHTML = '<option value="all">All Brands</option>' + brands.map(b=>`<option value="${b}">${b}</option>`).join('');
  }
  function displayProducts(products) {
    const grid = document.getElementById('productsGrid');
    if (!products.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem">No products found.</div>'; return; }
    grid.innerHTML = products.map(p => {
      const imgSrc = p.images?.[0] || '';
      const totalStock = p.variants?.reduce((sum, v) => sum + (v.stock || 0), 0) || 0;
      return `<div class="product-card"><div class="product-image">${imgSrc ? `<img src="${imgSrc}">` : '<span style="font-size:56px">📦</span>'}</div><div class="product-info"><div class="product-name">${p.name}</div><div class="product-price">K${(p.price||0).toLocaleString()}</div><div class="product-stock">Total stock: ${totalStock}</div><div class="product-actions"><button class="edit-btn" onclick="editProduct('${p.id}')">Edit</button><button class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</button></div></div></div>`;
    }).join('');
  }
  window.filterProducts = () => {
    const cat = document.getElementById('categoryFilter').value;
    const brand = document.getElementById('brandFilter').value;
    const search = document.getElementById('searchInput').value.toLowerCase();
    let f = allProducts.filter(p => (cat==='all'||p.category===cat) && (brand==='all'||p.brand===brand) && (!search||p.name?.toLowerCase().includes(search)));
    displayProducts(f);
  };

  // Dynamic variant columns based on product type
  function getVariantAttributes() {
    const type = document.getElementById('f-type').value;
    if (type === 'Laptop') return ['Color', 'RAM', 'Storage'];
    if (type === 'Smartphone') return ['Color', 'Storage'];
    if (type === 'Tablet') return ['Color', 'Storage']; // similar to phone
    return ['Color']; // accessories maybe only color
  }

  function renderVariantTable() {
    const thead = document.getElementById('variantHeader');
    const tbody = document.getElementById('variantsTbody');
    if (!thead || !tbody) return;
    const attrs = getVariantAttributes();
    // Build header
    thead.innerHTML = '<tr>' + attrs.map(a => `<th>${a}</th>`).join('') + '<th>Quantity</th><th style="width:50px"></th></tr>';
    // Build rows
    tbody.innerHTML = '';
    variants.forEach((variant, idx) => {
      const row = tbody.insertRow();
      // For each attribute, add input
      attrs.forEach(attr => {
        const key = attr.toLowerCase();
        let value = variant[key] || '';
        const cell = row.insertCell();
        cell.innerHTML = `<input type="text" value="${value.replace(/"/g, '&quot;')}" placeholder="${attr}" onchange="updateVariant(${idx},'${key}',this.value)">`;
      });
      // Quantity cell
      const qtyCell = row.insertCell();
      qtyCell.innerHTML = `<input type="number" min="0" value="${variant.stock || 0}" style="width:100px" onchange="updateVariant(${idx},'stock',parseInt(this.value)||0)">`;
      // Delete cell
      const delCell = row.insertCell();
      delCell.innerHTML = `<button type="button" class="remove-variant-btn" onclick="removeVariant(${idx})"><i class="fa-solid fa-trash-can"></i></button>`;
    });
    // Update hint text
    const hint = document.getElementById('variantHint');
    if (attrs.length === 2) hint.textContent = `Define each variant with ${attrs[0]} and ${attrs[1]}.`;
    else if (attrs.length === 3) hint.textContent = `Define each variant with ${attrs[0]}, ${attrs[1]}, and ${attrs[2]}.`;
    else hint.textContent = `Define each variant with ${attrs[0]}.`;
  }

  window.updateVariant = (idx, field, value) => {
    if (!variants[idx]) return;
    variants[idx][field] = value;
  };
  window.removeVariant = (idx) => {
    variants.splice(idx, 1);
    renderVariantTable();
  };
  window.addVariantRow = () => {
    const attrs = getVariantAttributes();
    const newVariant = { stock: 0 };
    attrs.forEach(attr => { newVariant[attr.toLowerCase()] = ''; });
    variants.push(newVariant);
    renderVariantTable();
  };
  window.onProductTypeChange = () => {
    // Clear existing variants when type changes (they won't match new schema)
    variants = [];
    renderVariantTable();
  };

  // Image handling
  function setupImageInput() {
    const inp = document.getElementById('imgFileInput');
    inp.onchange = e => {
      Array.from(e.target.files).forEach(file => {
        if (!file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = ev => { pendingImages.push({ file, dataUrl: ev.target.result }); renderImagePreviews(); };
        reader.readAsDataURL(file);
      });
      inp.value = '';
    };
  }
  function renderImagePreviews() {
    const grid = document.getElementById('imgPreviewGrid');
    if (!grid) return;
    const all = [...existingImages.map(url => ({ type:'existing', src:url })), ...pendingImages.map((p,i) => ({ type:'pending', src:p.dataUrl, idx:i }))];
    grid.innerHTML = all.map((item, idx) => `<div class="img-preview-item"><img src="${item.src}"><button type="button" class="remove-img-btn" onclick="removeImage(${idx},'${item.type}',${item.idx??-1})">×</button></div>`).join('');
  }
  window.removeImage = (globalIdx, type, pendingIdx) => { if(type==='existing') existingImages.splice(globalIdx,1); else pendingImages.splice(pendingIdx,1); renderImagePreviews(); };
  async function uploadImages(productId) {
    const urls = [];
    for (let i=0; i<pendingImages.length; i++) {
      const { file } = pendingImages[i];
      const path = `products/${productId}/img_${Date.now()}_${i}`;
      const task = uploadBytesResumable(ref(storage, path), file);
      await new Promise((res,rej) => task.on('state_changed', null, rej, async () => { urls.push(await getDownloadURL(task.snapshot.ref)); res(); }));
    }
    return urls;
  }

  window.showAddModal = () => {
    document.getElementById('modalTitle').innerHTML = 'Add New Product';
    document.getElementById('productForm').reset();
    document.getElementById('f-type').value = 'Smartphone';
    editingProductId = null;
    variants = [];
    pendingImages = [];
    existingImages = [];
    currentProductType = 'Smartphone';
    renderVariantTable();
    renderImagePreviews();
    setupImageInput();
    document.getElementById('productModal').classList.add('show');
  };
  window.editProduct = async (id) => {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    editingProductId = id;
    document.getElementById('modalTitle').innerHTML = 'Edit Product';
    document.getElementById('f-name').value = p.name || '';
    document.getElementById('f-brand').value = p.brand || '';
    document.getElementById('f-type').value = p.type || 'Smartphone';
    document.getElementById('f-category').value = p.category || 'phones';
    document.getElementById('f-price').value = p.price || '';
    document.getElementById('f-oldprice').value = p.oldPrice || '';
    document.getElementById('f-desc').value = p.description || '';
    document.getElementById('f-shortdesc').value = p.shortDesc || '';
    currentProductType = p.type || 'Smartphone';
    // Convert stored variants to current format
    variants = (p.variants || []).map(v => {
      const attrs = v.attributes;
      const variantObj = { stock: v.stock };
      if (attrs.color) variantObj.color = attrs.color;
      if (attrs.storage) variantObj.storage = attrs.storage;
      if (attrs.ram) variantObj.ram = attrs.ram;
      return variantObj;
    });
    existingImages = p.images || [];
    pendingImages = [];
    renderVariantTable();
    renderImagePreviews();
    setupImageInput();
    document.getElementById('productModal').classList.add('show');
  };
  window.closeModal = () => { document.getElementById('productModal').classList.remove('show'); };
  window.handleSubmit = async (e) => {
    e.preventDefault();
    const btn = document.querySelector('#productForm button[type="submit"]');
    const originalText = btn.innerHTML;
    btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
    try {
      const name = document.getElementById('f-name').value.trim();
      const price = parseFloat(document.getElementById('f-price').value);
      const productType = document.getElementById('f-type').value;
      if (!name || isNaN(price)) throw new Error('Name and price required');
      if (!productType) throw new Error('Select product type');
      // Filter valid variants (all attribute fields non-empty, stock >=0)
      const attrs = getVariantAttributes().map(a => a.toLowerCase());
      const validVariants = variants.filter(v => {
        for (let attr of attrs) if (!v[attr] || v[attr].trim() === '') return false;
        return v.stock >= 0;
      });
      if (validVariants.length === 0) throw new Error('Add at least one complete variant with all attributes and quantity');
      const productId = editingProductId || 'new_' + Date.now();
      let newUrls = [];
      if (pendingImages.length) newUrls = await uploadImages(productId);
      const allImages = [...existingImages, ...newUrls];
      // Convert variants to Firestore structure
      const variantsForDb = validVariants.map(v => {
        const attributes = {};
        if (v.color) attributes.color = v.color;
        if (v.storage) attributes.storage = v.storage;
        if (v.ram) attributes.ram = v.ram;
        return { attributes, stock: v.stock };
      });
      const productData = {
        name, brand: document.getElementById('f-brand').value.trim() || null,
        type: productType,
        category: document.getElementById('f-category').value,
        price, oldPrice: parseFloat(document.getElementById('f-oldprice').value) || null,
        description: document.getElementById('f-desc').value.trim() || null,
        shortDesc: document.getElementById('f-shortdesc').value.trim() || null,
        variants: variantsForDb,
        images: allImages.length ? allImages : null,
        updatedAt: new Date().toISOString()
      };
      if (editingProductId) {
        await updateDoc(doc(db, "products", editingProductId), productData);
        showToast('Product updated');
      } else {
        productData.createdAt = new Date().toISOString();
        await addDoc(collection(db, "products"), productData);
        showToast('Product added');
      }
      closeModal();
      await loadProducts();
    } catch (err) { showToast(err.message, true); }
    finally { btn.disabled = false; btn.innerHTML = originalText; }
  };
  window.deleteProduct = async (id) => {
    if (!confirm('Delete this product? This will also delete its images.')) return;
    const product = allProducts.find(p => p.id === id);
    if (product?.images) {
      for (const url of product.images) {
        try { await deleteObject(ref(storage, url)); } catch(e) {}
      }
    }
    await deleteDoc(doc(db, "products", id));
    showToast('Product deleted');
    await loadProducts();
  };
  function showToast(msg, isError=false) {
    const t = document.getElementById('toast');
    t.querySelector('span').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
  window.handleLogout = async () => { await signOut(auth); window.location.href = '../login.html'; };
</script>
</body>
