<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMB Electronics | Product Manager (Simplified)</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --primary:#00bcd4;--primary-dark:#0097a7;--dark:#0f172a;
      --gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-400:#94a3b8;
      --radius-lg:1.5rem;--radius-md:1rem;--shadow:0 4px 6px -1px rgba(0,0,0,0.1);
    }
    body{font-family:'Inter',sans-serif;background:var(--gray-100);color:var(--dark);}
    .admin-container{display:flex;min-height:100vh;}
    .admin-sidebar{width:280px;background:var(--dark);color:white;position:fixed;height:100vh;overflow-y:auto;}
    .sidebar-header{padding:2rem;border-bottom:1px solid rgba(255,255,255,0.1);}
    .sidebar-header a{display:flex;align-items:center;gap:10px;text-decoration:none;color:white;}
    .sidebar-header img{height:40px;width:auto;}
    .sidebar-header h2{font-size:1.5rem;font-weight:700;}
    .sidebar-header span{color:var(--primary);}
    .sidebar-menu{padding:2rem 1rem;}
    .menu-item{margin-bottom:0.5rem;}
    .menu-item a{display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;color:var(--gray-400);text-decoration:none;border-radius:100px;transition:0.3s;}
    .menu-item a:hover,.menu-item a.active{background:rgba(255,255,255,0.1);color:white;}
    .menu-item.logout{margin-top:2rem;border-top:1px solid rgba(255,255,255,0.1);padding-top:1rem;}
    .admin-main{flex:1;margin-left:280px;padding:2rem;}
    .admin-header{background:white;border-radius:var(--radius-lg);padding:1.5rem 2rem;margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow);}
    .header-title h1{font-size:1.8rem;font-weight:700;}
    .header-profile{display:flex;align-items:center;gap:1rem;background:var(--gray-100);padding:0.5rem 1rem 0.5rem 0.5rem;border-radius:100px;}
    .profile-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;color:white;font-weight:600;}
    .btn{padding:0.8rem 1.5rem;border-radius:100px;font-weight:600;border:none;cursor:pointer;transition:0.3s;font-family:'Inter',sans-serif;}
    .btn-primary{background:var(--primary);color:white;}
    .btn-primary:hover{background:var(--primary-dark);}
    .btn-secondary{background:var(--gray-200);color:var(--dark);}
    .page-actions{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
    .filters-section{background:white;border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:2rem;box-shadow:var(--shadow);}
    .filters-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;}
    .filter-select{padding:0.8rem 1rem;border:2px solid var(--gray-200);border-radius:var(--radius-md);font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;}
    .filter-select:focus{border-color:var(--primary);}
    .search-box{display:flex;gap:0.5rem;}
    .search-box input{flex:1;padding:0.8rem 1rem;border:2px solid var(--gray-200);border-radius:var(--radius-md);outline:none;}
    .search-box button{padding:0.8rem 1.5rem;background:var(--primary);color:white;border:none;border-radius:var(--radius-md);cursor:pointer;}
    .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;}
    .product-card{background:white;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);transition:0.3s;}
    .product-card:hover{transform:translateY(-4px);}
    .product-image{height:180px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;padding:1rem;}
    .product-image img{max-width:100%;max-height:100%;object-fit:contain;}
    .product-info{padding:1.2rem;}
    .product-name{font-size:1rem;font-weight:700;margin-bottom:0.3rem;}
    .product-price{font-size:1.1rem;font-weight:800;color:var(--primary);}
    .product-meta{font-size:0.8rem;color:var(--gray-400);margin:0.3rem 0;}
    .product-actions{display:flex;gap:0.5rem;margin-top:0.8rem;}
    .product-actions button{flex:1;padding:0.55rem;border:none;border-radius:var(--radius-md);cursor:pointer;font-weight:600;}
    .edit-btn{background:var(--primary);color:white;}
    .delete-btn{background:#fee2e2;color:#ef4444;}

    /* --- Simplified Modal --- */
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(5px);align-items:center;justify-content:center;z-index:1000;padding:1rem;}
    .modal.show{display:flex;}
    .modal-content{background:white;border-radius:var(--radius-lg);max-width:1000px;width:100%;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;}
    .modal-header{display:flex;justify-content:space-between;align-items:center;padding:1.5rem 2rem;border-bottom:2px solid var(--gray-200);position:sticky;top:0;background:white;z-index:5;}
    .modal-header h2{font-size:1.4rem;font-weight:700;}
    .close-modal{width:36px;height:36px;border:none;background:var(--gray-100);border-radius:50%;cursor:pointer;font-size:1.1rem;}
    .modal-body{padding:2rem;display:flex;flex-direction:column;gap:2rem;}
    .form-section{border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:1.2rem 1.5rem;background:var(--gray-100);}
    .form-section h3{font-size:1.1rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.6rem;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
    .form-group{margin-bottom:0.8rem;}
    .form-group label{display:block;margin-bottom:0.3rem;font-weight:600;font-size:0.85rem;}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:0.7rem 1rem;border:2px solid var(--gray-200);border-radius:var(--radius-md);font-family:'Inter',sans-serif;font-size:0.9rem;outline:none;}
    .form-group input:focus,.form-group select:focus{border-color:var(--primary);}
    .full-width{grid-column:span 2;}

    /* Color variants simplified */
    .color-card{background:white;border:2px solid var(--gray-200);border-radius:var(--radius-lg);padding:1rem;margin-bottom:1.2rem;transition:0.2s;}
    .color-header{display:flex;flex-wrap:wrap;gap:0.8rem;align-items:center;margin-bottom:1rem;}
    .color-name{flex:2;min-width:140px;}
    .color-picker{width:60px;}
    .color-icon{flex:1;min-width:80px;}
    .remove-color-btn{background:#fee2e2;color:#ef4444;border:none;border-radius:100px;padding:0.4rem 1rem;cursor:pointer;font-weight:600;}
    .color-image-area{display:flex;gap:1rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap;}
    .img-preview{width:70px;height:70px;background:var(--gray-100);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid var(--gray-200);}
    .img-preview img{max-width:100%;max-height:100%;object-fit:contain;}
    .upload-btn{background:var(--gray-100);border:1px dashed var(--gray-400);border-radius:var(--radius-md);padding:0.4rem 1rem;font-size:0.8rem;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
    .upload-btn:hover{background:var(--gray-200);}
    .storage-rows{margin-top:0.8rem;}
    .storage-item{display:grid;grid-template-columns:1fr 110px 100px 32px;gap:0.5rem;margin-bottom:0.6rem;align-items:center;}
    .storage-item input{padding:0.5rem 0.7rem;border:2px solid var(--gray-200);border-radius:0.6rem;font-size:0.85rem;}
    .add-storage-btn{background:transparent;border:1px dashed var(--gray-400);border-radius:100px;padding:0.4rem 0.9rem;font-size:0.75rem;font-weight:600;cursor:pointer;margin-top:0.3rem;}
    .add-color-btn{width:100%;margin-top:0.5rem;padding:0.9rem;background:white;border:2px dashed var(--gray-200);border-radius:var(--radius-md);font-weight:600;cursor:pointer;}
    .modal-footer{padding:1.2rem 2rem;border-top:2px solid var(--gray-200);display:flex;justify-content:flex-end;gap:1rem;background:white;}
    .toast{position:fixed;bottom:30px;right:30px;background:var(--dark);color:white;padding:0.9rem 1.5rem;border-radius:100px;display:flex;align-items:center;gap:10px;transform:translateX(420px);transition:0.35s;z-index:9999;}
    .toast.show{transform:translateX(0);}
    .toast.error{background:#ef4444;}
    @media(max-width:768px){
      .admin-sidebar{display:none;}.admin-main{margin-left:0;padding:1rem;}
      .form-grid{grid-template-columns:1fr;}.full-width{grid-column:span 1;}
      .storage-item{grid-template-columns:1fr 100px 80px 28px;}
    }
  </style>
</head>
<body>
<div class="admin-container">
  <aside class="admin-sidebar">
    <div class="sidebar-header"><a href="dashboard.html"><img src="../photos/logo.png" alt="logo"><h2>BMB<span>Admin</span></h2></a></div>
    <div class="sidebar-menu">
      <div class="menu-item"><a href="dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></div>
      <div class="menu-item"><a href="users.html"><i class="fa-solid fa-users"></i> Users</a></div>
      <div class="menu-item"><a href="orders.html"><i class="fa-solid fa-box"></i> Orders</a></div>
      <div class="menu-item"><a href="products.html" class="active"><i class="fa-solid fa-cube"></i> Products</a></div>
      <div class="menu-item logout"><a href="#" onclick="handleLogout()"><i class="fa-solid fa-sign-out"></i> Logout</a></div>
    </div>
  </aside>
  <main class="admin-main">
    <header class="admin-header">
      <div class="header-title"><h1>Products</h1><p>Manage colors, storage & pricing</p></div>
      <div class="header-profile"><div class="profile-avatar" id="adminInitials">A</div><div><div style="font-weight:600" id="adminName">Admin</div><div style="font-size:0.8rem;">Administrator</div></div></div>
    </header>
    <div class="page-actions"><h2>All Products</h2><button class="btn btn-primary" onclick="showAddModal()"><i class="fa-solid fa-plus"></i> Add New Product</button></div>
    <div class="filters-section"><div class="filters-grid">
      <select class="filter-select" id="categoryFilter" onchange="filterProducts()"><option value="all">All Categories</option></select>
      <select class="filter-select" id="brandFilter" onchange="filterProducts()"><option value="all">All Brands</option></select>
      <div class="search-box"><input type="text" id="searchInput" placeholder="Search products..."><button onclick="filterProducts()"><i class="fa-solid fa-search"></i></button></div>
    </div></div>
    <div class="products-grid" id="productsGrid"><div style="grid-column:1/-1;text-align:center;padding:3rem;"><i class="fa-solid fa-spinner fa-spin"></i> Loading…</div></div>
  </main>
</div>

<!-- SIMPLIFIED MODAL (one step) -->
<div id="productModal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h2 id="modalTitle">Add / Edit Product</h2><button class="close-modal" onclick="closeModal()"><i class="fa-solid fa-times"></i></button></div>
    <div class="modal-body">
      <!-- BASIC INFO SECTION -->
      <div class="form-section"><h3><i class="fa-regular fa-rectangle-list"></i> Basic Information</h3>
        <div class="form-grid">
          <div class="form-group"><label>Product Name *</label><input type="text" id="productName" placeholder="iPhone 15 Pro, Galaxy S24..."></div>
          <div class="form-group"><label>Brand</label><input type="text" id="productBrand" placeholder="Apple, Samsung..."></div>
          <div class="form-group"><label>Product Type *</label><select id="productTypeSelect">
            <option value="Smartphone">📱 Smartphone</option><option value="Laptop">💻 Laptop</option><option value="Tablet">📟 Tablet</option><option value="Accessory">🎧 Accessory</option>
          </select></div>
          <div class="form-group"><label>Category</label><select id="productCategory">
            <option value="phones">Phones</option><option value="laptops">Laptops</option><option value="tablets">Tablets</option><option value="accessories">Accessories</option>
          </select></div>
          <div class="form-group"><label>Compare-at price (K) optional</label><input type="number" id="comparePrice" step="0.01" placeholder="0.00"></div>
          <div class="form-group full-width"><label>Short description (card preview)</label><textarea id="shortDesc" rows="2" placeholder="Brief summary..."></textarea></div>
          <div class="form-group full-width"><label>Full description</label><textarea id="fullDesc" rows="3" placeholder="Detailed product description..."></textarea></div>
        </div>
      </div>
      <!-- COLORS & VARIANTS SECTION (simplified dynamic) -->
      <div class="form-section"><h3><i class="fa-regular fa-palette"></i> Colors & Variants</h3>
        <div id="colorsContainer"></div>
        <button type="button" class="add-color-btn" onclick="addColorVariant()"><i class="fa-solid fa-plus"></i> + Add Color</button>
        <p style="font-size:0.75rem; color:var(--gray-400); margin-top:0.5rem;">Each color has its own image, icon, and storage options (price + stock).</p>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="saveProductBtn" onclick="saveProduct()"><i class="fa-solid fa-floppy-disk"></i> Save Product</button></div>
  </div>
</div>

<div class="toast" id="toast"><i class="fa-regular fa-circle-check"></i><span>Done</span></div>

<script type="module">
import { auth, db, storage } from '../js/firebase-config.js';
import { collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { observeAuthState, isUserAdmin } from '../js/auth.js';

let allProducts = [];
let currentColors = []; // array of { name, cssColor, icon, imageUrl, storageOptions: [{storage, price, stock}] }
let editingProductId = null;

// helpers
function showToast(msg, isErr = false) {
  const t = document.getElementById('toast');
  t.querySelector('span').textContent = msg;
  t.className = 'toast show' + (isErr ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Load products
async function loadProducts() {
  try {
    const snap = await getDocs(query(collection(db, 'products'), orderBy('createdAt', 'desc')));
    allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateFilters();
    renderProductGrid(allProducts);
  } catch (e) { showToast('Failed load products', true); }
}
function updateFilters() {
  const cats = [...new Set(allProducts.map(p => p.category).filter(Boolean))];
  document.getElementById('categoryFilter').innerHTML = '<option value="all">All Categories</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
  const brands = [...new Set(allProducts.map(p => p.brand).filter(Boolean))];
  document.getElementById('brandFilter').innerHTML = '<option value="all">All Brands</option>' + brands.map(b => `<option value="${b}">${b}</option>`).join('');
}
function getPriceRange(p) {
  const prices = (p.colors || []).flatMap(c => (c.storageOptions || []).map(o => o.price)).filter(v => v > 0);
  if (!prices.length) return { min: 0, max: 0 };
  return { min: Math.min(...prices), max: Math.max(...prices) };
}
function renderProductGrid(products) {
  const grid = document.getElementById('productsGrid');
  if (!products.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;">No products found.</div>'; return; }
  grid.innerHTML = products.map(p => {
    const firstColor = p.colors?.[0];
    const img = firstColor?.imageUrl || '';
    const range = getPriceRange(p);
    const priceStr = range.min === range.max ? `K${range.min.toLocaleString()}` : `K${range.min.toLocaleString()} – K${range.max.toLocaleString()}`;
    const totalStock = (p.colors || []).reduce((s, c) => s + (c.storageOptions || []).reduce((ss, o) => ss + (o.stock || 0), 0), 0);
    const icons = (p.colors || []).slice(0, 4).map(c => `<span title="${c.name}" style="font-size:1rem">${c.icon || '🔵'}</span>`).join('');
    return `<div class="product-card"><div class="product-image">${img ? `<img src="${img}" onerror="this.style.display='none'">` : '<span style="font-size:3rem">📦</span>'}</div><div class="product-info"><div class="product-name">${p.name}</div><div class="product-meta">${p.brand || ''} · ${p.type || ''}</div><div class="product-price">${priceStr}</div><div class="product-meta" style="display:flex;gap:0.4rem">${icons}<span>· ${totalStock} in stock</span></div><div class="product-actions"><button class="edit-btn" onclick="window.editProductById('${p.id}')"><i class="fa-solid fa-pen"></i> Edit</button><button class="delete-btn" onclick="window.deleteProductById('${p.id}')"><i class="fa-regular fa-trash-can"></i> Delete</button></div></div></div>`;
  }).join('');
}
window.filterProducts = () => {
  const cat = document.getElementById('categoryFilter').value;
  const brand = document.getElementById('brandFilter').value;
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allProducts.filter(p => (cat === 'all' || p.category === cat) && (brand === 'all' || p.brand === brand) && (!q || p.name?.toLowerCase().includes(q)));
  renderProductGrid(filtered);
};

// ----- COLOR VARIANTS RENDER (simplified) -----
function renderColorList() {
  const container = document.getElementById('colorsContainer');
  if (!container) return;
  if (currentColors.length === 0) { container.innerHTML = '<div style="text-align:center; padding:1rem; background:var(--gray-100); border-radius:1rem; color:gray;">No colors added. Click "Add Color" to start.</div>'; return; }
  container.innerHTML = currentColors.map((color, idx) => `
    <div class="color-card" data-color-index="${idx}">
      <div class="color-header">
        <div class="color-name"><label>Color name</label><input type="text" class="color-name-input" value="${escapeHtml(color.name || '')}" placeholder="e.g. Midnight Black" data-field="name"></div>
        <div class="color-picker"><label>Color</label><input type="color" class="color-hex-input" value="${color.cssColor || '#94a3b8'}" data-field="cssColor"></div>
        <div class="color-icon"><label>Icon (emoji)</label><input type="text" class="color-icon-input" maxlength="2" value="${color.icon || '🔵'}" placeholder="🔵" data-field="icon"></div>
        <button type="button" class="remove-color-btn" data-remove-idx="${idx}"><i class="fa-regular fa-trash-can"></i> Remove</button>
      </div>
      <div class="color-image-area">
        <div class="img-preview" id="preview-${idx}">${color.imageUrl ? `<img src="${color.imageUrl}" alt="preview">` : '<i class="fa-regular fa-image" style="font-size:1.5rem; color:#ccc;"></i>'}</div>
        <label class="upload-btn" data-idx="${idx}"><i class="fa-solid fa-cloud-arrow-up"></i> Upload Image<input type="file" accept="image/*" class="hidden-file-input" data-upload-idx="${idx}" style="display:none;"></label>
        <span style="font-size:0.7rem; color:var(--gray-400);">Required: main color image</span>
      </div>
      <div class="storage-section">
        <div style="font-weight:600; font-size:0.8rem; margin:0.5rem 0 0.3rem;">Storage / Capacity options</div>
        <div class="storage-rows" id="storage-rows-${idx}"></div>
        <button type="button" class="add-storage-btn" data-idx="${idx}"><i class="fa-solid fa-plus"></i> Add option</button>
      </div>
    </div>
  `);
  // Populate storage rows for each color
  currentColors.forEach((color, idx) => {
    const storageDiv = document.getElementById(`storage-rows-${idx}`);
    if (storageDiv) {
      const options = color.storageOptions || [];
      storageDiv.innerHTML = options.map((opt, optIdx) => `
        <div class="storage-item" data-stor-idx="${optIdx}">
          <input type="text" placeholder="e.g. 128GB" value="${escapeHtml(opt.storage || '')}" class="stor-name" data-stor-field="storage">
          <input type="number" placeholder="Price (K)" value="${opt.price || 0}" step="0.01" class="stor-price" data-stor-field="price">
          <input type="number" placeholder="Stock" value="${opt.stock || 0}" step="1" class="stor-stock" data-stor-field="stock">
          <button class="remove-storage-btn" data-remove-stor="${optIdx}"><i class="fa-solid fa-times"></i></button>
        </div>
      `).join('');
      // attach storage listeners
      storageDiv.querySelectorAll('.storage-item').forEach(item => {
        const storIdx = parseInt(item.dataset.storIdx);
        item.querySelector('.stor-name')?.addEventListener('input', (e) => { currentColors[idx].storageOptions[storIdx].storage = e.target.value; });
        item.querySelector('.stor-price')?.addEventListener('input', (e) => { currentColors[idx].storageOptions[storIdx].price = parseFloat(e.target.value) || 0; });
        item.querySelector('.stor-stock')?.addEventListener('input', (e) => { currentColors[idx].storageOptions[storIdx].stock = parseInt(e.target.value) || 0; });
        item.querySelector('.remove-storage-btn')?.addEventListener('click', () => { currentColors[idx].storageOptions.splice(storIdx, 1); renderColorList(); });
      });
    }
  });
  // attach input events for color fields
  document.querySelectorAll('.color-name-input').forEach(inp => {
    const card = inp.closest('.color-card');
    const idx = parseInt(card?.dataset.colorIndex);
    inp.addEventListener('input', (e) => { if (!isNaN(idx)) currentColors[idx].name = e.target.value; });
  });
  document.querySelectorAll('.color-hex-input').forEach(inp => {
    const card = inp.closest('.color-card');
    const idx = parseInt(card?.dataset.colorIndex);
    inp.addEventListener('input', (e) => { if (!isNaN(idx)) currentColors[idx].cssColor = e.target.value; });
  });
  document.querySelectorAll('.color-icon-input').forEach(inp => {
    const card = inp.closest('.color-card');
    const idx = parseInt(card?.dataset.colorIndex);
    inp.addEventListener('input', (e) => { if (!isNaN(idx)) currentColors[idx].icon = e.target.value.substring(0,2); });
  });
  document.querySelectorAll('.remove-color-btn').forEach(btn => {
    btn.addEventListener('click', (e) => { const idx = parseInt(btn.dataset.removeIdx); if (!isNaN(idx)) { currentColors.splice(idx, 1); renderColorList(); } });
  });
  // file upload trigger
  document.querySelectorAll('.upload-btn').forEach(btn => {
    const idx = parseInt(btn.dataset.idx);
    const fileInput = btn.querySelector('.hidden-file-input');
    if (fileInput) {
      fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file || !auth.currentUser) return;
        const progressSpan = btn.querySelector('.upload-progress') || (() => { let s = document.createElement('span'); s.className = 'upload-progress'; s.style.marginLeft = '8px'; s.style.fontSize = '0.7rem'; btn.appendChild(s); return s; })();
        progressSpan.textContent = '⏫ uploading...';
        const path = `products/${Date.now()}_${idx}_${file.name.replace(/[^a-zA-Z0-9.]/g, '_')}`;
        const task = uploadBytesResumable(ref(storage, path), file);
        try {
          await new Promise((resolve, reject) => {
            task.on('state_changed', null, reject, async () => {
              const url = await getDownloadURL(task.snapshot.ref);
              currentColors[idx].imageUrl = url;
              progressSpan.textContent = '✓ uploaded';
              setTimeout(() => { if (progressSpan) progressSpan.remove(); }, 1500);
              renderColorList();
              resolve();
            });
          });
        } catch (err) { showToast('Upload failed', true); progressSpan.remove(); }
        fileInput.value = '';
      });
      btn.addEventListener('click', () => fileInput.click());
    }
  });
  // add storage listeners (dynamic)
  document.querySelectorAll('.add-storage-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const idx = parseInt(btn.dataset.idx);
      if (!isNaN(idx)) {
        if (!currentColors[idx].storageOptions) currentColors[idx].storageOptions = [];
        currentColors[idx].storageOptions.push({ storage: '', price: 0, stock: 0 });
        renderColorList();
      }
    });
  });
}
function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

window.addColorVariant = () => {
  currentColors.push({ name: '', cssColor: '#3b82f6', icon: '🔵', imageUrl: '', storageOptions: [] });
  renderColorList();
};

// save product (create/update)
window.saveProduct = async () => {
  const name = document.getElementById('productName').value.trim();
  if (!name) { showToast('Product name is required', true); return; }
  const type = document.getElementById('productTypeSelect').value;
  if (!type) { showToast('Select product type', true); return; }
  if (currentColors.length === 0) { showToast('Add at least one color variant', true); return; }
  for (let i = 0; i < currentColors.length; i++) {
    const c = currentColors[i];
    if (!c.name.trim()) { showToast(`Color ${i+1}: name required`, true); return; }
    if (!c.imageUrl) { showToast(`Color "${c.name || i+1}" needs an image`, true); return; }
    if (!c.storageOptions || c.storageOptions.length === 0) { showToast(`Color ${c.name} needs at least one storage option`, true); return; }
    for (let s of c.storageOptions) {
      if (!s.storage.trim()) { showToast(`${c.name}: storage capacity missing`, true); return; }
      if (!s.price || s.price <= 0) { showToast(`${c.name} - ${s.storage}: price required`, true); return; }
    }
  }
  const btn = document.getElementById('saveProductBtn');
  btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
  const allPrices = currentColors.flatMap(c => c.storageOptions.map(o => o.price));
  const data = {
    name: name,
    brand: document.getElementById('productBrand').value.trim() || null,
    type: type,
    category: document.getElementById('productCategory').value,
    price: allPrices.length ? Math.min(...allPrices) : 0,
    oldPrice: parseFloat(document.getElementById('comparePrice').value) || null,
    description: document.getElementById('fullDesc').value.trim() || null,
    shortDesc: document.getElementById('shortDesc').value.trim() || null,
    colors: currentColors.map(c => ({
      name: c.name, cssColor: c.cssColor, icon: c.icon, imageUrl: c.imageUrl,
      storageOptions: c.storageOptions.map(o => ({ storage: o.storage, price: Number(o.price), stock: Number(o.stock) }))
    })),
    updatedAt: new Date().toISOString()
  };
  try {
    if (editingProductId) {
      await updateDoc(doc(db, 'products', editingProductId), data);
      showToast('Product updated');
    } else {
      data.createdAt = new Date().toISOString();
      await addDoc(collection(db, 'products'), data);
      showToast('Product added');
    }
    closeModal();
    await loadProducts();
  } catch (err) { showToast(err.message, true); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Product'; }
};

window.editProductById = async (id) => {
  const prod = allProducts.find(p => p.id === id);
  if (!prod) return;
  editingProductId = id;
  document.getElementById('modalTitle').innerText = 'Edit Product';
  document.getElementById('productName').value = prod.name || '';
  document.getElementById('productBrand').value = prod.brand || '';
  document.getElementById('productTypeSelect').value = prod.type || 'Smartphone';
  document.getElementById('productCategory').value = prod.category || 'phones';
  document.getElementById('comparePrice').value = prod.oldPrice || '';
  document.getElementById('shortDesc').value = prod.shortDesc || '';
  document.getElementById('fullDesc').value = prod.description || '';
  currentColors = (prod.colors || []).map(c => ({
    name: c.name || '', cssColor: c.cssColor || '#94a3b8', icon: c.icon || '🔵', imageUrl: c.imageUrl || '',
    storageOptions: (c.storageOptions || []).map(o => ({ storage: o.storage, price: o.price || 0, stock: o.stock || 0 }))
  }));
  renderColorList();
  document.getElementById('productModal').classList.add('show');
};
window.deleteProductById = async (id) => {
  if (!confirm('Permanently delete this product?')) return;
  await deleteDoc(doc(db, 'products', id));
  showToast('Deleted');
  await loadProducts();
};
window.showAddModal = () => {
  editingProductId = null;
  document.getElementById('modalTitle').innerText = 'Add New Product';
  document.getElementById('productName').value = '';
  document.getElementById('productBrand').value = '';
  document.getElementById('productTypeSelect').value = 'Smartphone';
  document.getElementById('productCategory').value = 'phones';
  document.getElementById('comparePrice').value = '';
  document.getElementById('shortDesc').value = '';
  document.getElementById('fullDesc').value = '';
  currentColors = [];
  renderColorList();
  document.getElementById('productModal').classList.add('show');
};
window.closeModal = () => { document.getElementById('productModal').classList.remove('show'); editingProductId = null; };
window.handleLogout = async () => { await signOut(auth); window.location.href = '../login.html'; };

// Auth observer
observeAuthState(async user => {
  if (!user) { window.location.href = '../login.html'; return; }
  const admin = await isUserAdmin(user.uid);
  if (!admin) { alert('Access denied.'); window.location.href = '../index.html'; return; }
  const userDoc = await getDoc(doc(db, 'users', user.uid));
  document.getElementById('adminName').innerText = userDoc.data()?.name || 'Admin';
  document.getElementById('adminInitials').innerText = (userDoc.data()?.name || 'A').charAt(0).toUpperCase();
  await loadProducts();
});
</script>
