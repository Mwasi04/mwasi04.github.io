<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMB Electronics | Manage Products</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #00bcd4;
      --primary-dark: #0097a7;
      --dark: #0f172a;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --white: #ffffff;
      --radius-lg: 1.5rem;
      --radius-md: 1rem;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    body { font-family: 'Inter', sans-serif; background: var(--gray-100); color: var(--dark); }
    .admin-container { display: flex; min-height: 100vh; }
    .admin-sidebar {
      width: 280px; background: var(--dark); color: white;
      position: fixed; height: 100vh; overflow-y: auto;
    }
    .sidebar-header { padding: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-header a { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
    .sidebar-header img { height: 40px; width: auto; }
    .sidebar-header h2 { font-size: 1.5rem; font-weight: 700; }
    .sidebar-header span { color: var(--primary); }
    .sidebar-menu { padding: 2rem 1rem; }
    .menu-item { margin-bottom: 0.5rem; }
    .menu-item a {
      display: flex; align-items: center; gap: 1rem;
      padding: 1rem 1.5rem; color: var(--gray-400);
      text-decoration: none; border-radius: 100px; transition: 0.3s;
    }
    .menu-item a:hover, .menu-item a.active { background: rgba(255,255,255,0.1); color: white; }
    .menu-item.logout { margin-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem; }
    .admin-main { flex: 1; margin-left: 280px; padding: 2rem; }
    .admin-header {
      background: white; border-radius: var(--radius-lg); padding: 1.5rem 2rem;
      margin-bottom: 2rem; display: flex; justify-content: space-between;
      align-items: center; box-shadow: var(--shadow);
    }
    .header-title h1 { font-size: 1.8rem; font-weight: 700; }
    .header-profile {
      display: flex; align-items: center; gap: 1rem;
      background: var(--gray-100); padding: 0.5rem 1rem 0.5rem 0.5rem; border-radius: 100px;
    }
    .profile-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 600;
    }
    .btn {
      padding: 0.8rem 1.5rem; border-radius: 100px; font-weight: 600;
      border: none; cursor: pointer; transition: 0.3s; font-family: 'Inter', sans-serif;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--gray-200); color: var(--dark); }
    .btn-outline { background: transparent; border: 2px solid var(--gray-200); color: var(--dark); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-danger { background: #fee2e2; color: #ef4444; }
    .page-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .filters-section { background: white; border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 2rem; box-shadow: var(--shadow); }
    .filters-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 1rem; }
    .filter-select, .filter-input { padding: 0.8rem 1rem; border: 2px solid var(--gray-200); border-radius: var(--radius-md); font-family: 'Inter', sans-serif; font-size: 0.9rem; outline: none; }
    .filter-select:focus, .filter-input:focus { border-color: var(--primary); }
    .search-box { display: flex; gap: 0.5rem; }
    .search-box input { flex: 1; padding: 0.8rem 1rem; border: 2px solid var(--gray-200); border-radius: var(--radius-md); outline: none; }
    .search-box button { padding: 0.8rem 1.5rem; background: var(--primary); color: white; border: none; border-radius: var(--radius-md); cursor: pointer; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 1.5rem; }
    .product-card { background: white; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); transition: 0.3s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .product-image { height: 180px; background: var(--gray-100); display: flex; align-items: center; justify-content: center; padding: 1rem; position: relative; }
    .product-image img { max-width: 100%; max-height: 100%; object-fit: cover; }
    .product-info { padding: 1.2rem; }
    .product-name { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
    .product-price { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
    .product-stock { font-size: 0.8rem; color: var(--gray-400); margin: 0.5rem 0; }
    .product-actions { display: flex; gap: 0.5rem; margin-top: 0.8rem; }
    .product-actions button { flex: 1; padding: 0.55rem; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem; }
    .edit-btn { background: var(--primary); color: white; }
    .delete-btn { background: #fee2e2; color: #ef4444; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: var(--radius-lg); padding: 2rem; max-width: 800px; width: 95%; max-height: 90vh; overflow-y: auto; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--gray-200); }
    .close-modal { font-size: 1.4rem; cursor: pointer; color: var(--gray-400); transition: 0.3s; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .close-modal:hover { background: #fee2e2; color: #ef4444; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; font-weight: 600; font-size: 0.88rem; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem 1rem; border: 2px solid var(--gray-200); border-radius: var(--radius-md); font-family: 'Inter', sans-serif; font-size: 0.9rem; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .variants-section { margin: 1.5rem 0; border-top: 2px solid var(--gray-200); padding-top: 1.5rem; }
    .variant-card {
      background: var(--gray-100);
      border-radius: var(--radius-md);
      padding: 1rem;
      margin-bottom: 1rem;
      border: 1px solid var(--gray-200);
    }
    .variant-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .variant-color-input { width: 200px; }
    .storage-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .storage-row input { flex: 1; }
    .add-storage-btn { margin: 0.5rem 0; }
    .variant-image { margin-top: 1rem; }
    .variant-image .current-image { max-width: 100px; border-radius: var(--radius-sm); margin-bottom: 0.5rem; }
    .upload-zone {
      border: 2px dashed var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 0.8rem;
      text-align: center;
      cursor: pointer;
      background: white;
      margin-top: 0.5rem;
      position: relative;
    }
    .upload-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .upload-status {
      font-size: 0.75rem;
      color: var(--primary);
      margin-top: 0.5rem;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: white;
      padding: 1rem 1.5rem;
      border-radius: 100px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateX(400px);
      transition: 0.35s;
      z-index: 9999;
    }
    .toast.show { transform: translateX(0); }
    @media (max-width: 768px) {
      .admin-sidebar { display: none; }
      .admin-main { margin-left: 0; padding: 1rem; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="admin-container">
  <aside class="admin-sidebar">
    <div class="sidebar-header"><a href="dashboard.html"><img src="../photos/logo.png" alt="logo"><h2>BMB<span>Admin</span></h2></a></div>
    <div class="sidebar-menu">
      <div class="menu-item"><a href="dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></div>
      <div class="menu-item"><a href="users.html"><i class="fa-solid fa-users"></i> Users</a></div>
      <div class="menu-item"><a href="orders.html"><i class="fa-solid fa-box"></i> Orders</a></div>
      <div class="menu-item"><a href="products.html" class="active"><i class="fa-solid fa-cube"></i> Products</a></div>
      <div class="menu-item logout"><a href="#" onclick="handleLogout()"><i class="fa-solid fa-sign-out"></i> Logout</a></div>
    </div>
  </aside>
  <main class="admin-main">
    <header class="admin-header"><div class="header-title"><h1>Products</h1><p>Manage products with color variants and storage options</p></div><div class="header-profile"><div class="profile-avatar" id="adminInitials">A</div><div><div style="font-weight:600" id="adminName">Admin</div><div style="font-size:0.8rem;">Administrator</div></div></div></header>
    <div class="page-actions"><h2>All Products</h2><button class="btn btn-primary" onclick="showAddModal()"><i class="fa-solid fa-plus"></i> Add New Product</button></div>
    <div class="filters-section"><div class="filters-grid"><select class="filter-select" id="categoryFilter" onchange="filterProducts()"><option value="all">All Categories</option></select><select class="filter-select" id="brandFilter" onchange="filterProducts()"><option value="all">All Brands</option></select><div class="search-box"><input type="text" id="searchInput" placeholder="Search..."><button onclick="filterProducts()"><i class="fa-solid fa-search"></i></button></div></div></div>
    <div class="products-grid" id="productsGrid"><div style="grid-column:1/-1;text-align:center;padding:3rem"><div class="loading-spinner"></div><p>Loading...</p></div></div>
  </main>
</div>

<!-- Modal -->
<div id="productModal" class="modal"><div class="modal-content"><div class="modal-header"><h2 id="modalTitle">Add Product</h2><span class="close-modal" onclick="closeModal()">&times;</span></div><form id="productForm" onsubmit="handleSubmit(event)"><input type="hidden" id="editProductId">
  <div class="form-group"><label>Product Name *</label><input type="text" id="f-name" required></div>
  <div class="form-row"><div class="form-group"><label>Brand</label><input type="text" id="f-brand"></div><div class="form-group"><label>Product Type *</label><select id="f-type" required><option value="">Select type</option><option value="Smartphone">Smartphone</option><option value="Laptop">Laptop</option><option value="Tablet">Tablet</option><option value="Accessory">Accessory</option></select></div><div class="form-group"><label>Category</label><select id="f-category"><option value="phones">Phones</option><option value="laptops">Laptops</option><option value="accessories">Accessories</option><option value="tablets">Tablets</option></select></div></div>
  <div class="form-row"><div class="form-group"><label>Price (K) *</label><input type="number" id="f-price" step="0.01" required></div><div class="form-group"><label>Old Price (K)</label><input type="number" id="f-oldprice" step="0.01"></div></div>
  <div class="form-group"><label>Description</label><textarea id="f-desc" rows="3"></textarea></div>
  <div class="form-group"><label>Short Description</label><textarea id="f-shortdesc" rows="2"></textarea></div>

  <!-- Color Variants Section -->
  <div class="variants-section"><h3>Color Variants</h3><p style="font-size:0.8rem;color:var(--gray-400);margin-bottom:1rem;">Each color has its own image and storage options with quantities.</p>
    <div id="variantsContainer"></div>
    <button type="button" class="btn btn-outline" onclick="addColorVariant()"><i class="fa-solid fa-plus"></i> Add Color</button>
  </div>

  <div style="display:flex;gap:1rem;margin-top:2rem;"><button type="submit" class="btn btn-primary" style="flex:1">Save Product</button><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>
</form></div></div>

<div class="toast" id="toast"><i class="fa-regular fa-circle-check"></i><span>Done!</span></div>

<script type="module">
  import { auth, db, storage } from '../js/firebase-config.js';
  import { collection, getDocs, addDoc, updateDoc, deleteDoc, doc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
  import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { observeAuthState, isUserAdmin } from '../js/auth.js';

  let allProducts = [];
  let colorVariants = []; // each: { color, imageFile, imageUrl, storageOptions: [{ storage, stock }] }
  let editingProductId = null;

  // Helper: show toast message
  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.querySelector('span').textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  observeAuthState(async user => {
    if (!user) { window.location.href = '../login.html'; return; }
    const admin = await isUserAdmin(user.uid);
    if (!admin) { alert('Access denied.'); window.location.href = '../index.html'; return; }
    const userDoc = await getDoc(doc(db, "users", user.uid));
    document.getElementById('adminName').textContent = userDoc.data()?.name || 'Admin';
    document.getElementById('adminInitials').textContent = (userDoc.data()?.name || 'A').charAt(0);
    await loadProducts();
  });

  async function loadProducts() {
    try {
      const snap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
      allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateFilters();
      displayProducts(allProducts);
    } catch (err) {
      console.error(err);
      showToast('Failed to load products', true);
    }
  }
  function updateFilters() {
    const cats = [...new Set(allProducts.map(p=>p.category).filter(Boolean))];
    document.getElementById('categoryFilter').innerHTML = '<option value="all">All Categories</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
    const brands = [...new Set(allProducts.map(p=>p.brand).filter(Boolean))];
    document.getElementById('brandFilter').innerHTML = '<option value="all">All Brands</option>' + brands.map(b=>`<option value="${b}">${b}</option>`).join('');
  }
  function displayProducts(products) {
    const grid = document.getElementById('productsGrid');
    if (!products.length) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem">No products found.</div>'; return; }
    grid.innerHTML = products.map(p => {
      const imgSrc = p.variants?.[0]?.imageUrl || '';
      const totalStock = p.variants?.reduce((sum, v) => sum + (v.storageOptions?.reduce((s, opt) => s + (opt.stock || 0), 0) || 0), 0) || 0;
      return `<div class="product-card"><div class="product-image">${imgSrc ? `<img src="${imgSrc}">` : '<span style="font-size:56px">📦</span>'}</div><div class="product-info"><div class="product-name">${p.name}</div><div class="product-price">K${(p.price||0).toLocaleString()}</div><div class="product-stock">Total stock: ${totalStock}</div><div class="product-actions"><button class="edit-btn" onclick="editProduct('${p.id}')">Edit</button><button class="delete-btn" onclick="deleteProduct('${p.id}')">Delete</button></div></div></div>`;
    }).join('');
  }
  window.filterProducts = () => {
    const cat = document.getElementById('categoryFilter').value;
    const brand = document.getElementById('brandFilter').value;
    const search = document.getElementById('searchInput').value.toLowerCase();
    let f = allProducts.filter(p => (cat==='all'||p.category===cat) && (brand==='all'||p.brand===brand) && (!search||p.name?.toLowerCase().includes(search)));
    displayProducts(f);
  };

  // Variant management
  function renderVariants() {
    const container = document.getElementById('variantsContainer');
    if (!container) return;
    container.innerHTML = '';
    colorVariants.forEach((variant, idx) => {
      const card = document.createElement('div');
      card.className = 'variant-card';
      card.innerHTML = `
        <div class="variant-header">
          <input type="text" class="variant-color-input" placeholder="Color name e.g. Midnight Black" value="${variant.color || ''}" onchange="updateColor(${idx}, this.value)">
          <button type="button" class="btn-danger" style="background:#fee2e2;border:none;padding:0.3rem 0.8rem;border-radius:100px;" onclick="removeColorVariant(${idx})"><i class="fa-regular fa-trash-can"></i> Remove</button>
        </div>
        <div><strong>Storage Options & Quantities</strong></div>
        <div id="storage-list-${idx}"></div>
        <button type="button" class="btn-outline add-storage-btn" onclick="addStorageOption(${idx})"><i class="fa-solid fa-plus"></i> Add Storage</button>
        <div class="variant-image">
          <strong>Color Image</strong>
          ${variant.imageUrl ? `<div><img class="current-image" src="${variant.imageUrl}"></div>` : ''}
          <div class="upload-zone" data-idx="${idx}">
            <input type="file" accept="image/*" onchange="uploadVariantImage(${idx}, this.files[0])">
            <div><i class="fa-solid fa-cloud-upload-alt"></i> Click to upload image for this color</div>
          </div>
          <div id="upload-status-${idx}" class="upload-status" style="display:none;">Uploading...</div>
        </div>
      `;
      container.appendChild(card);
      // Render storage rows
      const storageDiv = document.getElementById(`storage-list-${idx}`);
      if (storageDiv) {
        storageDiv.innerHTML = '';
        (variant.storageOptions || []).forEach((opt, optIdx) => {
          const row = document.createElement('div');
          row.className = 'storage-row';
          row.innerHTML = `
            <input type="text" placeholder="Storage (e.g. 128GB)" value="${opt.storage || ''}" onchange="updateStorage(${idx}, ${optIdx}, 'storage', this.value)">
            <input type="number" placeholder="Quantity" value="${opt.stock || 0}" style="width:100px" onchange="updateStorage(${idx}, ${optIdx}, 'stock', parseInt(this.value)||0)">
            <button type="button" class="btn-danger" style="background:#fee2e2;border:none;padding:0.2rem 0.5rem;border-radius:50%;" onclick="removeStorageOption(${idx}, ${optIdx})"><i class="fa-solid fa-times"></i></button>
          `;
          storageDiv.appendChild(row);
        });
      }
    });
  }

  window.addColorVariant = () => {
    colorVariants.push({ color: '', imageFile: null, imageUrl: '', storageOptions: [] });
    renderVariants();
  };
  window.removeColorVariant = (idx) => {
    colorVariants.splice(idx, 1);
    renderVariants();
  };
  window.updateColor = (idx, value) => { colorVariants[idx].color = value; };
  window.addStorageOption = (idx) => {
    if (!colorVariants[idx].storageOptions) colorVariants[idx].storageOptions = [];
    colorVariants[idx].storageOptions.push({ storage: '', stock: 0 });
    renderVariants();
  };
  window.updateStorage = (idx, optIdx, field, value) => {
    if (!colorVariants[idx].storageOptions[optIdx]) return;
    colorVariants[idx].storageOptions[optIdx][field] = value;
  };
  window.removeStorageOption = (idx, optIdx) => {
    colorVariants[idx].storageOptions.splice(optIdx, 1);
    renderVariants();
  };

  // Fixed upload function with proper authentication and error handling
  window.uploadVariantImage = async (idx, file) => {
    if (!file) return;
    if (!auth.currentUser) {
      showToast('You must be logged in to upload images', true);
      return;
    }
    const statusDiv = document.getElementById(`upload-status-${idx}`);
    if (statusDiv) statusDiv.style.display = 'block';
    const timestamp = Date.now();
    const safeName = file.name.replace(/[^a-zA-Z0-9.]/g, '_');
    const path = `temp_products/${timestamp}_${idx}_${safeName}`;
    const storageRef = ref(storage, path);
    const uploadTask = uploadBytesResumable(storageRef, file);
    uploadTask.on('state_changed',
      (snapshot) => {
        const percent = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
        if (statusDiv) statusDiv.innerText = `Uploading... ${percent}%`;
      },
      (error) => {
        console.error('Upload error:', error);
        let errorMsg = 'Upload failed. ';
        if (error.code === 'storage/unauthorized') errorMsg += 'Permission denied. Check Storage rules.';
        else errorMsg += error.message;
        showToast(errorMsg, true);
        if (statusDiv) statusDiv.style.display = 'none';
      },
      async () => {
        const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
        colorVariants[idx].imageUrl = downloadURL;
        colorVariants[idx].imageFile = file;
        renderVariants();
        showToast(`Image uploaded for ${colorVariants[idx].color || 'variant'}`, false);
        if (statusDiv) statusDiv.style.display = 'none';
      }
    );
  };

  window.showAddModal = () => {
    document.getElementById('modalTitle').innerHTML = 'Add New Product';
    document.getElementById('productForm').reset();
    editingProductId = null;
    colorVariants = [];
    renderVariants();
    document.getElementById('productModal').classList.add('show');
  };
  window.editProduct = async (id) => {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    editingProductId = id;
    document.getElementById('modalTitle').innerHTML = 'Edit Product';
    document.getElementById('f-name').value = p.name || '';
    document.getElementById('f-brand').value = p.brand || '';
    document.getElementById('f-type').value = p.type || 'Smartphone';
    document.getElementById('f-category').value = p.category || 'phones';
    document.getElementById('f-price').value = p.price || '';
    document.getElementById('f-oldprice').value = p.oldPrice || '';
    document.getElementById('f-desc').value = p.description || '';
    document.getElementById('f-shortdesc').value = p.shortDesc || '';
    colorVariants = (p.variants || []).map(v => ({
      color: v.color,
      imageUrl: v.imageUrl || '',
      storageOptions: v.storageOptions || []
    }));
    renderVariants();
    document.getElementById('productModal').classList.add('show');
  };
  window.closeModal = () => { document.getElementById('productModal').classList.remove('show'); };
  window.handleSubmit = async (e) => {
    e.preventDefault();
    const btn = document.querySelector('#productForm button[type="submit"]');
    const originalText = btn.innerHTML;
    btn.disabled = true; btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
    try {
      const name = document.getElementById('f-name').value.trim();
      const price = parseFloat(document.getElementById('f-price').value);
      if (!name || isNaN(price)) throw new Error('Name and price required');
      for (let v of colorVariants) {
        if (!v.color.trim()) throw new Error('All color variants must have a color name');
        if (!v.imageUrl) throw new Error(`Please upload an image for color: ${v.color}`);
        if (!v.storageOptions || v.storageOptions.length === 0) throw new Error(`Add at least one storage option for color: ${v.color}`);
        for (let opt of v.storageOptions) {
          if (!opt.storage.trim()) throw new Error(`Storage field empty for color ${v.color}`);
          if (opt.stock < 0) throw new Error(`Invalid stock for ${v.color} - ${opt.storage}`);
        }
      }
      if (colorVariants.length === 0) throw new Error('Add at least one color variant');
      const productData = {
        name, brand: document.getElementById('f-brand').value.trim() || null,
        type: document.getElementById('f-type').value,
        category: document.getElementById('f-category').value,
        price, oldPrice: parseFloat(document.getElementById('f-oldprice').value) || null,
        description: document.getElementById('f-desc').value.trim() || null,
        shortDesc: document.getElementById('f-shortdesc').value.trim() || null,
        variants: colorVariants.map(v => ({
          color: v.color,
          imageUrl: v.imageUrl,
          storageOptions: v.storageOptions.map(opt => ({ storage: opt.storage, stock: opt.stock }))
        })),
        updatedAt: new Date().toISOString()
      };
      if (editingProductId) {
        await updateDoc(doc(db, "products", editingProductId), productData);
        showToast('Product updated');
      } else {
        productData.createdAt = new Date().toISOString();
        await addDoc(collection(db, "products"), productData);
        showToast('Product added');
      }
      closeModal();
      await loadProducts();
    } catch (err) { showToast(err.message, true); }
    finally { btn.disabled = false; btn.innerHTML = originalText; }
  };
  window.deleteProduct = async (id) => {
    if (!confirm('Delete this product?')) return;
    await deleteDoc(doc(db, "products", id));
    showToast('Product deleted');
    await loadProducts();
  };
  window.handleLogout = async () => { await signOut(auth); window.location.href = '../login.html'; };
</script>
</body>
</html>
