<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMB Electronics | Manage Users</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #00bcd4;
      --primary-dark: #0097a7;
      --dark: #0f172a;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-400: #94a3b8;
      --white: #ffffff;
      --radius-lg: 1.5rem;
      --radius-md: 1rem;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background: var(--gray-100); 
      color: var(--dark); 
    }

    .admin-container {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .admin-sidebar {
      width: 280px;
      background: var(--dark);
      color: white;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .sidebar-header a {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: white;
    }

    .sidebar-header img {
      height: 40px;
      width: auto;
    }

    .sidebar-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .sidebar-header span {
      color: var(--primary);
    }

    .sidebar-menu {
      padding: 2rem 1rem;
    }

    .menu-item {
      margin-bottom: 0.5rem;
    }

    .menu-item a {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      color: var(--gray-400);
      text-decoration: none;
      border-radius: 100px;
      transition: 0.3s;
    }

    .menu-item a:hover,
    .menu-item a.active {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .menu-item a i {
      width: 20px;
      font-size: 1.1rem;
    }

    .menu-item.logout {
      margin-top: 2rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 1rem;
    }

    .menu-item.logout a {
      color: #ef4444;
    }

    .menu-item.logout a:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    /* Main Content */
    .admin-main {
      flex: 1;
      margin-left: 280px;
      padding: 2rem;
    }

    /* Header */
    .admin-header {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .header-title h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--dark);
    }

    .header-title p {
      color: var(--gray-400);
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }

    .header-profile {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--gray-100);
      padding: 0.5rem 1rem 0.5rem 0.5rem;
      border-radius: 100px;
    }

    .profile-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
    }

    .profile-info {
      line-height: 1.4;
    }

    .profile-info .name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .profile-info .role {
      color: var(--gray-400);
      font-size: 0.8rem;
    }

    /* Stats Card */
    .stats-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid var(--gray-200);
    }

    .stats-info h3 {
      font-size: 1rem;
      color: var(--gray-400);
      font-weight: 500;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stats-info .number {
      font-size: 3rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .stats-icon {
      width: 80px;
      height: 80px;
      background: rgba(0, 188, 212, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--primary);
    }

    /* Filters */
    .filters-section {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
    }

    .filters-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 1rem;
    }

    .filter-select {
      padding: 0.8rem 1rem;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
    }

    .search-box input {
      flex: 1;
      padding: 0.8rem 1rem;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius-md);
      font-family: 'Inter', sans-serif;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-box button {
      padding: 0.8rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: 0.3s;
    }

    .search-box button:hover {
      background: var(--primary-dark);
    }

    /* Users Table */
    .users-table-container {
      background: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow);
      overflow-x: auto;
    }

    .users-table {
      width: 100%;
      border-collapse: collapse;
    }

    .users-table th {
      text-align: left;
      padding: 1rem;
      background: var(--gray-100);
      color: var(--gray-400);
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .users-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--gray-200);
    }

    .users-table tr:last-child td {
      border-bottom: none;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
    }

    .role-badge {
      padding: 0.3rem 1rem;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-block;
      text-transform: capitalize;
    }

    .role-admin {
      background: #dbeafe;
      color: #1e40af;
    }

    .role-user {
      background: #d1fae5;
      color: #065f46;
    }

    .action-btn {
      padding: 0.3rem 1rem;
      border-radius: 100px;
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      margin: 0 0.2rem;
      transition: 0.3s;
    }

    .action-btn:hover {
      background: var(--primary-dark);
    }

    .action-btn.delete {
      background: #fee2e2;
      color: #ef4444;
    }

    .action-btn.delete:hover {
      background: #ef4444;
      color: white;
    }

    /* Loading Spinner */
    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--gray-200);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--gray-400);
    }

    .empty-state i {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 768px) {
      .admin-sidebar {
        display: none;
      }
      
      .admin-main {
        margin-left: 0;
      }
      
      .filters-grid {
        grid-template-columns: 1fr;
      }
      
      .stats-card {
        flex-direction: column;
        text-align: center;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html">
          <img src="../photos/logo.png" alt="BMB" onerror="this.src='https://via.placeholder.com/40x40?text=BMB'">
          <h2>BMB<span>Admin</span></h2>
        </a>
      </div>

      <div class="sidebar-menu">
        <div class="menu-item">
          <a href="dashboard.html">
            <i class="fa-solid fa-gauge"></i>
            <span>Dashboard</span>
          </a>
        </div>
        <div class="menu-item">
          <a href="users.html" class="active">
            <i class="fa-solid fa-users"></i>
            <span>Users</span>
          </a>
        </div>
        <div class="menu-item">
          <a href="orders.html">
            <i class="fa-solid fa-box"></i>
            <span>Orders</span>
          </a>
        </div>
        <div class="menu-item">
          <a href="products.html">
            <i class="fa-solid fa-cube"></i>
            <span>Products</span>
          </a>
        </div>
        <div class="menu-item logout">
          <a href="#" onclick="handleLogout()">
            <i class="fa-solid fa-sign-out"></i>
            <span>Logout</span>
          </a>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <!-- Header -->
      <header class="admin-header">
        <div class="header-title">
          <h1>Users</h1>
          <p>Manage registered users and administrators</p>
        </div>
        <div class="header-profile">
          <div class="profile-avatar" id="adminInitials">A</div>
          <div class="profile-info">
            <div class="name" id="adminName">Admin User</div>
            <div class="role">Administrator</div>
          </div>
        </div>
      </header>

      <!-- Stats Card - Total Users Count -->
      <div class="stats-card">
        <div class="stats-info">
          <h3>Total Registered Users</h3>
          <div class="number" id="totalUsers">0</div>
        </div>
        <div class="stats-icon">
          <i class="fa-solid fa-users"></i>
        </div>
      </div>

      <!-- Filters -->
      <div class="filters-section">
        <div class="filters-grid">
          <select class="filter-select" id="roleFilter" onchange="filterUsers()">
            <option value="all">All Roles</option>
            <option value="admin">Admins</option>
            <option value="user">Users</option>
          </select>
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by name or email...">
            <button onclick="filterUsers()"><i class="fa-solid fa-search"></i></button>
          </div>
        </div>
      </div>

      <!-- Users Table -->
      <div class="users-table-container">
        <table class="users-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Role</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <tr>
              <td colspan="6" style="text-align: center;">
                <div class="loading-spinner" style="margin: 2rem auto;"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script type="module">
    import { auth, db } from '../js/firebase-config.js';
    import { collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { observeAuthState, isUserAdmin } from '../js/auth.js';

    let allUsers = [];

    // Check authentication and admin status
    observeAuthState(async (user) => {
      if (!user) {
        window.location.href = '../login.html';
        return;
      }

      const admin = await isUserAdmin(user.uid);
      if (!admin) {
        alert('Access denied. Admin only.');
        window.location.href = '../index.html';
        return;
      }

      // Update admin info
      await updateAdminInfo(user);
      
      // Load users
      loadUsers();
    });

    // Update admin info in header
    async function updateAdminInfo(user) {
      try {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        const userData = userDoc.data();
        
        document.getElementById('adminName').textContent = userData?.name || 'Admin';
        
        const initial = (userData?.name || 'A').charAt(0).toUpperCase();
        document.getElementById('adminInitials').textContent = initial;
      } catch (error) {
        console.error("Error loading admin info:", error);
      }
    }

    // Load all users from Firestore
    async function loadUsers() {
      try {
        const usersQuery = query(
          collection(db, "users"),
          orderBy("createdAt", "desc")
        );
        
        const usersSnapshot = await getDocs(usersQuery);
        allUsers = usersSnapshot.docs.map(doc => ({ 
          id: doc.id, 
          ...doc.data() 
        }));
        
        // Update total users count
        document.getElementById('totalUsers').textContent = allUsers.length;
        
        // Display users
        displayUsers(allUsers);
        
      } catch (error) {
        console.error("Error loading users:", error);
        document.getElementById('usersTableBody').innerHTML = `
          <tr>
            <td colspan="6" style="text-align: center; color: #ef4444;">
              <i class="fa-solid fa-exclamation-circle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
              <p>Error loading users. Please try again.</p>
            </td>
          </tr>
        `;
      }
    }

    // Display users in table
    function displayUsers(users) {
      const tbody = document.getElementById('usersTableBody');
      
      if (users.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" class="empty-state">
              <i class="fa-solid fa-users-slash"></i>
              <p>No users found</p>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = users.map(user => {
        const initial = (user.name || user.email || 'U').charAt(0).toUpperCase();
        const roleClass = user.role === 'admin' ? 'role-admin' : 'role-user';
        const joinDate = user.createdAt ? new Date(user.createdAt).toLocaleDateString() : 'N/A';

        return `
          <tr>
            <td>
              <div class="user-info">
                <div class="user-avatar">${initial}</div>
                <div>
                  <strong>${user.name || 'No Name'}</strong>
                </div>
              </div>
            </td>
            <td>${user.email}</td>
            <td>${user.phone || 'N/A'}</td>
            <td><span class="role-badge ${roleClass}">${user.role || 'user'}</span></td>
            <td>${joinDate}</td>
            <td>
              <button class="action-btn" onclick="toggleAdmin('${user.id}', '${user.role}')">
                ${user.role === 'admin' ? 'Remove Admin' : 'Make Admin'}
              </button>
              <button class="action-btn delete" onclick="deleteUser('${user.id}')">
                Delete
              </button>
            </td>
          </tr>
        `;
      }).join('');
    }

    // Filter users
    window.filterUsers = () => {
      const role = document.getElementById('roleFilter').value;
      const search = document.getElementById('searchInput').value.toLowerCase();

      let filtered = [...allUsers];

      // Filter by role
      if (role !== 'all') {
        filtered = filtered.filter(u => u.role === role);
      }

      // Filter by search
      if (search) {
        filtered = filtered.filter(u => 
          (u.name && u.name.toLowerCase().includes(search)) ||
          u.email.toLowerCase().includes(search) ||
          (u.phone && u.phone.includes(search))
        );
      }

      displayUsers(filtered);
    };

    // Toggle admin status
    window.toggleAdmin = async (userId, currentRole) => {
      const newRole = currentRole === 'admin' ? 'user' : 'admin';
      
      if (!confirm(`Are you sure you want to make this user ${newRole === 'admin' ? 'an admin' : 'a regular user'}?`)) return;

      try {
        const userRef = doc(db, "users", userId);
        await updateDoc(userRef, {
          role: newRole,
          updatedAt: new Date().toISOString()
        });
        
        alert(`User role updated to ${newRole}`);
        loadUsers(); // Reload users
      } catch (error) {
        console.error("Error updating user role:", error);
        alert('Error updating user role. Please try again.');
      }
    };

    // Delete user
    window.deleteUser = async (userId) => {
      if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) return;

      try {
        await deleteDoc(doc(db, "users", userId));
        alert('User deleted successfully!');
        loadUsers(); // Reload users
      } catch (error) {
        console.error("Error deleting user:", error);
        alert('Error deleting user. Please try again.');
      }
    };

    // Handle logout
    window.handleLogout = async () => {
      try {
        await signOut(auth);
        window.location.href = '../login.html';
      } catch (error) {
        console.error("Error logging out:", error);
      }
    };
  </script>
</body>
</html>
